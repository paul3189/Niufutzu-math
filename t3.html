<style>
:root{--g:#2e7d32;--g2:#60ad5e;--gl:#e8f5e9;--ink:#1b3a22;--red:#d32f2f;--yel:#f9a825;--grn:#43a047;--blue:#1565c0;--bluel:#e3f2fd;--pink:#c2185b;--pinkl:#fce4ec;}
*{box-sizing:border-box}
body{font-family:"標楷體","Microsoft JhengHei","PingFang TC",serif;margin:0;color:#222;background:#f4f7f4;line-height:1.6}
header{background:linear-gradient(135deg,var(--g),var(--g2));color:#fff;padding:22px 28px}
header h1{margin:0;font-size:22px}header p{margin:6px 0 0;font-size:13px;opacity:.92}
.wrap{max-width:1000px;margin:0 auto;padding:18px}
.bar{position:sticky;top:0;z-index:5;background:#fff;border:1px solid #d6e6d6;border-radius:10px;padding:12px 16px;margin:14px 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.bar b{color:var(--g)}
button{font-family:inherit;font-size:14px;border:0;border-radius:8px;padding:9px 16px;cursor:pointer}
.btn{background:var(--g);color:#fff}.btn:hover{background:#266a2a}
.btn2{background:#eee;color:#333}.btn2:hover{background:#ddd}
.sectionhead{font-size:18px;font-weight:bold;margin:22px 4px 6px;padding:8px 14px;border-radius:8px}
.sec-green{background:var(--gl);color:var(--ink);border-left:6px solid var(--g)}
.sec-blue{background:var(--bluel);color:#0d3c70;border-left:6px solid var(--blue)}
.sec-pink{background:var(--pinkl);color:#7a1340;border-left:6px solid var(--pink)}
.node{background:#fff;border:1px solid #ddd;border-radius:10px;margin:10px 0;overflow:hidden}
.node>h2{margin:0;padding:10px 16px;font-size:16px}
.n-green>h2{background:var(--gl);color:var(--ink);border-left:6px solid var(--g)}
.n-blue>h2{background:var(--bluel);color:#0d3c70;border-left:6px solid var(--blue)}
.n-pink>h2{background:var(--pinkl);color:#7a1340;border-left:6px solid var(--pink)}
.node .meta{padding:4px 16px 0;font-size:12px;color:#557}
.layer{padding:4px 16px 10px}
.layer h3{font-size:13px;color:#555;margin:10px 0 4px;border-bottom:1px dashed #ddd;padding-bottom:3px}
.q{display:flex;gap:10px;padding:7px 8px;border-radius:7px;align-items:flex-start;border-bottom:1px solid #f3f3f3}
.q:hover{background:#f6faf6}
.q input{margin-top:5px;width:17px;height:17px;flex:0 0 auto;accent-color:var(--red)}
.q label{font-size:13px;cursor:pointer;line-height:1.7}
.q .tag{display:inline-block;font-size:11px;color:#fff;background:var(--g2);border-radius:4px;padding:1px 7px;margin-right:6px}
.q .src{color:#a06000;font-size:12px}
.report{background:#fff;border:2px solid var(--g);border-radius:12px;margin:18px 0;display:none}
.report.show{display:block}
.report h2{background:var(--g);color:#fff;margin:0;padding:14px 18px;font-size:19px;border-radius:9px 9px 0 0}
.sec{padding:14px 20px;border-bottom:1px solid #eee}
.sec h3{margin:0 0 10px;color:var(--g);font-size:16px}
.kpi{display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.donut{width:120px;height:120px;border-radius:50%;flex:0 0 auto}
.kpi .big{font-size:30px;font-weight:bold;color:var(--g)}
.tl{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:13px}
.tl .name{flex:0 0 200px}.tl .track{flex:1;background:#eee;border-radius:6px;height:16px;overflow:hidden}
.tl .fill{height:100%;border-radius:6px}.tl .pct{flex:0 0 96px;text-align:right;color:#555}
.dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:middle}
.path{background:var(--gl);border-radius:8px;padding:10px 12px;margin:8px 0;font-size:13px}.path b{color:var(--g)}
.lay{display:flex;gap:14px;flex-wrap:wrap}
.lay .box{flex:1;min-width:120px;background:#f6faf6;border:1px solid #e0eee0;border-radius:8px;padding:10px;text-align:center}
.lay .box .n{font-size:22px;font-weight:bold}
.note{font-size:12px;color:#777;margin-top:6px}.empty{color:#888;font-style:italic}
@media print{.bar,header .sub,.nodes,button{display:none!important}.report{display:block!important;border:0;margin:0}.report h2{color:#000;background:#fff;border-bottom:2px solid #000}body{background:#fff}.sec{break-inside:avoid}}
.btn-sim{margin-top:8px;background:#1E3A5F;color:#fff;border:0;border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer}
.btn-sim:hover{background:#2a4f7f}.simbox{margin-top:6px}
.simhdr{font-size:13px;color:#1E3A5F;font-weight:bold;margin:6px 0}
.simq{background:#f7f9fc;border:1px solid #dbe2ea;border-radius:8px;padding:10px 12px;margin:8px 0}
.simstem{margin-bottom:6px}.ansbtn{background:#eef2f7;border:1px solid #c4d0dc;border-radius:5px;padding:3px 10px;font-size:12px;cursor:pointer;color:#1E3A5F}
.simans{display:none;margin-top:8px;padding:8px;background:#fff;border-left:3px solid #43a047;font-size:14px}
.simans.show{display:block}.simans .sol{color:#555;font-size:13px}
.expov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.expbox{background:#fff;border-radius:14px;padding:20px;max-width:540px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.expbox h4{margin:0 0 10px;color:#1E3A5F;font-size:15px}
.expbox textarea{width:100%;height:220px;font-size:13px;line-height:1.6;border:1px solid #cbd5e1;border-radius:8px;padding:10px;font-family:inherit;color:#222}
.exprow{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.exprow button{background:#1E3A5F;color:#fff;border:0;border-radius:7px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:bold}
.exprow button:hover{background:#2a4f7f}

.lead{font-size:15px;color:#333;background:#fff;border:1px solid #d6e6d6;border-radius:10px;padding:14px 18px;margin:14px 0;line-height:1.7}
.menu{display:flex;flex-direction:column;gap:12px}
.scard{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #dbe7db;border-radius:14px;padding:16px 18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:.15s}
.scard:hover{box-shadow:0 6px 18px rgba(0,0,0,.12);transform:translateY(-1px);border-color:var(--g2)}
.snum{flex:0 0 auto;width:44px;height:44px;border-radius:10px;background:#1E3A5F;color:#fff;font-size:20px;font-weight:bold;display:flex;align-items:center;justify-content:center}
.sbody{flex:1}.stitle{font-size:17px;font-weight:bold;color:var(--ink)}.ssub{font-size:13px;color:#777;margin-top:3px}
.sgo{color:var(--g);font-size:18px}
.crumb{font-size:13px;color:#557;margin:12px 0 2px}.crumb a{color:var(--g);cursor:pointer;text-decoration:underline}
.vhead{margin:10px 0}.vhead h2{margin:0;font-size:20px;color:var(--ink)}.vsub{font-size:13px;color:#777;margin-top:4px}
.q .qt{color:#999;font-size:11px;margin-right:4px}
.btn-drill{background:#1E3A5F;color:#fff;border:0;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:4px}
.btn-drill:hover{background:#2a4f7f}

列哪一條直線與 $L_1,L_2$ 所圍三角形面積最大？\n(1) $3x-4y=-10$　(2) $3x-4y=-5$　(3) $3x-4y=0$　(4) $3x-4y=5$　(5) $3x-4y=10$", "skills": ["點到直線距離", "面積"], "source": "111學測臺北數A第1次模考"}]}, {"code": "C1-7", "name": "直線系", "section": "一、直線與其方程式", "section_color": "blue", "difficulty_grade": "冷門", "handout_page": "", "remediation_tip": "若本節（直線系）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C1-7-L1", "layer": "L1", "stem": "求通過兩直線 $x+y-3=0$ 與 $2x-y=0$ 的交點、且通過點 $(4,1)$ 的直線方程式。", "skills": ["直線系", "交點"], "source": "改編（直線系）"}, {"id": "C1-7-L2-Q1", "layer": "L2", "stem": "無論實數 $m$ 為何，直線 $(2x+y-4)+m(x-y+1)=0$ 必通過一定點，求此定點。", "skills": ["直線系", "定點"], "source": "改編（定點）"}, {"id": "C1-7-L2-Q2", "layer": "L2", "stem": "無論 $m$ 值為何，直線 $L:mx-y-3m+2=0$ 必通過 $P$ 點，求 $P$ 點坐標。", "skills": ["直線系", "定點"], "source": "成功高中110上高一第二次段考"}, {"id": "C1-7-L3", "layer": "L3", "stem": "在直線系 $(x+2y-5)+\\lambda(2x-y)=0$ 中，求與直線 $3x+y=0$ 平行的那一條的方程式。", "skills": ["直線系", "平行"], "source": "改編（直線系）"}, {"id": "C1-7-L4", "layer": "L4", "stem": "四條直線 $L_1:x-y=1$、$L_2:x+y=4$、$L_3:8x+y=-10$、$L_4:x=2$ 圍成一個四邊形，求此四邊形較短的對角線長度。", "skills": ["直線交點", "兩點距離"], "source": "84學測"}]}, {"code": "C2-1", "name": "圓的方程式（三形式）", "section": "二、圓", "section_color": "green", "difficulty_grade": "冷門", "handout_page": "", "remediation_tip": "若本節（圓的方程式（三形式））失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C2-1-L1", "layer": "L1", "stem": "求圓心 $(2,-3)$、半徑 $5$ 的圓的標準式與一般式。", "skills": ["標準式", "一般式"], "source": "改編（圓方程式）"}, {"id": "C2-1-L2-Q1", "layer": "L2", "stem": "求圓 $x^2+y^2-6x+4y-12=0$ 的圓心與半徑。", "skills": ["一般式", "配方"], "source": "改編（配方）"}, {"id": "C2-1-L2-Q2", "layer": "L2", "stem": "以 $A(1,2)$、$B(5,8)$ 為直徑兩端點，求圓方程式。", "skills": ["直徑式"], "source": "改編（直徑式）"}, {"id": "C2-1-L3", "layer": "L3", "stem": "求過三點 $O(0,0)$、$A(6,0)$、$B(0,8)$ 的圓方程式及其半徑。", "skills": ["三點定圓"], "source": "改編（三點定圓）"}, {"id": "C2-1-L4", "layer": "L4", "stem": "在坐標平面上，以 $(1,1),(-1,1),(-1,-1),(1,-1)$ 為頂點的正方形，與圓 $x^2+y^2+2x+2y+1=0$ 有幾個交點？\n(1) 1　(2) 2　(3) 3　(4) 4　(5) 0", "skills": ["一般式", "圓與正方形"], "source": "103學測"}]}, {"code": "C2-2", "name": "圓與點、圓與直線關係", "section": "二、圓", "section_color": "green", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（圓與點、圓與直線關係）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C2-2-L1-Q1", "layer": "L1", "stem": "判別點 $(4,3)$ 與圓 $x^2+y^2=16$ 的位置關係。", "skills": ["點與圓"], "source": "改編（點與圓）"}, {"id": "C2-2-L1-Q2", "layer": "L1", "stem": "求圓 $x^2+y^2=25$ 被直線 $3x+4y=20$ 所截的弦長。", "skills": ["弦長"], "source": "改編（弦長）"}, {"id": "C2-2-L2-Q1", "layer": "L2", "stem": "圓 $(x-1)^2+(y-2)^2=r^2$ 通過點 $(4,6)$，求 $r$。", "skills": ["點與圓"], "source": "改編（點與圓）"}, {"id": "C2-2-L2-Q2", "layer": "L2", "stem": "判別直線 $x+y=5$ 與圓 $(x-1)^2+(y-1)^2=4$ 的關係。", "skills": ["直線與圓"], "source": "改編（位置關係）"}, {"id": "C2-2-L2-Q3", "layer": "L2", "stem": "直線 $y=x+k$ 與圓 $x^2+y^2=8$ 相切，求 $k$。", "skills": ["相切"], "source": "改編（相切）"}, {"id": "C2-2-L2-Q4", "layer": "L2", "stem": "求圓 $x^2+y^2=20$ 上的點到直線 $x+2y-15=0$ 的最短距離。", "skills": ["點與圓", "距離"], "source": "改編（最短距離）"}, {"id": "C2-2-L3-Q1", "layer": "L3", "stem": "求圓 $x^2+y^2-2x-4y-4=0$ 被 $y$ 軸所截的弦長。", "skills": ["弦長"], "source": "改編（弦長）"}, {"id": "C2-2-L3-Q2", "layer": "L3", "stem": "過點 $(1,3)$ 的直線截圓 $x^2+y^2=5$ 得弦長 $4$，求弦所在直線。", "skills": ["弦長", "直線方程式"], "source": "改編（弦）"}, {"id": "C2-2-L3-Q3", "layer": "L3", "stem": "圓 $x^2+y^2=25$ 上有幾個點到直線 $3x+4y=10$ 的距離等於 $1$？", "skills": ["點與圓", "距離"], "source": "改編（定距點數）"}, {"id": "C2-2-L4-Q1", "layer": "L4", "stem": "設 $\\Gamma:x^2+y^2-10x+9=0$。下列哪些選項正確？\n(1) $\\Gamma$ 的圓心為 $(5,0)$　(2) $\\Gamma$ 上的點到 $L:3x+4y-15=0$ 的最遠距離為 $4$　(3) $L_1:3x+4y+15=0$ 與 $\\Gamma$ 相切　(4) $\\Gamma$ 上恰有兩點與 $L_2:3x+4y=0$ 距離為 $2$　(5) $\\Gamma$ 上恰有四點與 $L_3:3x+4y-5=0$ 距離為 $2$", "skills": ["點與圓", "距離"], "source": "97學測"}, {"id": "C2-2-L4-Q2", "layer": "L4", "stem": "圓 $C$ 的圓心在原點且半徑為 $2$，已知直線 $L$ 與 $C$ 相交。則 $L$ 與下列哪些圖形一定相交？\n(1) $x$ 軸　(2) $y=(\\tfrac12)^x$　(3) $x^2+y^2=3$　(4) $(x-2)^2+y^2=16$　(5) $\\dfrac{x^2}9+\\dfrac{y^2}4=1$", "skills": ["直線與圓", "包含關係"], "source": "100學測"}, {"id": "C2-2-L4-Q3", "layer": "L4", "stem": "一圓與直線 $x-y=1$ 及直線 $x-y=5$ 所截的弦長皆為 $\\sqrt{14}$，求此圓的面積為 ___ $\\pi$。", "skills": ["弦長", "平行弦"], "source": "102學測"}, {"id": "C2-2-L4-Q4", "layer": "L4", "stem": "點 $A(1,0)$ 在單位圓 $\\Gamma:x^2+y^2=1$ 上。除 $A$ 外，$\\Gamma$ 上還有幾個點到直線 $L:y=2x$ 的距離等於 $A$ 到 $L$ 的距離？\n(1) 1　(2) 2　(3) 3　(4) 4　(5) 0", "skills": ["點與圓", "距離"], "source": "108學測"}, {"id": "C2-2-L4-Q5", "layer": "L4", "stem": "圓 $\\Gamma$ 滿足 $(0,0)$ 在其外部、$(2,6)$ 在其內部。下列哪一選項必定成立？\n(1) 圓心在 $y$ 軸右方　(2) 半徑 $<\\sqrt{40}$　(3) 半徑 $>1$　(4) 圓心 $x$ 坐標 $>1$　(5) 圓心到 $(0,0)$ 的距離 $>$ 圓心到 $(2,6)$ 的距離", "skills": ["點與圓"], "source": "106學測"}, {"id": "C2-2-L4-Q6", "layer": "L4", "stem": "$L_1,L_2$ 為通過 $(3,1)$ 且斜率分別為 $m,-m$ 的兩直線。$\\Gamma$ 為圓心在原點的圓，與 $L_1$ 交於相異兩點 $A,B$ 且圓心到 $L_1$ 的距離為 $1$，又 $\\Gamma$ 與 $L_2$ 相切。求弦 $\\overline{AB}$ 的長度。", "skills": ["弦長", "相切"], "source": "114學測A"}]}, {"code": "C2-3", "name": "圓的切線四情形", "section": "二、圓", "section_color": "green", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（圓的切線四情形）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C2-3-L1-Q1", "layer": "L1", "stem": "求圓 $x^2+y^2=25$ 在其上一點 $P(3,4)$ 的切線方程式。", "skills": ["圓上點切線"], "source": "改編（切線）"}, {"id": "C2-3-L1-Q2", "layer": "L1", "stem": "求斜率為 $2$ 且與圓 $x^2+y^2=5$ 相切的直線方程式。", "skills": ["斜率切線"], "source": "改編（切線）"}, {"id": "C2-3-L2-Q1", "layer": "L2", "stem": "求點 $P(7,1)$ 到圓 $x^2+y^2=10$ 的切線長。", "skills": ["切線長"], "source": "改編（切線長）"}, {"id": "C2-3-L2-Q2", "layer": "L2", "stem": "求圓 $(x-1)^2+(y-2)^2=10$ 在點 $(4,3)$ 的切線方程式。", "skills": ["圓上點切線"], "source": "改編（切線）"}, {"id": "C2-3-L2-Q3", "layer": "L2", "stem": "求斜率 $-1$ 且與圓 $(x-2)^2+(y+1)^2=8$ 相切的直線。", "skills": ["斜率切線"], "source": "改編（切線）"}, {"id": "C2-3-L2-Q4", "layer": "L2", "stem": "過點 $(3,1)$ 作圓 $x^2+y^2=5$ 的兩條切線，求切線的斜率。", "skills": ["圓外點切線"], "source": "改編（切線）"}, {"id": "C2-3-L3-Q1", "layer": "L3", "stem": "求兩圓 $x^2+y^2=4$ 與 $(x-5)^2+y^2=1$ 的公切線條數。", "skills": ["兩圓公切線"], "source": "改編（公切線）"}, {"id": "C2-3-L3-Q2", "layer": "L3", "stem": "自點 $A(4,2)$ 向圓 $x^2+y^2=4$ 作兩切線，切點為 $P,Q$，求切點弦 $\\overline{PQ}$ 所在直線方程式。", "skills": ["切點弦", "極線"], "source": "改編（切點弦）"}, {"id": "C2-3-L3-Q3", "layer": "L3", "stem": "動點 $P$ 在直線 $x+y=6$ 上，求 $P$ 到圓 $x^2+y^2=4$ 的切線長的最小值。", "skills": ["切線長", "最值"], "source": "改編（切線長最值）"}, {"id": "C2-3-L4-Q1", "layer": "L4", "stem": "試選出所有與圓 $(x-2)^2+(y-2)^2=2$ 相切的直線。\n(1) $x+y+2=0$　(2) $x-y-2=0$　(3) $x-y+2=0$　(4) $x=0$　(5) $y=0$", "skills": ["切線判別"], "source": "110學測數B試辦考"}, {"id": "C2-3-L4-Q2", "layer": "L4", "stem": "若直線 $L:y=mx+3$ 與圓 $x^2+y^2+2x=3$ 相切，求 $m$。", "skills": ["斜率切線"], "source": "83學測"}, {"id": "C2-3-L4-Q3", "layer": "L4", "stem": "一圓通過點 $(-2,7)$，且與直線 $4x+3y-14=0$ 相切於點 $(-1,6)$。若圓方程式為 $x^2+y^2+ax+by+c=0$，求 $a,b,c$。", "skills": ["切點", "切線", "圓方程式"], "source": "96指考數甲"}, {"id": "C2-3-L4-Q4", "layer": "L4", "stem": "選出與圓 $(x-3)^2+(y-4)^2=25$ 相切的直線。\n(1) $3x+4y=5$　(2) $3x+4y=0$　(3) $4x+3y=5$　(4) $4x+3y=0$　(5) $4x+3y=1$", "skills": ["切線判別"], "source": "95指考數乙"}, {"id": "C2-3-L4-Q5", "layer": "L4", "stem": "設 $m$ 為實數。若圓 $x^2+y^2-4x+7y+10=0$ 與直線 $y=m(x-3)$ 的兩交點位於不同象限，且滿足此條件的 $m$ 之最大範圍為 $a<m<b$，求 $a,b$。", "skills": ["直線與圓", "象限"], "source": "102指考數甲"}, {"id": "C2-3-L4-Q6", "layer": "L4", "stem": "$A,B$ 兩點距離為 $5$，$\\Gamma$ 為以 $A$ 為圓心、半徑 $r$（$0<r<5$）的圓。自 $B$ 作 $\\Gamma$ 的切線，切於 $P$。求 $\\triangle PAB$ 的最大面積。", "skills": ["切線長", "最值"], "source": "107學測"}]}, {"code": "C2-4", "name": "圓與圓、圓系", "section": "二、圓", "section_color": "green", "difficulty_grade": "冷門", "handout_page": "", "remediation_tip": "若本節（圓與圓、圓系）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C2-4-L1", "layer": "L1", "stem": "判別兩圓 $x^2+y^2=4$ 與 $(x-3)^2+(y-4)^2=9$ 的位置關係。", "skills": ["兩圓位置"], "source": "改編（兩圓位置）"}, {"id": "C2-4-L2-Q1", "layer": "L2", "stem": "求兩圓 $x^2+y^2=10$ 與 $x^2+y^2-4x-2y=0$ 的公共弦所在直線方程式。", "skills": ["公共弦"], "source": "改編（公共弦）"}, {"id": "C2-4-L2-Q2", "layer": "L2", "stem": "求過兩圓 $x^2+y^2-4=0$ 與 $x^2+y^2-2x-3=0$ 的交點、且過點 $(1,1)$ 的圓方程式。", "skills": ["圓系"], "source": "改編（圓系）"}, {"id": "C2-4-L3", "layer": "L3", "stem": "兩圓 $x^2+y^2=4$ 與 $x^2+y^2-2x-4=0$ 相交，求其公共弦長。", "skills": ["公共弦", "弦長"], "source": "改編（公共弦長）"}, {"id": "C2-4-L4", "layer": "L4", "stem": "兩圓 $x^2+y^2=1$ 與 $(x-4)^2+y^2=9$。下列哪些直線是這兩圓的公切線？\n(1) $-\\dfrac{\\sqrt2}2x+\\dfrac{\\sqrt2}2y=1$　(2) $-\\dfrac{\\sqrt3}2x+\\dfrac12y=1$　(3) $-\\dfrac12x-\\dfrac{\\sqrt3}2y=1$　(4) $x=1$", "skills": ["兩圓公切線"], "source": "93指考補考數甲"}]}, {"code": "C3-1", "name": "向量加減、係數積、平行判別", "section": "三、平面向量", "section_color": "pink", "difficulty_grade": "冷門", "handout_page": "", "remediation_tip": "若本節（向量加減、係數積、平行判別）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C3-1-L1", "layer": "L1", "stem": "設 $\\vec a=(3,-1)$、$\\vec b=(1,2)$，求 $2\\vec a-3\\vec b$。", "skills": ["向量運算"], "source": "改編（向量運算）"}, {"id": "C3-1-L2-Q1", "layer": "L2", "stem": "若 $\\vec a=(2,k)$ 與 $\\vec b=(6,-9)$ 平行，求 $k$。", "skills": ["平行判別"], "source": "改編（平行）"}, {"id": "C3-1-L2-Q2", "layer": "L2", "stem": "已知 $A(1,2),B(4,3),C(2,k)$，若 $\\overrightarrow{AB}\\parallel\\overrightarrow{AC}$，求 $k$。", "skills": ["平行判別"], "source": "改編（共線）"}, {"id": "C3-1-L3", "layer": "L3", "stem": "設 $\\vec a=(1,2),\\vec b=(3,-1)$，將 $\\vec c=(5,0)$ 表為 $x\\vec a+y\\vec b$，求 $x,y$。", "skills": ["基底表示"], "source": "改編（線性組合）"}, {"id": "C3-1-L4", "layer": "L4", "stem": "以 $\\vec a,\\vec b$ 表示兩向量。試問下列哪一個選項表示「三角形兩邊中點的連線段與第三邊平行，且長度為第三邊之半」？\n(1) $\\vec a\\cdot\\vec b=0$　(2) $\\dfrac12\\vec a-\\dfrac12\\vec b=\\dfrac12(\\vec a-\\vec b)$　(3) $\\vec a\\cdot\\vec b\\le|\\vec a||\\vec b|$　(4) $(\\vec a+\\vec b)\\cdot(\\vec a+\\vec b)+(\\vec a-\\vec b)\\cdot(\\vec a-\\vec b)=2(\\vec a\\cdot\\vec a+\\vec b\\cdot\\vec b)$　(5) $|\\vec a+\\vec b|\\le|\\vec a|+|\\vec b|$", "skills": ["向量運算", "中點連線"], "source": "97指考數乙"}]}, {"code": "C3-2", "name": "分點公式與三角形三心", "section": "三、平面向量", "section_color": "pink", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（分點公式與三角形三心）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C3-2-L1-Q1", "layer": "L1", "stem": "$A(1,3),B(7,9)$，求 $\\overline{AB}$ 中點 $M$，及 $\\overline{AB}$ 上 $\\overline{AP}:\\overline{PB}=1:2$ 的分點 $P$。", "skills": ["中點", "分點"], "source": "改編（分點）"}, {"id": "C3-2-L1-Q2", "layer": "L1", "stem": "三角形頂點 $A(1,2),B(4,6),C(7,1)$，求重心 $G$。", "skills": ["重心"], "source": "改編（重心）"}, {"id": "C3-2-L2-Q1", "layer": "L2", "stem": "$A(2,-1),B(8,5)$，求 $\\overline{AB}$ 上 $\\overline{AP}:\\overline{PB}=2:1$ 的分點 $P$。", "skills": ["分點"], "source": "改編（分點）"}, {"id": "C3-2-L2-Q2", "layer": "L2", "stem": "$A(1,1),B(4,7)$，求使 $\\overline{AP}:\\overline{PB}=3:1$ 且 $P$ 在 $B$ 外側的外分點 $P$。", "skills": ["外分點"], "source": "改編（外分點）"}, {"id": "C3-2-L2-Q3", "layer": "L2", "stem": "三角形重心為 $G(2,3)$，兩頂點 $A(1,1),B(4,2)$，求第三頂點 $C$。", "skills": ["重心"], "source": "改編（重心反求）"}, {"id": "C3-2-L2-Q4", "layer": "L2", "stem": "$A(1,3),B(7,9)$，求 $\\overline{AB}$ 上 $\\overline{AP}:\\overline{PB}=1:5$ 的分點 $P$。", "skills": ["分點"], "source": "改編（分點）"}, {"id": "C3-2-L3-Q1", "layer": "L3", "stem": "三角形 $A(0,0),B(4,0),C(0,3)$，求其內心 $I$。", "skills": ["內心"], "source": "改編（內心）"}, {"id": "C3-2-L3-Q2", "layer": "L3", "stem": "$\\triangle ABC$ 中 $D$ 在 $\\overline{BC}$ 上且 $\\overline{BD}:\\overline{DC}=2:3$，將 $\\overrightarrow{AD}$ 以 $\\overrightarrow{AB},\\overrightarrow{AC}$ 表示。", "skills": ["分點", "向量分解"], "source": "改編（向量分解）"}, {"id": "C3-2-L3-Q3", "layer": "L3", "stem": "$\\triangle ABC$ 的重心為 $G$。設 $\\overrightarrow{AB}=\\vec b,\\overrightarrow{AC}=\\vec c$，將 $\\overrightarrow{AG}$ 以 $\\vec b,\\vec c$ 表示。", "skills": ["重心", "向量分解"], "source": "改編（重心向量）"}, {"id": "C3-2-L4-Q1", "layer": "L4", "stem": "$\\triangle ABC$ 中 $D$ 在 $\\overline{BC}$ 上，$\\angle ABC=75^\\circ,\\angle ACB=45^\\circ,\\angle ADB=60^\\circ$。若 $\\overrightarrow{AD}=s\\overrightarrow{AB}+t\\overrightarrow{AC}$，求 $s,t$。", "skills": ["向量分解", "正弦定理"], "source": "107學測"}, {"id": "C3-2-L4-Q2", "layer": "L4", "stem": "$\\triangle ABC$ 中 $P$ 為 $\\overline{BC}$ 中點，$Q$ 在 $\\overline{AC}$ 上且 $\\overrightarrow{AQ}=2\\overrightarrow{QC}$。已知 $\\overrightarrow{PA}=(4,3),\\overrightarrow{PQ}=(1,5)$，求 $\\overrightarrow{BC}$。", "skills": ["分點", "向量運算"], "source": "96學測"}, {"id": "C3-2-L4-Q3", "layer": "L4", "stem": "$\\triangle ABC$ 重心為 $G$。$O,D$ 為平面上相異二點且 $\\overrightarrow{OD}=\\overrightarrow{OA}+\\overrightarrow{OB}+\\overrightarrow{OC}$。選出正確選項。\n(1) $O,G,D$ 三點共線　(2) $\\overrightarrow{OD}=2\\overrightarrow{OG}$　(3) $\\overrightarrow{AD}+\\overrightarrow{BD}+\\overrightarrow{CD}=2\\overrightarrow{OD}$　(4) $G$ 在 $\\triangle ABC$ 內部　(5) $D$ 在 $\\triangle ABC$ 外部", "skills": ["重心"], "source": "101指考數甲"}, {"id": "C3-2-L4-Q4", "layer": "L4", "stem": "$P$ 為 $\\triangle ABC$ 內一點，$\\overrightarrow{AP}=a\\overrightarrow{AB}+b\\overrightarrow{AC}$（$a,b$ 相異）。設 $\\overrightarrow{AQ}=b\\overrightarrow{AB}+a\\overrightarrow{AC}$，$\\overrightarrow{AR}=a\\overrightarrow{AB}+(b-0.05)\\overrightarrow{AC}$。選出正確選項。\n(1) $Q,R$ 都在 $\\triangle ABC$ 內部　(2) $|\\overrightarrow{AP}|=|\\overrightarrow{AQ}|$　(3) $\\triangle ABP$ 面積 $=\\triangle ACQ$ 面積　(4) $\\triangle BCP$ 面積 $=\\triangle BCQ$ 面積　(5) $\\triangle ABP$ 面積 $>\\triangle ABR$ 面積", "skills": ["向量分解", "面積"], "source": "111學測A"}, {"id": "C3-2-L4-Q5", "layer": "L4", "stem": "$O,A,B$ 為不共線三點且 $\\overrightarrow{OA}\\perp\\overrightarrow{OB}$。$C,D$ 在直線 $AB$ 上，$\\overrightarrow{OC}=\\dfrac35\\overrightarrow{OA}+\\dfrac25\\overrightarrow{OB}$，$3\\overrightarrow{AD}=8\\overrightarrow{BD}$，且 $\\overrightarrow{OC}\\perp\\overrightarrow{OD}$，求 $\\dfrac{|\\overrightarrow{OB}|}{|\\overrightarrow{OA}|}$。", "skills": ["分點", "垂直"], "source": "112學測A"}, {"id": "C3-2-L4-Q6", "layer": "L4", "stem": "$\\triangle ABC$ 中 $P$ 滿足 $\\overrightarrow{AP}=\\dfrac15\\overrightarrow{AB}+\\dfrac25\\overrightarrow{AC}$，求 $\\dfrac{\\triangle ABP}{\\triangle ABC}$。\n(1) $\\dfrac15$　(2) $\\dfrac14$　(3) $\\dfrac25$　(4) $\\dfrac12$　(5) $\\dfrac23$", "skills": ["向量分解", "面積比"], "source": "92學測"}]}, {"code": "C3-3", "name": "向量線性組合與終點集", "section": "三、平面向量", "section_color": "pink", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（向量線性組合與終點集）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C3-3-L1-Q1", "layer": "L1", "stem": "設 $\\vec a=(1,2),\\vec b=(2,-1)$，將 $\\vec c=(4,3)$ 表為 $x\\vec a+y\\vec b$。", "skills": ["線性組合"], "source": "改編（線性組合）"}, {"id": "C3-3-L1-Q2", "layer": "L1", "stem": "$\\overrightarrow{OP}=t\\vec a$（$t\\in\\mathbb R$），$\\vec a=(2,1)$，描述 $P$ 的軌跡。", "skills": ["終點集"], "source": "改編（終點集）"}, {"id": "C3-3-L2-Q1", "layer": "L2", "stem": "$\\overrightarrow{OP}=t\\overrightarrow{OA}+(1-t)\\overrightarrow{OB}$，$t\\in[0,1]$，$A(1,0),B(3,4)$。求 $P$ 的軌跡。", "skills": ["終點集", "共線"], "source": "改編（終點集）"}, {"id": "C3-3-L2-Q2", "layer": "L2", "stem": "已知 $(7,8)=x(1,2)+y(3,1)$，求 $x+y$。", "skills": ["線性組合"], "source": "改編（線性組合）"}, {"id": "C3-3-L2-Q3", "layer": "L2", "stem": "$\\overrightarrow{OP}=x\\vec a+y\\vec b$，$\\vec a=(1,0),\\vec b=(0,1)$，$0\\le x\\le2,0\\le y\\le3$。求 $P$ 所成區域的面積。", "skills": ["終點集", "面積"], "source": "改編（終點集）"}, {"id": "C3-3-L2-Q4", "layer": "L2", "stem": "$\\overrightarrow{OP}=x\\vec u+y\\vec v$，$\\vec u=(2,1),\\vec v=(1,3)$，$0\\le x\\le1,0\\le y\\le1$。求 $P$ 所成區域的面積。", "skills": ["終點集", "面積"], "source": "改編（終點集）"}, {"id": "C3-3-L3-Q1", "layer": "L3", "stem": "$\\overrightarrow{OP}=x\\vec u+y\\vec v$，$\\vec u=(1,2),\\vec v=(3,1)$，$1\\le x\\le3,0\\le y\\le2$。求 $P$ 所成區域的面積。", "skills": ["終點集", "面積"], "source": "改編（終點集面積）"}, {"id": "C3-3-L3-Q2", "layer": "L3", "stem": "$\\overrightarrow{OP}=a\\overrightarrow{OA}+b\\overrightarrow{OB}$。若 $P$ 在直線 $AB$ 上，$a+b$ 之值為何？又若 $\\overrightarrow{OP}=3\\overrightarrow{OA}-2\\overrightarrow{OB}$，$P,A,B$ 是否共線？", "skills": ["共線", "終點集"], "source": "改編（共線條件）"}, {"id": "C3-3-L3-Q3", "layer": "L3", "stem": "$\\overrightarrow{OP}=x\\overrightarrow{OA}+y\\overrightarrow{OB}$，$x\\ge0,y\\ge0,x+y\\le1$，$A(4,0),B(0,3)$。求 $P$ 所成區域的面積。", "skills": ["終點集", "面積"], "source": "改編（終點集三角形）"}, {"id": "C3-3-L4-Q1", "layer": "L4", "stem": "四邊形 $ABCD$ 中 $\\overline{AB}\\parallel\\overline{DC}$，$\\overline{AC}$ 與 $\\overline{BD}$ 交於 $E$。若 $\\overrightarrow{AB}=(2,-6),\\overrightarrow{AD}=(1,5)$ 且 $\\triangle ABE$ 面積為 $3$。選出正確選項。\n(1) $\\cos\\angle BAD=-\\dfrac{7\\sqrt{65}}{65}$　(2) $\\triangle ABD$ 面積為 $9$　(3) $\\overrightarrow{AE}=\\left(\\dfrac32,\\dfrac12\\right)$　(4) 四邊形 $ABCD$ 面積為 $\\dfrac{65}3$　(5) $\\overline{BC}<\\dfrac83$", "skills": ["線性組合", "面積", "內積"], "source": "115學測A"}, {"id": "C3-3-L4-Q2", "layer": "L4", "stem": "$\\vec u=(1,2),\\vec v=(3,4)$。$\\overrightarrow{OP}=x\\vec u+y\\vec v$，$\\dfrac12\\le x\\le1$，$-3\\le y\\le\\dfrac12$。求 $P$ 所成區域的面積。", "skills": ["終點集", "面積"], "source": "105學測"}, {"id": "C3-3-L4-Q3", "layer": "L4", "stem": "$O$ 為原點，$P(2,2)$。$\\overrightarrow{OP}=\\alpha\\overrightarrow{OA}+\\beta\\overrightarrow{OB}$，其中 $0\\le\\alpha\\le1,0\\le\\beta\\le1$。選出可能的 $A,B$ 坐標。\n(1) $A(2,-3),B(-4,3)$　(2) $A(3,2),B(3,4)$　(3) $A(3,4),B(4,-1)$　(4) $A(1,2),B(2,1)$　(5) $A(1,-1),B(1,1)$", "skills": ["線性組合", "終點集"], "source": "114學測B"}, {"id": "C3-3-L4-Q4", "layer": "L4", "stem": "$A(2,3),B(-1,3)$，$O$ 為原點。$E$ 為滿足 $\\overrightarrow{OP}=a\\overrightarrow{OA}+b\\overrightarrow{OB}$（$-1\\le a\\le1,0\\le b\\le4$）的所有點 $P$ 所成區域。設 $f(x)=x^2+5$，當 $x$ 為區域 $E$ 中點 $P(x,y)$ 的橫坐標時，$f(x)$ 的最大值為何？\n(1) 5　(2) 9　(3) 30　(4) 41　(5) 54", "skills": ["線性組合", "區域", "最值"], "source": "107指考數甲"}, {"id": "C3-3-L4-Q5", "layer": "L4", "stem": "兩點 $Q_1(1,0),Q_2(-1,0)$。下列各圖形中，選出其上至少有一點 $P$ 滿足 $\\overrightarrow{PQ_1}\\cdot\\overrightarrow{PQ_2}<0$ 的選項。\n(1) $y=\\dfrac12$　(2) $y=x^2+1$　(3) $-x^2+2y^2=1$　(4) $4x^2+y^2=1$　(5) $\\dfrac{x^2}2-\\dfrac{y^2}2=1$", "skills": ["內積", "點集"], "source": "102學測"}, {"id": "C3-3-L4-Q6", "layer": "L4", "stem": "向量 $\\vec w$ 與 $\\vec v=(2,\\sqrt5)$ 互相垂直且等長。選出正確選項。\n(1) $\\vec w$ 必為 $(\\sqrt5,-2)$ 或 $(-\\sqrt5,2)$　(2) $\\vec v+\\vec w$ 與 $\\vec v-\\vec w$ 等長　(3) $\\vec v+\\vec w$ 與 $\\vec w$ 的夾角可能為 $135^\\circ$　(4) 若 $\\vec u=a\\vec v+b\\vec w$，則 $|\\vec u|=\\sqrt{a^2+b^2}$　(5) 若 $(1,0)=c\\vec v+d\\vec w$，則 $c>0$", "skills": ["線性組合", "垂直"], "source": "100學測"}]}, {"code": "C3-4", "name": "向量內積（夾角、正射影、最值）", "section": "三、平面向量", "section_color": "pink", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（向量內積（夾角、正射影、最值））失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C3-4-L1-Q1", "layer": "L1", "stem": "$\\vec a=(3,4),\\vec b=(2,-1)$，求 $\\vec a\\cdot\\vec b$ 及 $\\vec a,\\vec b$ 夾角的餘弦。", "skills": ["內積", "夾角"], "source": "改編（內積）"}, {"id": "C3-4-L1-Q2", "layer": "L1", "stem": "求 $\\vec a=(1,2)$ 在 $\\vec b=(3,4)$ 方向的正射影長。", "skills": ["正射影"], "source": "改編（正射影）"}, {"id": "C3-4-L2-Q1", "layer": "L2", "stem": "若 $\\vec a=(k,3)$ 與 $\\vec b=(2,-4)$ 垂直，求 $k$。", "skills": ["垂直", "內積"], "source": "改編（垂直）"}, {"id": "C3-4-L2-Q2", "layer": "L2", "stem": "求 $\\vec a=(1,\\sqrt3)$ 與 $\\vec b=(\\sqrt3,1)$ 的夾角。", "skills": ["夾角"], "source": "改編（夾角）"}, {"id": "C3-4-L2-Q3", "layer": "L2", "stem": "求 $\\vec a=(4,3)$ 在 $\\vec b=(1,0)$ 方向的正射影向量。", "skills": ["正射影向量"], "source": "改編（正射影向量）"}, {"id": "C3-4-L2-Q4", "layer": "L2", "stem": "已知 $|\\vec a|=3,|\\vec b|=4,\\vec a\\cdot\\vec b=6$，求 $|\\vec a+\\vec b|$。", "skills": ["內積", "長度"], "source": "改編（長度）"}, {"id": "C3-4-L3-Q1", "layer": "L3", "stem": "點 $P$ 在圓 $x^2+y^2=4$ 上，$A(3,0)$，求 $\\overrightarrow{OP}\\cdot\\overrightarrow{OA}$ 的最大值與最小值。", "skills": ["內積", "最值"], "source": "改編（內積最值）"}, {"id": "C3-4-L3-Q2", "layer": "L3", "stem": "向量 $\\vec a=(2,1)$，$\\vec b$ 為單位向量，求 $\\vec a\\cdot\\vec b$ 的最大值及此時的 $\\vec b$。", "skills": ["內積", "最值"], "source": "改編（內積最值）"}, {"id": "C3-4-L3-Q3", "layer": "L3", "stem": "利用正射影，求點 $P(5,6)$ 到通過原點、方向 $\\vec u=(3,4)$ 的直線的距離。", "skills": ["正射影", "距離"], "source": "改編（正射影求距離）"}, {"id": "C3-4-L4-Q1", "layer": "L4", "stem": "坐標平面上，向量 $(a,b)$ 與直線 $y=bx-1$ 垂直，求 $a+b$ 的最大可能值。", "skills": ["垂直", "最值"], "source": "115學測A"}, {"id": "C3-4-L4-Q2", "layer": "L4", "stem": "向量 $\\vec v$ 在 $(2,-3)$ 方向的正射影長比原長少 $1$，在 $(3,2)$ 方向的正射影長比原長少 $2$。若 $\\vec v$ 與 $(2,-3),(3,2)$ 的夾角皆為銳角， const SUB   = [{"name": "直線與圓", "codes": ["C1-1", "C1-2", "C1-3", "C1-4", "C1-5", "C1-6", "C1-7", "C2-1", "C2-2", "C2-3", "C2-4"]}, {"name": "平面向量", "codes": ["C3-1", "C3-2", "C3-3", "C3-4"]}];
const TOPIC = "主題三 平面坐標與向量";

const LAYER={L1:'例題',L2:'練習',L3:'挑戰',L4:'歷屆'};
const LCOLOR={L1:'#81c784',L2:'#66bb6a',L3:'#43a047',L4:'#2e7d32'};
const SECCLS={green:'green',blue:'blue',pink:'pink',amber:'amber'};
const TORD=['基礎','進階','挑戰','大考'];
const TCOLOR={'基礎':'#1565c0','進階':'#2e7d32','挑戰':'#e65100','大考':'#c2185b'};
const MARK=new Set();

function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function disp(s){return esc(s).replace(/\n/g,'<br>');}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function mj(el){if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise([el]);}
function V(){return document.getElementById('view');}
function setCrumb(html){document.getElementById('crumb').innerHTML=html;}
function nodesOf(i){const set=new Set(SUB[i].codes);return DATA.nodes.filter(n=>set.has(n.code));}
function khCount(i){return TORD.reduce((s,T)=>s+((KH.pages[i].tiers[T]||[]).length),0);}
function drillCount(i){return nodesOf(i).reduce((s,n)=>s+n.questions.length,0);}
function wrongSet(){return new Set([].slice.call(V().querySelectorAll('input:checked')).map(c=>c.id));}
function updCnt(){['khcnt','drcnt'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=V().querySelectorAll('input:checked').length;});}
function mark(cb){if(cb.checked)MARK.add(cb.id);else MARK.delete(cb.id);updCnt();}
function restoreMarks(){V().querySelectorAll('input[type=checkbox]').forEach(c=>{c.checked=MARK.has(c.id);});}
function clearView(){V().querySelectorAll('input:checked').forEach(c=>{c.checked=false;MARK.delete(c.id);});updCnt();V().querySelectorAll('.report').forEach(r=>r.classList.remove('show'));}

/* ---------- 生成器補強 ---------- */
function drawInto(boxId,code,n){
  const box=document.getElementById(boxId); if(!box)return;
  const arr=(POOL[code]||[]).slice();
  if(!arr.length){box.innerHTML='<div class="simhdr">此節點暫無生成器題庫。</div>';return;}
  shuffle(arr); const pick=arr.slice(0,Math.min(n,arr.length));
  let h='<div class="simhdr">補強練習 · 隨機 '+pick.length+' 題（參數化生成器，每次重抽不同）</div>';
  pick.forEach((q,i)=>{h+='<div class="simq"><div class="simstem"><b>'+(i+1)+'.</b> 〔'+esc(q.type)+'〕 '+disp(q.stem)+'</div>'
    +'<button class="ansbtn" onclick="this.nextElementSibling.classList.toggle(\'show\')">看答案／詳解</button>'
    +'<div class="simans">答：'+disp(q.answer)+'<br><span class="sol">詳解：'+disp(q.solution)+'</span></div></div>';});
  box.innerHTML=h; mj(box);
}
function drawSimilar(code,n){drawInto('sim-'+code,code,n);}
function drawKH(code,n){drawInto('simkh-'+code,code,n);}

function khReport(i){
  const p=KH.pages[i], wrong=wrongSet(), tot=khCount(i), w=wrong.size, rate=tot?Math.round((tot-w)/tot*100):100;
  let h='<h2>課後練習弱點報告 · '+esc(p.name)+'</h2>';
  h+='<div class="sec"><h3>① 整體</h3>答對率 <b style="color:var(--g);font-size:20px">'+rate+'%</b>　（共 '+tot+' 題，答錯 '+w+'）</div>';
  h+='<div class="sec"><h3>② 各層失分</h3><div class="lay">';
  TORD.forEach(T=>{const a=p.tiers[T]||[]; if(!a.length)return; const ww=a.filter(q=>wrong.has(q.id)).length, c=a.length?Math.round((a.length-ww)/a.length*100):100;
    h+='<div class="box" style="border-top:4px solid '+TCOLOR[T]+'"><div>'+T+'</div><div class="n" style="color:'+TCOLOR[T]+'">'+c+'%</div><div class="note">答對 '+(a.length-ww)+'/'+a.length+'</div></div>';});
  h+='</div></div>';
  h+='<div class="sec"><h3>③ 加強建議</h3>';
  const codes=(p.map||[]).filter(c=>POOL[c]&&POOL[c].length);
  if(w===0){h+='<div class="empty">這次課後練習全部答對 👍　仍可進四層練習本挑戰更難的題。</div>'
    +'<div class="path"><button class="btn-drill" onclick="go(\'drill\','+i+')">▶ 進入【四層練習本】：'+esc(p.name)+'（'+drillCount(i)+' 題 L1–L4）</button></div>';}
  else{h+='<div class="path">這個單元有錯，建議逐層加強：<br>'
    +'<button class="btn-drill" onclick="go(\'drill\','+i+')">▶ 進入【四層練習本】系統加強：'+esc(p.name)+'（'+drillCount(i)+' 題 L1例題→L4歷屆）</button>';
    if(codes.length)h+='<br><span class="note">或先抽幾題生成器類似題暖身：</span><br>'
      +codes.map(c=>'<button class="btn-sim" onclick="drawKH(\''+c+'\',3)">🔁 '+c+' 抽 3 題</button> <div class="simbox" id="simkh-'+c+'"></div>').join('');
    h+='</div>';}
  h+='</div>';
  h+='<div class="sec" style="border-bottom:0"><button class="btn" onclick="exportTxt(\'kh\','+i+')">📤 匯出弱點報告（傳老師）</button></div>';
  const r=document.getElementById('report'); r.innerHTML=h; r.classList.add('show'); mj(r); r.scrollIntoView({behavior:'smooth'});
}

    const by={}; n.questions.forEach(q=>{(by[q.layer]=by[q.layer]||[]).push(q);});
    ['L1','L2','L3','L4'].forEach(L=>{if(!by[L])return; h+='<div class="layer"><h3>'+L+'　'+LAYER[L]+'</h3>';
      by[L].forEach((q,idx)=>{const src=(L==='L4'&&q.source)?'<span class="src">〔'+esc(q.source)+'〕</span> ':'';
        h+='<div class="q"><input type="checkbox" id="'+q.id+'" onchange="mark(this)"><label for="'+q.id+'">'
          +'<span class="tag">'+LAYER[L]+(idx+1)+'</span>'+src+disp(q.stem)+'</label></div>';});
      h+='</div>';});
    h+='</div>';});
  V().innerHTML=h; restoreMarks(); updCnt(); mj(V()); window.scrollTo(0,0);
}
function drillReport(i){
  const ns=nodesOf(i), wrong=wrongSet();
  const total=ns.reduce((s,n)=>s+n.questions.length,0), correct=total-wrong.size, rate=total?Math.round(correct/total*100):100;
  const nodeStat=ns.map(n=>{const w=n.questions.filter(q=>wrong.has(q.id)).length;return{code:n.code,name:n.name,page:n.handout_page,sec:n.section,tot:n.questions.length,w:w,pct:Math.round(w/n.questions.length*100),tip:n.remediation_tip||''};});
  const lay={L1:[0,0],L2:[0,0],L3:[0,0],L4:[0,0]};
  ns.forEach(n=>n.questions.forEach(q=>{lay[q.layer][1]++;if(wrong.has(q.id))lay[q.layer][0]++;}));
  const lvl=p=>p>=50?'red':p>=30?'yel':'grn',lvlc={red:'var(--red)',yel:'var(--yel)',grn:'var(--grn)'},lvlt={red:'需加強',yel:'要留意',grn:'已掌握'};
  const donut='background:conic-gradient(var(--g) 0 '+rate+'%, #e0a3a3 '+rate+'% 100%);';
  let h='<h2>四層弱點分析報告 · '+esc(KH.pages[i].name)+'</h2>';
  h+='<div class="sec"><h3>① 整體統計</h3><div class="kpi"><div class="donut" style="'+donut+'"></div><div><div class="big">'+rate+'%</div>答對率</div><div>總題數 <b>'+total+'</b>　答對 <b style="color:var(--grn)">'+correct+'</b>　答錯 <b style="color:var(--red)">'+wrong.size+'</b></div></div></div>';
  h+='<div class="sec"><h3>② 觀念節點紅綠燈</h3>';
  nodeStat.forEach(s=>{const L=lvl(s.pct);h+='<div class="tl"><span class="name"><span class="dot" style="background:'+lvlc[L]+'"></span>'+s.code+' '+esc(s.name)+'</span><span class="track"><span class="fill" style="width:'+Math.max(s.pct,3)+'%;background:'+lvlc[L]+'"></span></span><span class="pct">'+s.w+'/'+s.tot+'　'+lvlt[L]+'</span></div>';});
  h+='<div class="note">紅：錯 ≥50%　·　黃：30–49%　·　綠：&lt;30%</div></div>';
  h+='<div class="sec"><h3>③ 認知層次失分</h3><div class="lay">';
  ['L1','L2','L3','L4'].forEach(L=>{const a=lay[L],w=a[0],t=a[1],c=t?Math.round((t-w)/t*100):100;h+='<div class="box" style="border-top:4px solid '+LCOLOR[L]+'"><div>'+L+' '+LAYER[L]+'</div><div class="n" style="color:'+LCOLOR[L]+'">'+c+'%</div><div class="note">答對 '+(t-w)+'/'+t+'</div></div>';});
  h+='</div></div>';
  h+='<div class="sec"><h3>④ 補強路徑（依失分優先序）</h3>';
  const need=nodeStat.filter(s=>s.w>0).sort((a,b)=>b.pct-a.pct);
  if(!need.length)h+='<div class="empty">這次沒有勾選錯題，無補強項目。</div>';
  else need.forEach(s=>{h+='<div class="path"><b>'+s.code+' '+esc(s.name)+'</b>（'+esc(s.sec)+'，錯 '+s.w+'/'+s.tot+'）　→　講義 <b>P.'+esc(s.page||'')+'</b>。<br>'+esc(s.tip)+(POOL[s.code]?'<br><button class="btn-sim" onclick="drawSimilar(\''+s.code+'\',3)">🔁 補強練習：抽 3 題生成器類似題（可重抽）</button><div class="simbox" id="sim-'+s.code+'"></div>':'')+'</div>';});
  h+='</div>';
  h+='<div class="sec" style="border-bottom:0"><button class="btn2" onclick="go(\'kh\','+i+')">← 返回課後練習</button>　<button class="btn" onclick="exportTxt(\'drill\','+i+')">📤 匯出弱點報告（傳老師）</button></div>';
  const r=document.getElementById('report'); r.innerHTML=h; r.classList.add('show'); mj(r); r.scrollIntoView({behavior:'smooth'});
}

/* ---------- 匯出 ---------- */
function exportTxt(kind,i){
  const name=(prompt('請輸入你的姓名（會附在報告上方，傳給老師）：','')||'（未填姓名）').trim()||'（未填姓名）';
  const p=KH.pages[i], wrong=wrongSet(), dt=new Date(), ds=dt.getFullYear()+'/'+(dt.getMonth()+1)+'/'+dt.getDate();
  let t;
  if(kind==='kh'){const tot=khCount(i),w=wrong.size;
    t='【'+TOPIC+'｜'+p.name+'｜課後練習弱點】\n姓名：'+name+'\n日期：'+ds+'\n答對率：'+(tot?Math.round((tot-w)/tot*100):100)+'%（共 '+tot+' 題，答錯 '+w+'）\n各層失分：';
    TORD.forEach(T=>{const a=p.tiers[T]||[];if(!a.length)return;t+=T+' '+a.filter(q=>wrong.has(q.id)).length+'/'+a.length+'　';});
    t+='\n— 牛夫子數學教室　錯題練習系統 —';
  }else{const ns=nodesOf(i),tot=ns.reduce((s,n)=>s+n.questions.length,0),w=wrong.size;
    const need=ns.map(n=>({code:n.code,name:n.name,w:n.questions.filter(q=>wrong.has(q.id)).length,tot:n.questions.length})).filter(s=>s.w>0).sort((a,b)=>b.w/b.tot-a.w/a.tot);
    t='【'+TOPIC+'｜'+p.name+'｜四層練習本弱點】\n姓名：'+name+'\n日期：'+ds+'\n答對率：'+(tot?Math.round((tot-w)/tot*100):100)+'%（共 '+tot+' 題，答錯 '+w+'）\n需加強節點：\n';
    if(!need.length)t+='（本次全部答對）\n';else need.forEach(s=>{t+='・'+s.code+' '+s.name+'：錯 '+s.w+'/'+s.tot+'\n';});
    t+='— 牛夫子數學教室　錯題練習系統 —';}
  let ov=document.getElementById('expov');
  if(!ov){ov=document.createElement('div');ov.id='expov';ov.className='expov';document.body.appendChild(ov);}
  ov.innerHTML='<div class="expbox"><h4>弱點報告　·　複製或下載後，貼到牛夫子 LINE@ 傳給老師</h4><textarea id="exptxt" readonly></textarea><div class="exprow"><button id="expCopyBtn" onclick="expCopy()">複製到剪貼簿</button><button onclick="expDl()">下載 .txt</button><button onclick="expClose()">關閉</button></div></div>';
  const ta=document.getElementById('exptxt'); ta.value=t; ta.dataset.name=name; ov.style.display='flex';
}
function expCopy(){var v=document.getElementById('exptxt').value;var done=function(){var b=document.getElementById('expCopyBtn');if(b)b.textContent='已複製 ✓';};if(navigator.clipboard){navigator.clipboard.writeText(v).then(done,function(){var t=document.getElementById('exptxt');t.select();document.execCommand('copy');done();});}else{var t=document.getElementById('exptxt');t.select();document.execCommand('copy');done();}}
function expDl(){var t=document.getElementById('exptxt'),v=t.value,nm=t.dataset.name||'student';var blob=new Blob([v],{type:'text/plain;charset=utf-8'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='弱點報告_'+nm+'.txt';a.click();}
function expClose(){var o=document.getElementById('expov');if(o)o.style.display='none';}

/* ---------- 路由 ---------- */
function go(type,i){ if(type==='menu')renderMenu(); else if(type==='kh')renderKH(i); else if(type==='drill')renderDrill(i); }
renderMenu();
if(window.MathJax&&MathJax.startup&&MathJax.startup.promise)MathJax.startup.promise.then(()=>mj(V()));

</script>
