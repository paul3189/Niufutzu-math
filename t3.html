 "source": "改編（反射）"}, {"id": "C1-5-L4-Q1", "layer": "L4", "stem": "坐標平面上點 $A(1,2)$ 到直線 $L$ 的垂足是 $D(3,2)$。問 $A$ 對 $L$ 的對稱點是下列哪一點？\n(1) $(-2,0)$　(2) $(-1,2)$　(3) $(2,0)$　(4) $(2,2)$　(5) $(5,2)$", "skills": ["對稱點", "垂足"], "source": "85學測"}, {"id": "C1-5-L4-Q2", "layer": "L4", "stem": "一道光線通過原點 $O$ 後沿 $y$ 軸射向直線 $L:y=\\dfrac12x+1$，碰到 $L$ 後依「入射角等於反射角」反射，反射後通過 $x$ 軸上的 $R$ 點，求 $R$ 的 $x$ 坐標。", "skills": ["反射", "對稱"], "source": "92學測補考"}, {"id": "C1-5-L4-Q3", "layer": "L4", "stem": "設 $A$ 為直線 $3x-y=0$ 上一點，$B$ 為 $x$ 軸上一點。若 $\\overline{AB}$ 的中點為 $\\left(\\dfrac72,6\\right)$，求 $A$ 與 $B$ 的坐標。", "skills": ["中點", "對稱"], "source": "97學測"}, {"id": "C1-5-L4-Q4", "layer": "L4", "stem": "甲、乙兩村坐標為 $(-5,2)$、$(-15,-1)$，河流位於直線 $x-y=0$。甲村人先至乙村，再到河流取水後返回甲村。若總路徑最短，求取水點的 $x$ 坐標。", "skills": ["反射", "最短路徑"], "source": "師大附中113上高一第三次段考"}, {"id": "C1-5-L4-Q5", "layer": "L4", "stem": "坐標平面上 $A(4,3)$，動點 $P$ 在 $x$ 軸上、動點 $Q$ 在直線 $y=x$ 上，求 $\\overline{AP}+\\overline{PQ}+\\overline{QA}$ 的最小值（化為最簡根式）。", "skills": ["雙對稱", "最短路徑"], "source": "110學測臺北數A第1次模考"}, {"id": "C1-5-L4-Q6", "layer": "L4", "stem": "已知 $A(1,a)$、$B(3,b)$ 對直線 $y=x$ 的對稱點 $A'$、$B'$ 均在 $y=\\log_2 x$ 的圖形上。試問梯形 $ABB'A'$ 的高為何？\n(1) $5$　(2) $5\\sqrt2$　(3) $4$　(4) $4\\sqrt2$　(5) $3$", "skills": ["對稱點", "兩平行線距離"], "source": "111學測新竹數B第3次模考"}]}, {"code": "C1-6", "name": "點到線、兩平行線距離", "section": "一、直線與其方程式", "section_color": "blue", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（點到線、兩平行線距離）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C1-6-L1-Q1", "layer": "L1", "stem": "求點 $P(3,4)$ 到直線 $L:3x-4y+5=0$ 的距離。", "skills": ["點到直線距離"], "source": "改編（點線距離）"}, {"id": "C1-6-L1-Q2", "layer": "L1", "stem": "求兩平行線 $3x+4y-5=0$ 與 $3x+4y+15=0$ 的距離。", "skills": ["兩平行線距離"], "source": "改編（平行線距離）"}, {"id": "C1-6-L2-Q1", "layer": "L2", "stem": "求點 $(-1,2)$ 到直線 $5x+12y-3=0$ 的距離。", "skills": ["點到直線距離"], "source": "改編（點線距離）"}, {"id": "C1-6-L2-Q2", "layer": "L2", "stem": "直線 $L$ 通過原點，且點 $(3,1)$ 到 $L$ 的距離為 $1$，求 $L$ 的斜率。", "skills": ["點到直線距離"], "source": "改編（點線距離）"}, {"id": "C1-6-L2-Q3", "layer": "L2", "stem": "求與直線 $L:4x-3y+2=0$ 平行且距離為 $3$ 的直線方程式。", "skills": ["兩平行線距離"], "source": "改編（平行線距離）"}, {"id": "C1-6-L2-Q4", "layer": "L2", "stem": "點 $P$ 在 $y$ 軸上且到直線 $3x+4y-12=0$ 的距離為 $2$，求 $P$。", "skills": ["點到直線距離"], "source": "改編（點線距離）"}, {"id": "C1-6-L3-Q1", "layer": "L3", "stem": "$\\triangle ABC$ 頂點 $A(1,1),B(5,3),C(2,6)$，求頂點 $C$ 到對邊 $\\overline{AB}$ 的距離（高）與三角形面積。", "skills": ["點到直線距離", "面積"], "source": "改編（高與面積）"}, {"id": "C1-6-L3-Q2", "layer": "L3", "stem": "求到兩平行線 $x+y-1=0$ 與 $x+y-7=0$ 等距、且到點 $(2,0)$ 距離為 $\\sqrt2$ 的點。", "skills": ["等距", "兩平行線距離"], "source": "改編（等距）"}, {"id": "C1-6-L3-Q3", "layer": "L3", "stem": "坐標平面上 $L$ 為水平線，$L_1,L_2$ 的斜率分別為 $\\dfrac34,-\\dfrac43$。已知 $L$ 被 $L_1,L_2$ 截出的線段長為 $30$，求 $L,L_1,L_2$ 所決定的三角形的面積。", "skills": ["垂直", "距離", "面積"], "source": "106指考數甲"}, {"id": "C1-6-L4-Q1", "layer": "L4", "stem": "坐標平面上有兩條平行直線，它們的 $x$ 截距相差 $20$、$y$ 截距相差 $15$，求這兩條平行直線的距離。", "skills": ["兩平行線距離"], "source": "98學測"}, {"id": "C1-6-L4-Q2", "layer": "L4", "stem": "給定 $A(1,0)$、$B(0,1)$，另有 $P(\\pi,1)$、$Q(-\\sqrt3,6)$、$R(2,\\log_4 32)$。令 $\\triangle PAB$、$\\triangle QAB$、$\\triangle RAB$ 面積分別為 $p,q,r$，下列何者正確？\n(1) $p<q<r$　(2) $p<r<q$　(3) $q<p<r$　(4) $q<r<p$　(5) $r<q<p$", "skills": ["點到直線距離", "面積"], "source": "99學測"}, {"id": "C1-6-L4-Q3", "layer": "L4", "stem": "某國領海基線為直線 $L:4x+3y-12=0$ 上的某線段，「領海」為基線外側 $12$ 浬內的海域，且 $(5,5)$ 位於基線內側。試問該段領海介於 $L$ 與下列哪一條直線之間？\n(1) $4x+3y+48=0$　(2) $4x+3y+18=0$　(3) $4x+3y=0$　(4) $4x+3y-24=0$　(5) $4x+3y-72=0$", "skills": ["兩平行線距離"], "source": "115學測B"}, {"id": "C1-6-L4-Q4", "layer": "L4", "stem": "兩平行線 $L_1,L_2$ 的 $x$ 截距相差 $65$、$y$ 截距相差 $156$，求兩平行線之間的距離。", "skills": ["兩平行線距離"], "source": "中山女高113上高一第三次段考"}, {"id": "C1-6-L4-Q5", "layer": "L4", "stem": "直線 $L$ 滿足 $A(1,1)$ 到 $L$ 的距離為 $2$、$B(8,0)$ 到 $L$ 的距離為 $7$。求滿足條件中斜率最小的 $L$ 的方程式。", "skills": ["點到直線距離", "公切線"], "source": "112學測全國數A第4次模考"}, {"id": "C1-6-L4-Q6", "layer": "L4", "stem": "已知 $L_1:5x+12y=60$、$L_2:12x+5y=60$，下列哪一條直線與 $L_1,L_2$ 所圍三角形面積最大？\n(1) $3x-4y=-10$　(2) $3x-4y=-5$　(3) $3x-4y=0$　(4) $3x-4y=5$　(5) $3x-4y=10$", "skills": ["點到直線距離", "面積"], "source": "111學測臺北數A第1次模考"}]}, {"code": "C1-7", "name": "直線系", "section": "一、直線與其方程式", "section_color": "blue", "difficulty_grade": "冷門", "handout_page": "", "remediation_tip": "若本節（直線系）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C1-7-L1", "layer": "L1", "stem": "求通過兩直線 $x+y-3=0$ 與 $2x-y=0$ 的交點、且通過點 $(4,1)$ 的直線方程式。", "skills": ["直線系", "交點"], "source": "改編（直線系）"}, {"id": "C1-7-L2-Q1", "layer": "L2", "stem": "無論實數 $m$ 為何，直線 $(2x+y-4)+m(x-y+1)=0$ 必通過一定點，求此定點。", "skills": ["直線系", "定點"], "source": "改編（定點）"}, {"id": "C1-7-L2-Q2", "layer": "L2", "stem": "無論 $m$ 值為何，直線 $L:mx-y-3m+2=0$ 必通過 $P$ 點，求 $P$ 點坐標。", "skills": ["直線系", "定點"], "source": "成功高中110上高一第二次段考"}, {"id": "C1-7-L3", "layer": "L3", "stem": "在直線系 $(x+2y-5)+\\lambda(2x-y)=0$ 中，求與直線 $3x+y=0$ 平行的那一條的方程式。", "skills": ["直線系", "平行"], "source": "改編（直線系）"}, {"id": "C1-7-L4", "layer": "L4", "stem": "四條直線 $L_1:x-y=1$、$L_2:x+y=4$、$L_3:8x+y=-10$、$L_4:x=2$ 圍成一個四邊形，求此四邊形較短的對角線長度。", "skills": ["直線交點", "兩點距離"], "source": "84學測"}]}, {"code": "C2-1", "name": "圓的方程式（三形式）", "section": "二、圓", "section_color": "green", "difficulty_grade": "冷門", "handout_page": "", "remediation_tip": "若本節（圓的方程式（三形式））失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C2-1-L1", "layer": "L1", "stem": "求圓心 $(2,-3)$、半徑 $5$ 的圓的標準式與一般式。", "skills": ["標準式", "一般式"], "source": "改編（圓方程式）"}, {"id": "C2-1-L2-Q1", "layer": "L2", "stem": "求圓 $x^2+y^2-6x+4y-12=0$ 的圓心與半徑。", "skills": ["一般式", "配方"], "source": "改編（配方）"}, {"id": "C2-1-L2-Q2", "layer": "L2", "stem": "以 $A(1,2)$、$B(5,8)$ 為直徑兩端點，求圓方程式。", "skills": ["直徑式"], "source": "改編（直徑式）"}, {"id": "C2-1-L3", "layer": "L3", "stem": "求過三點 $O(0,0)$、$A(6,0)$、$B(0,8)$ 的圓方程式及其半徑。", "skills": ["三點定圓"], "source": "改編（三點定圓）"}, {"id": "C2-1-L4", "layer": "L4", "stem": "在坐標平面上，以 $(1,1),(-1,1),(-1,-1),(1,-1)$ 為頂點的正方形，與圓 $x^2+y^2+2x+2y+1=0$ 有幾個交點？\n(1) 1　(2) 2　(3) 3　(4) 4　(5) 0", "skills": ["一般式", "圓與正方形"], "source": "103學測"}]}, {"code": "C2-2", "name": "圓與點、圓與直線關係", "section": "二、圓", "section_color": "green", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（圓與點、圓與直線關係）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C2-2-L1-Q1", "layer": "L1", "stem": "判別點 $(4,3)$ 與圓 $x^2+y^2=16$ 的位置關係。", "skills": ["點與圓"], "source": "改編（點與圓）"}, {"id": "C2-2-L1-Q2", "layer": "L1", "stem": "求圓 $x^2+y^2=25$ 被直線 $3x+4y=20$ 所截的弦長。", "skills": ["弦長"], "source": "改編（弦長）"}, {"id": "C2-2-L2-Q1", "layer": "L2", "stem": "圓 $(x-1)^2+(y-2)^2=r^2$ 通過點 $(4,6)$，求 $r$。", "skills": ["點與圓"], "source": "改編（點與圓）"}, {"id": "C2-2-L2-Q2", "layer": "L2", "stem": "判別直線 $x+y=5$ 與圓 $(x-1)^2+(y-1)^2=4$ 的關係。", "skills": ["直線與圓"], "source": "改編（位置關係）"}, {"id": "C2-2-L2-Q3", "layer": "L2", "stem": "直線 $y=x+k$ 與圓 $x^2+y^2=8$ 相切，求 $k$。", "skills": ["相切"], "source": "改編（相切）"}, {"id": "C2-2-L2-Q4", "layer": "L2", "stem": "求圓 $x^2+y^2=20$ 上的點到直線 $x+2y-15=0$ 的最短距離。", "skills": ["點與圓", "距離"], "source": "改編（最短距離）"}, {"id": "C2-2-L3-Q1", "layer": "L3", "stem": "求圓 $x^2+y^2-2x-4y-4=0$ 被 $y$ 軸所截的弦長。", "skills": ["弦長"], "source": "改編（弦長）"}, {"id": "C2-2-L3-Q2", "layer": "L3", "stem": "過點 $(1,3)$ 的直線截圓 $x^2+y^2=5$ 得弦長 $4$，求弦所在直線。", "skills": ["弦長", "直線方程式"], "source": "改編（弦）"}, {"id": "C2-2-L3-Q3", "layer": "L3", "stem": "圓 $x^2+y^2=25$ 上有幾個點到直線 $3x+4y=10$ 的距離等於 $1$？", "skills": ["點與圓", "距離"], "source": "改編（定距點數）"}, {"id": "C2-2-L4-Q1", "layer": "L4", "stem": "設 $\\Gamma:x^2+y^2-10x+9=0$。下列哪些選項正確？\n(1) $\\Gamma$ 的圓心為 $(5,0)$　(2) $\\Gamma$ 上的點到 $L:3x+4y-15=0$ 的最遠距離為 $4$　(3) $L_1:3x+4y+15=0$ 與 $\\Gamma$ 相切　(4) $\\Gamma$ 上恰有兩點與 $L_2:3x+4y=0$ 距離為 $2$　(5) $\\Gamma$ 上恰有四點與 $L_3:3x+4y-5=0$ 距離為 $2$", "skills": ["點與圓", "距離"], "source": "97學測"}, {"id": "C2-2-L4-Q2", "layer": "L4", "stem": "圓 $C$ 的圓心在原點且半徑為 $2$，已知直線 $L$ 與 $C$ 相交。則 $L$ 與下列哪些圖形一定相交？\n(1) $x$ 軸　(2) $y=(\\tfrac12)^x$　(3) $x^2+y^2=3$　(4) $(x-2)^2+y^2=16$　(5) $\\dfrac{x^2}9+\\dfrac{y^2}4=1$", "skills": ["直線與圓", "包含關係"], "source": "100學測"}, {"id": "C2-2-L4-Q3", "layer": "L4", "stem": "一圓與直線 $x-y=1$ 及直線 $x-y=5$ 所截的弦長皆為 $\\sqrt{14}$，求此圓的面積為 ___ $\\pi$。", "skills": ["弦長", "平行弦"], "source": "102學測"}, {"id": "C2-2-L4-Q4", "layer": "L4", "stem": "點 $A(1,0)$ 在單位圓 $\\Gamma:x^2+y^2=1$ 上。除 $A$ 外，$\\Gamma$ 上還有幾個點到直線 $L:y=2x$ 的距離等於 $A$ 到 $L$ 的距離？\n(1) 1　(2) 2　(3) 3　(4) 4　(5) 0", "skills": ["點與圓", "距離"], "source": "108學測"}, {"id": "C2-2-L4-Q5", "layer": "L4", "stem": "圓 $\\Gamma$ 滿足 $(0,0)$ 在其外部、$(2,6)$ 在其內部。下列哪一選項必定成立？\n(1) 圓心在 $y$ 軸右方　(2) 半徑 $<\\sqrt{40}$　(3) 半徑 $>1$　(4) 圓心 $x$ 坐標 $>1$　(5) 圓心到 $(0,0)$ 的距離 $>$ 圓心到 $(2,6)$ 的距離", "skills": ["點與圓"], "source": "106學測"}, {"id": "C2-2-L4-Q6", "layer": "L4", "stem": "$L_1,L_2$ 為通過 $(3,1)$ 且斜率分別為 $m,-m$ 的兩直線。$\\Gamma$ 為圓心在原點的圓，與 $L_1$ 交於相異兩點 $A,B$ 且圓心到 $L_1$ 的距離為 $1$，又 $\\Gamma$ 與 $L_2$ 相切。求弦 $\\overline{AB}$ 的長度。", "skills": ["弦長", "相切"], "source": "114學測A"}]}, {"code": "C2-3", "name": "圓的切線四情形", "section": "二、圓", "section_color": "green", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（圓的切線四情形）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C2-3-L1-Q1", "layer": "L1", "stem": "求圓 $x^2+y^2=25$ 在其上一點 $P(3,4)$ 的切線方程式。", "skills": ["圓上點切線"], "source": "改編（切線）"}, {"id": "C2-3-L1-Q2", "layer": "L1", "stem": "求斜率為 $2$ 且與圓 $x^2+y^2=5$ 相切的直線方程式。", "skills": ["斜率切線"], "source": "改編（切線）"}, {"id": "C2-3-L2-Q1", "layer": "L2", "stem": "求點 $P(7,1)$ 到圓 $x^2+y^2=10$ 的切線長。", "skills": ["切線長"], "source": "改編（切線長）"}, {"id": "C2-3-L2-Q2", "layer": "L2", "stem": "求圓 $(x-1)^2+(y-2)^2=10$ 在點 $(4,3)$ 的切線方程式。", "skills": ["圓上點切線"], "source": "改編（切線）"}, {"id": "C2-3-L2-Q3", "layer": "L2", "stem": "求斜率 $-1$ 且與圓 $(x-2)^2+(y+1)^2=8$ 相切的直線。", "skills": ["斜率切線"], "source": "改編（切線）"}, {"id": "C2-3-L2-Q4", "layer": "L2", "stem": "過點 $(3,1)$ 作圓 $x^2+y^2=5$ 的兩條切線，求切線的斜率。", "skills": ["圓外點切線"], "source": "改編（切線）"}, {"id": "C2-3-L3-Q1", "layer": "L3", "stem": "求兩圓 $x^2+y^2=4$ 與 $(x-5)^2+y^2=1$ 的公切線條數。", "skills": ["兩圓公切線"], "source": "改編（公切線）"}, {"id": "C2-3-L3-Q2", "layer": "L3", "stem": "自點 $A(4,2)$ 向圓 $x^2+y^2=4$ 作兩切線，切點為 $P,Q$，求切點弦 $\\overline{PQ}$ 所在直線方程式。", "skills": ["切點弦", "極線"], "source": "改編（切點弦）"}, {"id": "C2-3-L3-Q3", "layer": "L3", "stem": "動點 $P$ 在直線 $x+y=6$ 上，求 $P$ 到圓 $x^2+y^2=4$ 的切線長的最小值。", "skills": ["切線長", "最值"], "source": "改編（切線長最值）"}, {"id": "C2-3-L4-Q1", "layer": "L4", "stem": "試選出所有與圓 $(x-2)^2+(y-2)^2=2$ 相切的直線。\n(1) $x+y+2=0$　(2) $x-y-2=0$　(3) $x-y+2=0$　(4) $x=0$　(5) $y=0$", "skills": ["切線判別"], "source": "110學測數B試辦考"}, {"id": "C2-3-L4-Q2", "layer": "L4", "stem": "若直線 $L:y=mx+3$ 與圓 $x^2+y^2+2x=3$ 相切，求 $m$。", "skills": ["斜率切線"], "source": "83學測"}, {"id": "C2-3-L4-Q3", "layer": "L4", "stem": "一圓通過點 $(-2,7)$，且與直線 $4x+3y-14=0$ 相切於點 $(-1,6)$。若圓方程式為 $x^2+y^2+ax+by+c=0$，求 $a,b,c$。", "skills": ["切點", "切線", "圓方程式"], "source": "96指考數甲"}, {"id": "C2-3-L4-Q4", "layer": "L4", "stem": "選出與圓 $(x-3)^2+(y-4)^2=25$ 相切的直線。\n(1) $3x+4y=5$　(2) $3x+4y=0$　(3) $4x+3y=5$　(4) $4x+3y=0$　(5) $4x+3y=1$", "skills": ["切線判別"], "source": "95指考數乙"}, {"id": "C2-3-L4-Q5", "layer": "L4", "stem": "設 $m$ 為實數。若圓 $x^2+y^2-4x+7y+10=0$ 與直線 $y=m(x-3)$ 的兩交點位於不同象限，且滿足此條件的 $m$ 之最大範圍為 $a<m<b$，求 $a,b$。", "skills": ["直線與圓", "象限"], "source": "102指考數甲"}, {"id": "C2-3-L4-Q6", "layer": "L4", "stem": "$A,B$ 兩點距離為 $5$，$\\Gamma$ 為以 $A$ 為圓心、半徑 $r$（$0<r<5$）的圓。自 $B$ 作 $\\Gamma$ 的切線，切於 $P$。求 $\\triangle PAB$ 的最大面積。", "skills": ["切線長", "最值"], "source": "107學測"}]}, {"code": "C2-4", "name": "圓與圓、圓系", "section": "二、圓", "section_color": "green", "difficulty_grade": "冷門", "handout_page": "", "remediation_tip": "若本節（圓與圓、圓系）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C2-4-L1", "layer": "L1", "stem": "判別兩圓 $x^2+y^2=4$ 與 $(x-3)^2+(y-4)^2=9$ 的位置關係。", "skills": ["兩圓位置"], "source": "改編（兩圓位置）"}, {"id": "C2-4-L2-Q1", "layer": "L2", "stem": "求兩圓 $x^2+y^2=10$ 與 $x^2+y^2-4x-2y=0$ 的公共弦所在直線方程式。", "skills": ["公共弦"], "source": "改編（公共弦）"}, {"id": "C2-4-L2-Q2", "layer": "L2", "stem": "求過兩圓 $x^2+y^2-4=0$ 與 $x^2+y^2-2x-3=0$ 的交點、且過點 $(1,1)$ 的圓方程式。", "skills": ["圓系"], "source": "改編（圓系）"}, {"id": "C2-4-L3", "layer": "L3", "stem": "兩圓 $x^2+y^2=4$ 與 $x^2+y^2-2x-4=0$ 相交，求其公共弦長。", "skills": ["公共弦", "弦長"], "source": "改編（公共弦長）"}, {"id": "C2-4-L4", "layer": "L4", "stem": "兩圓 $x^2+y^2=1$ 與 $(x-4)^2+y^2=9$。下列哪些直線是這兩圓的公切線？\n(1) $-\\dfrac{\\sqrt2}2x+\\dfrac{\\sqrt2}2y=1$　(2) $-\\dfrac{\\sqrt3}2x+\\dfrac12y=1$　(3) $-\\dfrac12x-\\dfrac{\\sqrt3}2y=1$　(4) $x=1$", "skills": ["兩圓公切線"], "source": "93指考補考數甲"}]}, {"code": "C3-1", "name": "向量加減、係數積、平行判別", "section": "三、平面向量", "section_color": "pink", "difficulty_grade": "冷門", "handout_page": "", "remediation_tip": "若本節（向量加減、係數積、平行判別）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C3-1-L1", "layer": "L1", "stem": "設 $\\vec a=(3,-1)$、$\\vec b=(1,2)$，求 $2\\vec a-3\\vec b$。", "skills": ["向量運算"], "source": "改編（向量運算）"}, {"id": "C3-1-L2-Q1", "layer": "L2", "stem": "若 $\\vec a=(2,k)$ 與 $\\vec b=(6,-9)$ 平行，求 $k$。", "skills": ["平行判別"], "source": "改編（平行）"}, {"id": "C3-1-L2-Q2", "layer": "L2", "stem": "已知 $A(1,2),B(4,3),C(2,k)$，若 $\\overrightarrow{AB}\\parallel\\overrightarrow{AC}$，求 $k$。", "skills": ["平行判別"], "source": "改編（共線）"}, {"id": "C3-1-L3", "layer": "L3", "stem": "設 $\\vec a=(1,2),\\vec b=(3,-1)$，將 $\\vec c=(5,0)$ 表為 $x\\vec a+y\\vec b$，求 $x,y$。", "skills": ["基底表示"], "source": "改編（線性組合）"}, {"id": "C3-1-L4", "layer": "L4", "stem": "以 $\\vec a,\\vec b$ 表示兩向量。試問下列哪一個選項表示「三角形兩邊中點的連線段與第三邊平行，且長度為第三邊之半」？\n(1) $\\vec a\\cdot\\vec b=0$　(2) $\\dfrac12\\vec a-\\dfrac12\\vec b=\\dfrac12(\\vec a-\\vec b)$　(3) $\\vec a\\cdot\\vec b\\le|\\vec a||\\vec b|$　(4) $(\\vec a+\\vec b)\\cdot(\\vec a+\\vec b)+(\\vec a-\\vec b)\\cdot(\\vec a-\\vec b)=2(\\vec a\\cdot\\vec a+\\vec b\\cdot\\vec b)$　(5) $|\\vec a+\\vec b|\\le|\\vec a|+|\\vec b|$", "skills": ["向量運算", "中點連線"], "source": "97指考數乙"}]}, {"code": "C3-2", "name": "分點公式與三角形三心", "section": "三、平面向量", "section_color": "pink", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（分點公式與三角形三心）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C3-2-L1-Q1", "layer": "L1", "stem": "$A(1,3),B(7,9)$，求 $\\overline{AB}$ 中點 $M$，及 $\\overline{AB}$ 上 $\\overline{AP}:\\overline{PB}=1:2$ 的分點 $P$。", "skills": ["中點", "分點"], "source": "改編（分點）"}, {"id": "C3-2-L1-Q2", "layer": "L1", "stem": "三角形頂點 $A(1,2),B(4,6),C(7,1)$，求重心 $G$。", "skills": ["重心"], "source": "改編（重心）"}, {"id": "C3-2-L2-Q1", "layer": "L2", "stem": "$A(2,-1),B(8,5)$，求 $\\overline{AB}$ 上 $\\overline{AP}:\\overline{PB}=2:1$ 的分點 $P$。", "skills": ["分點"], "source": "改編（分點）"}, {"id": "C3-2-L2-Q2", "layer": "L2", "stem": "$A(1,1),B(4,7)$，求使 $\\overline{AP}:\\overline{PB}=3:1$ 且 $P$ 在 $B$ 外側的外分點 $P$。", "skills": ["外分點"], "source": "改編（外分點）"}, {"id": "C3-2-L2-Q3", "layer": "L2", "stem": "三角形重心為 $G(2,3)$，兩頂點 $A(1,1),B(4,2)$，求第三頂點 $C$。", "skills": ["重心"], "source": "改編（重心反求）"}, {"id": "C3-2-L2-Q4", "layer": "L2", "stem": "$A(1,3),B(7,9)$，求 $\\overline{AB}$ 上 $\\overline{AP}:\\overline{PB}=1:5$ 的分點 $P$。", "skills": ["分點"], "source": "改編（分點）"}, {"id": "C3-2-L3-Q1", "layer": "L3", "stem": "三角形 $A(0,0),B(4,0),C(0,3)$，求其內心 $I$。", "skills": ["內心"], "source": "改編（內心）"}, {"id": "C3-2-L3-Q2", "layer": "L3", "stem": "$\\triangle ABC$ 中 $D$ 在 $\\overline{BC}$ 上且 $\\overline{BD}:\\overline{DC}=2:3$，將 $\\overrightarrow{AD}$ 以 $\\overrightarrow{AB},\\overrightarrow{AC}$ 表示。", "skills": ["分點", "向量分解"], "source": "改編（向量分解）"}, {"id": "C3-2-L3-Q3", "layer": "L3", "stem": "$\\triangle ABC$ 的重心為 $G$。設 $\\overrightarrow{AB}=\\vec b,\\overrightarrow{AC}=\\vec c$，將 $\\overrightarrow{AG}$ 以 $\\vec b,\\vec c$ 表示。", "skills": ["重心", "向量分解"], "source": "改編（重心向量）"}, {"id": "C3-2-L4-Q1", "layer": "L4", "stem": "$\\triangle ABC$ 中 $D$ 在 $\\overline{BC}$ 上，$\\angle ABC=75^\\circ,\\angle ACB=45^\\circ,\\angle ADB=60^\\circ$。若 $\\overrightarrow{AD}=s\\overrightarrow{AB}+t\\overrightarrow{AC}$，求 $s,t$。", "skills": ["向量分解", "正弦定理"], "source": "107學測"}, {"id": "C3-2-L4-Q2", "layer": "L4", "stem": "$\\triangle ABC$ 中 $P$ 為 $\\overline{BC}$ 中點，$Q$ 在 $\\overline{AC}$ 上且 $\\overrightarrow{AQ}=2\\overrightarrow{QC}$。已知 $\\overrightarrow{PA}=(4,3),\\overrightarrow{PQ}=(1,5)$，求 $\\overrightarrow{BC}$。", "skills": ["分點", "向量運算"], "source": "96學測"}, {"id": "C3-2-L4-Q3", "layer": "L4", "stem": "$\\triangle ABC$ 重心為 $G$。$O,D$ 為平面上相異二點且 $\\overrightarrow{OD}=\\overrightarrow{OA}+\\overrightarrow{OB}+\\overrightarrow{OC}$。選出正確選項。\n(1) $O,G,D$ 三點共線　(2) $\\overrightarrow{OD}=2\\overrightarrow{OG}$　(3) $\\overrightarrow{AD}+\\overrightarrow{BD}+\\overrightarrow{CD}=2\\overrightarrow{OD}$　(4) $G$ 在 $\\triangle ABC$ 內部　(5) $D$ 在 $\\triangle ABC$ 外部", "skills": ["重心"], "source": "101指考數甲"}, {"id": "C3-2-L4-Q4", "layer": "L4", "stem": "$P$ 為 $\\triangle ABC$ 內一點，$\\overrightarrow{AP}=a\\overrightarrow{AB}+b\\overrightarrow{AC}$（$a,b$ 相異）。設 $\\overrightarrow{AQ}=b\\overrightarrow{AB}+a\\overrightarrow{AC}$，$\\overrightarrow{AR}=a\\overrightarrow{AB}+(b-0.05)\\overrightarrow{AC}$。選出正確選項。\n(1) $Q,R$ 都在 $\\triangle ABC$ 內部　(2) $|\\overrightarrow{AP}|=|\\overrightarrow{AQ}|$　(3) $\\triangle ABP$ 面積 $=\\triangle ACQ$ 面積　(4) $\\triangle BCP$ 面積 $=\\triangle BCQ$ 面積　(5) $\\triangle ABP$ 面積 $>\\triangle ABR$ 面積", "skills": ["向量分解", "面積"], "source": "111學測A"}, {"id": "C3-2-L4-Q5", "layer": "L4", "stem": "$O,A,B$ 為不共線三點且 $\\overrightarrow{OA}\\perp\\overrightarrow{OB}$。$C,D$ 在直線 $AB$ 上，$\\overrightarrow{OC}=\\dfrac35\\overrightarrow{OA}+\\dfrac25\\overrightarrow{OB}$，$3\\overrightarrow{AD}=8\\overrightarrow{BD}$，且 $\\overrightarrow{OC}\\perp\\overrightarrow{OD}$，求 $\\dfrac{|\\overrightarrow{OB}|}{|\\overrightarrow{OA}|}$。", "skills": ["分點", "垂直"], "source": "112學測A"}, {"id": "C3-2-L4-Q6", "layer": "L4", "stem": "$\\triangle ABC$ 中 $P$ 滿足 $\\overrightarrow{AP}=\\dfrac15\\overrightarrow{AB}+\\dfrac25\\overrightarrow{AC}$，求 $\\dfrac{\\triangle ABP}{\\triangle ABC}$。\n(1) $\\dfrac15$　(2) $\\dfrac14$　(3) $\\dfrac25$　(4) $\\dfrac12$　(5) $\\dfrac23$", "skills": ["向量分解", "面積比"], "source": "92學測"}]}, {"code": "C3-3", "name": "向量線性組合與終點集", "section": "三、平面向量", "section_color": "pink", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（向量線性組合與終點集）失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C3-3-L1-Q1", "layer": "L1", "stem": "設 $\\vec a=(1,2),\\vec b=(2,-1)$，將 $\\vec c=(4,3)$ 表為 $x\\vec a+y\\vec b$。", "skills": ["線性組合"], "source": "改編（線性組合）"}, {"id": "C3-3-L1-Q2", "layer": "L1", "stem": "$\\overrightarrow{OP}=t\\vec a$（$t\\in\\mathbb R$），$\\vec a=(2,1)$，描述 $P$ 的軌跡。", "skills": ["終點集"], "source": "改編（終點集）"}, {"id": "C3-3-L2-Q1", "layer": "L2", "stem": "$\\overrightarrow{OP}=t\\overrightarrow{OA}+(1-t)\\overrightarrow{OB}$，$t\\in[0,1]$，$A(1,0),B(3,4)$。求 $P$ 的軌跡。", "skills": ["終點集", "共線"], "source": "改編（終點集）"}, {"id": "C3-3-L2-Q2", "layer": "L2", "stem": "已知 $(7,8)=x(1,2)+y(3,1)$，求 $x+y$。", "skills": ["線性組合"], "source": "改編（線性組合）"}, {"id": "C3-3-L2-Q3", "layer": "L2", "stem": "$\\overrightarrow{OP}=x\\vec a+y\\vec b$，$\\vec a=(1,0),\\vec b=(0,1)$，$0\\le x\\le2,0\\le y\\le3$。求 $P$ 所成區域的面積。", "skills": ["終點集", "面積"], "source": "改編（終點集）"}, {"id": "C3-3-L2-Q4", "layer": "L2", "stem": "$\\overrightarrow{OP}=x\\vec u+y\\vec v$，$\\vec u=(2,1),\\vec v=(1,3)$，$0\\le x\\le1,0\\le y\\le1$。求 $P$ 所成區域的面積。", "skills": ["終點集", "面積"], "source": "改編（終點集）"}, {"id": "C3-3-L3-Q1", "layer": "L3", "stem": "$\\overrightarrow{OP}=x\\vec u+y\\vec v$，$\\vec u=(1,2),\\vec v=(3,1)$，$1\\le x\\le3,0\\le y\\le2$。求 $P$ 所成區域的面積。", "skills": ["終點集", "面積"], "source": "改編（終點集面積）"}, {"id": "C3-3-L3-Q2", "layer": "L3", "stem": "$\\overrightarrow{OP}=a\\overrightarrow{OA}+b\\overrightarrow{OB}$。若 $P$ 在直線 $AB$ 上，$a+b$ 之值為何？又若 $\\overrightarrow{OP}=3\\overrightarrow{OA}-2\\overrightarrow{OB}$，$P,A,B$ 是否共線？", "skills": ["共線", "終點集"], "source": "改編（共線條件）"}, {"id": "C3-3-L3-Q3", "layer": "L3", "stem": "$\\overrightarrow{OP}=x\\overrightarrow{OA}+y\\overrightarrow{OB}$，$x\\ge0,y\\ge0,x+y\\le1$，$A(4,0),B(0,3)$。求 $P$ 所成區域的面積。", "skills": ["終點集", "面積"], "source": "改編（終點集三角形）"}, {"id": "C3-3-L4-Q1", "layer": "L4", "stem": "四邊形 $ABCD$ 中 $\\overline{AB}\\parallel\\overline{DC}$，$\\overline{AC}$ 與 $\\overline{BD}$ 交於 $E$。若 $\\overrightarrow{AB}=(2,-6),\\overrightarrow{AD}=(1,5)$ 且 $\\triangle ABE$ 面積為 $3$。選出正確選項。\n(1) $\\cos\\angle BAD=-\\dfrac{7\\sqrt{65}}{65}$　(2) $\\triangle ABD$ 面積為 $9$　(3) $\\overrightarrow{AE}=\\left(\\dfrac32,\\dfrac12\\right)$　(4) 四邊形 $ABCD$ 面積為 $\\dfrac{65}3$　(5) $\\overline{BC}<\\dfrac83$", "skills": ["線性組合", "面積", "內積"], "source": "115學測A"}, {"id": "C3-3-L4-Q2", "layer": "L4", "stem": "$\\vec u=(1,2),\\vec v=(3,4)$。$\\overrightarrow{OP}=x\\vec u+y\\vec v$，$\\dfrac12\\le x\\le1$，$-3\\le y\\le\\dfrac12$。求 $P$ 所成區域的面積。", "skills": ["終點集", "面積"], "source": "105學測"}, {"id": "C3-3-L4-Q3", "layer": "L4", "stem": "$O$ 為原點，$P(2,2)$。$\\overrightarrow{OP}=\\alpha\\overrightarrow{OA}+\\beta\\overrightarrow{OB}$，其中 $0\\le\\alpha\\le1,0\\le\\beta\\le1$。選出可能的 $A,B$ 坐標。\n(1) $A(2,-3),B(-4,3)$　(2) $A(3,2),B(3,4)$　(3) $A(3,4),B(4,-1)$　(4) $A(1,2),B(2,1)$　(5) $A(1,-1),B(1,1)$", "skills": ["線性組合", "終點集"], "source": "114學測B"}, {"id": "C3-3-L4-Q4", "layer": "L4", "stem": "$A(2,3),B(-1,3)$，$O$ 為原點。$E$ 為滿足 $\\overrightarrow{OP}=a\\overrightarrow{OA}+b\\overrightarrow{OB}$（$-1\\le a\\le1,0\\le b\\le4$）的所有點 $P$ 所成區域。設 $f(x)=x^2+5$，當 $x$ 為區域 $E$ 中點 $P(x,y)$ 的橫坐標時，$f(x)$ 的最大值為何？\n(1) 5　(2) 9　(3) 30　(4) 41　(5) 54", "skills": ["線性組合", "區域", "最值"], "source": "107指考數甲"}, {"id": "C3-3-L4-Q5", "layer": "L4", "stem": "兩點 $Q_1(1,0),Q_2(-1,0)$。下列各圖形中，選出其上至少有一點 $P$ 滿足 $\\overrightarrow{PQ_1}\\cdot\\overrightarrow{PQ_2}<0$ 的選項。\n(1) $y=\\dfrac12$　(2) $y=x^2+1$　(3) $-x^2+2y^2=1$　(4) $4x^2+y^2=1$　(5) $\\dfrac{x^2}2-\\dfrac{y^2}2=1$", "skills": ["內積", "點集"], "source": "102學測"}, {"id": "C3-3-L4-Q6", "layer": "L4", "stem": "向量 $\\vec w$ 與 $\\vec v=(2,\\sqrt5)$ 互相垂直且等長。選出正確選項。\n(1) $\\vec w$ 必為 $(\\sqrt5,-2)$ 或 $(-\\sqrt5,2)$　(2) $\\vec v+\\vec w$ 與 $\\vec v-\\vec w$ 等長　(3) $\\vec v+\\vec w$ 與 $\\vec w$ 的夾角可能為 $135^\\circ$　(4) 若 $\\vec u=a\\vec v+b\\vec w$，則 $|\\vec u|=\\sqrt{a^2+b^2}$　(5) 若 $(1,0)=c\\vec v+d\\vec w$，則 $c>0$", "skills": ["線性組合", "垂直"], "source": "100學測"}]}, {"code": "C3-4", "name": "向量內積（夾角、正射影、最值）", "section": "三、平面向量", "section_color": "pink", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（向量內積（夾角、正射影、最值））失分，先回頭把 L1 例題的標準解法看懂、再做熟 L2 練習，最後挑戰 L3、L4。", "questions": [{"id": "C3-4-L1-Q1", "layer": "L1", "stem": "$\\vec a=(3,4),\\vec b=(2,-1)$，求 $\\vec a\\cdot\\vec b$ 及 $\\vec a,\\vec b$ 夾角的餘弦。", "skills": ["內積", "夾角"], "source": "改編（內積）"}, {"id": "C3-4-L1-Q2", "layer": "L1", "stem": "求 $\\vec a=(1,2)$ 在 $\\vec b=(3,4)$ 方向的正射影長。", "skills": ["正射影"], "source": "改編（正射影）"}, {"id": "C3-4-L2-Q1", "layer": "L2", "stem": "若 $\\vec a=(k,3)$ 與 $\\vec b=(2,-4)$ 垂直，求 $k$。", "skills": ["垂直", "內積"], "source": "改編（垂直）"}, {"id": "C3-4-L2-Q2", "layer": "L2", "stem": "求 $\\vec a=(1,\\sqrt3)$ 與 $\\vec b=(\\sqrt3,1)$ 的夾角。", "skills": ["夾角"], "source": "改編（夾角）"}, {"id": "C3-4-L2-Q3", "layer": "L2", "stem": "求 $\\vec a=(4,3)$ 在 $\\vec b=(1,0)$ 方向的正射影向量。", "skills": ["正射影向量"], "source": "改編（正射影向量）"}, {"id": "C3-4-L2-Q4", "layer": "L2", "stem": "已知 $|\\vec a|=3,|\\vec b|=4,\\vec a\\cdot\\vec b=6$，求 $|\\vec a+\\vec b|$。", "skills": ["內積", "長度"], "source": "改編（長度）"}, {"id": "C3-4-L3-Q1", "layer": "L3", "stem": "點 $P$ 在圓 $x^2+y^2=4$ 上，$A(3,0)$，求 $\\overrightarrow{OP}\\cdot\\overrightarrow{OA}$ 的最大值與最小值。", "skills": ["內積", "最值"], "source": "改編（內積最值）"}, {"id": "C3-4-L3-Q2", "layer": "L3", "stem": "向量 $\\vec a=(2,1)$，$\\vec b$ 為單位向量，求 $\\vec a\\cdot\\vec b$ 的最大值及此時的 $\\vec b$。", "skills": ["內積", "最值"], "source": "改編（內積最值）"}, {"id": "C3-4-L3-Q3", "layer": "L3", "stem": "利用正射影，求點 $P(5,6)$ 到通過原點、方向 $\\vec u=(3,4)$ 的直線的距離。", "skills": ["正射影", "距離"], "source": "改編（正射影求距離）"}, {"id": "C3-4-L4-Q1", "layer": "L4", "stem": "坐標平面上，向量 $(a,b)$ 與直線 $y=bx-1$ 垂直，求 $a+b$ 的最大可能值。", "skills": ["垂直", "最值"], "source": "115學測A"}, {"id": "C3-4-L4-Q2", "layer": "L4", "stem": "向量 $\\vec v$ 在 $(2,-3)$ 方向的正射影長比原長少 $1$，在 $(3,2)$ 方向的正射影長比原長少 $2$。若 $\\vec v$ 與 $(2,-3),(3,2)$ 的夾角皆為銳角，求 const LAYER={L1:'例題',L2:'練習',L3:'挑戰',L4:'歷屆'};

const SECCLS={'green':'green','blue':'blue','pink':'pink'};
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function disp(s){return esc(s).replace(/\n/g,'<br>');}
function build(){
 const root=document.getElementById('nodes'); let curSec=null;
 DATA.nodes.forEach(n=>{
   const col=SECCLS[n.section_color]||'green';
   if(n.section!==curSec){curSec=n.section;const hd=document.createElement('div');hd.className='sectionhead sec-'+col;hd.textContent=n.section;root.appendChild(hd);}
   const d=document.createElement('div');d.className='node n-'+col;
   let h=`<h2>${n.code}　${n.name}（${n.difficulty_grade}）</h2><div class="meta">講義 P.${n.handout_page}　·　${n.questions.length} 題</div>`;
   const by={};n.questions.forEach(q=>{(by[q.layer]=by[q.layer]||[]).push(q);});
   ['L1','L2','L3','L4'].forEach(L=>{if(!by[L])return;h+=`<div class="layer"><h3>${L}　${LAYER[L]}</h3>`;
     by[L].forEach((q,i)=>{const src=(L==='L4'&&q.source)?`<span class="src">〔${esc(q.source)}〕</span> `:'';
       h+=`<div class="q"><input type="checkbox" id="${q.id}" onchange="upd()"><label for="${q.id}"><span class="tag">${LAYER[L]}${i+1}</span>${src}${disp(q.stem)}</label></div>`;});
     h+=`</div>`;});
   d.innerHTML=h;root.appendChild(d);
 });
}
function upd(){document.getElementById('cnt').textContent=document.querySelectorAll('input:checked').length;}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function drawSimilar(code,n){
 const box=document.getElementById('sim-'+code); if(!box)return;
 const arr=(POOL[code]||[]).slice();
 if(!arr.length){box.innerHTML='<div class="simhdr">此節點暫無生成器題庫。</div>';return;}
 shuffle(arr); const pick=arr.slice(0,Math.min(n,arr.length));
 let h='<div class="simhdr">補強練習 · 隨機 '+pick.length+' 題（參數化生成器產生，每次重抽不同）</div>';
 pick.forEach((q,i)=>{h+='<div class="simq"><div class="simstem"><b>'+(i+1)+'.</b> 〔'+esc(q.type)+'〕 '+disp(q.stem)+'</div><button class="ansbtn" onclick="this.nextElementSibling.classList.toggle(\'show\')">看答案／詳解</button><div class="simans">答：'+disp(q.answer)+'<br><span class="sol">詳解：'+disp(q.solution)+'</span></div></div>';});
 box.innerHTML=h; if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise([box]);
}

 var name=(prompt('請輸入你的姓名（會附在報告上方，傳給老師）：','')||'（未填姓名）').trim()||'（未填姓名）';

function genReport(){
 const wrong=new Set([...document.querySelectorAll('input:checked')].map(c=>c.id));

 "type": "多選題", "src": "105-學測模A", "stem": "$\\overrightarrow{u}\\ = \\ (1,2)、\\overrightarrow{v}\\ = \\ (4,2)$，Ω 為滿足 $\\overrightarrow{\\text{OP}}\\ = \\ x\\overrightarrow{u}\\ + \\ y\\overrightarrow{v}$、$1\\ \\leq \\ x\\ \\leq \\ 2,\\ a\\ \\leq \\ y\\ \\leq \\ 1（a < 1）$ 的所有 P。選出正確選項。\n(1) $\\overrightarrow{u}、\\overrightarrow{v}$ 夾角 < 60°\n(2) 兩向量決定的平行四邊形面積 = 8\n(3) 當 $a\\ < \\ - 1/4$，Ω 通過第二象限\n(4) $a\\ = \\ 0$ 時 Ω 為菱形\n(5) $a\\ = \\ - 1$ 時 Ω 面積 < 15"}, {"id": "KHC_1_15", "no": 15, "type": "多選題", "src": "106-南區模A", "stem": "梯形 ABCD，$\\overrightarrow{\\text{AD}}\\ \\parallel \\ \\overrightarrow{\\text{BC}}$，$\\overline{\\text{AD}} = 2,\\ \\overline{\\text{BC}} = 3,\\ \\overline{\\text{AB}} = 1,\\ \\angle ABC = 60{^\\circ}$。設 $\\overrightarrow{a}$、$\\overrightarrow{b}$、$\\overrightarrow{c}$ 分別為 $\\overrightarrow{\\text{BC}}$、$\\overrightarrow{\\text{BA}}$、$\\overrightarrow{\\text{BD}}$ 同向單位向量，選出正確選項。\n(1) $\\overrightarrow{\\text{BD}}\\ \\cdot \\ \\overrightarrow{\\text{CD}}\\ = \\ - \\frac{1}{2}$\n(2) $\\overrightarrow{\\text{BD}}\\ \\cdot \\ \\overrightarrow{\\text{CD}}\\ = \\ \\frac{1}{2}$\n(3) $\\overrightarrow{c}\\ = \\ \\frac{1}{\\sqrt{7}}(\\overrightarrow{a}\\ + \\ 2\\overrightarrow{b})$\n(4) $\\overrightarrow{c}\\ = \\ \\frac{1}{\\sqrt{7}}(\\overrightarrow{a}\\ - \\ 2\\overrightarrow{b})$\n(5) $|\\overrightarrow{\\text{BD}}|\\ = \\ \\sqrt{7}$"}, {"id": "KHC_1_16", "no": 16, "type": "選填題", "src": "106-學測模A", "stem": "實數 a, b 滿足 $3a^{2}\\ + \\ 4b^{2}\\ = \\ 25$。△OPQ 三頂點 $O(0,0)、P(3a,106)、Q(2b,2017)$，重心 $G(m,n)$，求 m+n 的最大值。"}, {"id": "KHC_1_17", "no": 17, "type": "填充題", "src": "段考改編", "stem": "從 O 直行 10 公尺到 A，左轉 60° 直行 8 公尺到 B，再左轉 90° 直行 $2\\sqrt3$ 公尺到 C，求 $\\overline{\\text{OC}}$。"}, {"id": "KHC_1_18", "no": 18, "type": "填充題", "src": "112-北一女中", "stem": "質點自 $P(1,1)$ 沿 $\\overrightarrow{a}\\ = \\ (2, - 1)$ 等速前進，6 秒後到直線 $x - 3y\\ = \\ 13$ 上的 Q；再沿 $\\overrightarrow{b}\\ = \\ (1,2)$ 同速前進 10 秒到 $x + y\\ = \\ k$ 上的 R，求 k。"}, {"id": "KHC_1_19", "no": 19, "type": "填充題", "src": "105-學測模A", "stem": "$|\\overrightarrow{a}|\\ = \\ 2、|\\overrightarrow{b}|\\ = \\ \\sqrt3$，夾角 30°；$\\overrightarrow{p}\\ = \\ \\overrightarrow{a}\\ + \\ \\overrightarrow{b}$、$\\overrightarrow{q}\\ = \\ x\\overrightarrow{a}\\ + \\ y\\overrightarrow{b}$（$3\\ \\leq \\ x + y\\ \\leq \\ 7、 - 5\\ \\leq \\ x - y\\ \\leq \\ 1$），求 $\\overrightarrow{p}\\ \\cdot \\ \\overrightarrow{q}$ 最小值。"}, {"id": "KHC_1_20", "no": 20, "type": "填充題", "src": "段考改編", "stem": "箏形 ABCD，$\\overline{\\text{AB}}\\ = \\ \\overline{\\text{BC}}\\ = \\ \\sqrt2、\\overline{\\text{AD}}\\ = \\ \\overline{\\text{CD}}\\ = \\ 2、\\angle BAD\\ = \\ 135{^\\circ}$，求 $\\overline{\\text{AC}}$（化為最簡根式）。"}], "挑戰": [{"id": "KHC_1_21", "no": 21, "type": "填充題", "src": "112-北一女中", "stem": "$O,\\ A,\\ B$ 不共線且 $\\overrightarrow{\\text{OA}}\\ \\bot\\ \\overrightarrow{\\text{OB}}$。$\\overrightarrow{\\text{OP}}\\ = \\ \\frac{2}{3}\\overrightarrow{\\text{OA}}\\ + \\ \\frac{1}{3}\\overrightarrow{\\text{OB}}$，Q 滿足 $2\\overrightarrow{\\text{AQ}}\\ = \\ 9\\overrightarrow{\\text{BQ}}$。當 $\\overrightarrow{\\text{OP}}\\ \\bot\\ \\overrightarrow{\\text{OQ}}$ 時，求 $\\frac{\\overline{\\text{OA}}}{\\overline{\\text{OB}}}$。"}, {"id": "KHC_1_22", "no": 22, "type": "多選題", "src": "112-北一女中", "stem": "平行四邊形 ABCD，E 為 $\\overline{\\text{AB}}$ 中點，F 在 $\\overline{\\text{CD}}$ 上（$\\overline{\\text{CF}}\\ :\\ \\overline{\\text{FD}}\\ = \\ 3\\ :\\ 1$），$\\overline{\\text{EC}}$ 與 $\\overline{\\text{FB}}$ 交於 Q。$A = (10,10),\\ \\overrightarrow{\\text{AB}} = (6, - 5),\\ \\overrightarrow{\\text{AD}} = (7,5)$。選出正確選項。\n(1) 公園面積為 55\n(2) $C = (a,b)$ 則 $a + b = 13$\n(3) $\\overrightarrow{\\text{AQ}}\\ = \\ x\\overrightarrow{\\text{AB}}\\ + \\ y\\overrightarrow{\\text{AD}}$ 則 $x + y = \\frac{11}{10}$\n(4) $\\overrightarrow{\\text{AQ}}\\ \\cdot \\ \\overrightarrow{\\text{AD}}\\ = \\ 34$\n(5) 以上皆非"}, {"id": "KHC_1_23", "no": 23, "type": "填充題", "src": "段考改編", "stem": "點 $A(3, - 1)$ 及圓 $C:\\ x² + y² + 2x - 4y\\ = \\ 0$。過 A 作圓的切線切於 P；Q 為圓上任一點，求 $\\overrightarrow{\\text{AP}}\\ \\cdot \\ \\overrightarrow{\\text{AQ}}$ 的最大值。"}], "大考": [{"id": "KHC_1_24", "no": 24, "type": "填充題", "src": "89-學測", "stem": "氣象局測出在 20 小時期間，颱風中心由恆春東南方 400 公里直線移動到「恆春南 15° 西」200 公里處，求颱風移動的平均速度（公里/時，四捨五入至整數）。"}, {"id": "KHC_1_25", "no": 25, "type": "多選題", "src": "90-學測", "stem": "坐標平面上 $A(150,200)、B(146,203)、C( - 4,3)、O(0,0)$，下列何者為真？\n(1) 四邊形 ABCO 是平行四邊形\n(2) 四邊形 ABCO 是長方形\n(3) 四邊形 ABCO 兩對角線互相垂直\n(4) 對角線 $\\overline{\\text{AC}}$ 長度大於 251\n(5) 四邊形 ABCO 面積為 1250"}, {"id": "KHC_1_26", "no": 26, "type": "填充題", "src": "91-學測補", "stem": "正方形 ABCD，$\\overline{\\text{AB}}$、$\\overline{\\text{BC}}$、$\\overline{\\text{CD}}$、$\\overline{\\text{DA}}$ 的延長線分別交直線 L 於 P、Q、R、S。已知 $\\overline{\\text{PR}} = 3、\\overline{\\text{QS}} = 4$，求正方形邊長。"}, {"id": "KHC_1_27", "no": 27, "type": "單選題", "src": "93-學測", "stem": "△ABC，P 為平面上一點且 $\\overrightarrow{\\text{AP}}\\ = \\ \\frac{1}{3}\\overrightarrow{\\text{AB}}\\ + \\ t\\overrightarrow{\\text{AC}}$（t 為實數）。下列何者為使 P 落在 △ABC 內部的 t 最大範圍？\n(1) $0\\ < \\ t\\ < \\ \\frac{1}{4}$\n(2) $0\\ < \\ t\\ < \\ \\frac{1}{3}$\n(3) $0\\ < \\ t\\ < \\ \\frac{1}{2}$\n(4) $0\\ < \\ t\\ < \\ \\frac{2}{3}$\n(5) $0\\ < \\ t\\ < \\ 1$"}, {"id": "KHC_1_28", "no": 28, "type": "多選題", "src": "96-學測", "stem": "相異兩點 P、Q，$P(s,t)$，$\\overline{\\text{PQ}}$ 的中垂線 L 為 $3x - 4y = 0$，選出正確選項。\n(1) $\\overrightarrow{\\text{PQ}}$ 與 $(3, - 4)$ 平行\n(2) $\\overline{\\text{PQ}}$ 長度 = $\\frac{|6s - 8t|}{5}$\n(3) $Q$ 坐標為 $(t,s)$\n(4) 過 Q 與 L 平行之直線必過 $( - s, - t)$\n(5) $\\overrightarrow{\\text{OP}}\\ + \\ \\overrightarrow{\\text{OQ}}$ 與 $\\overrightarrow{\\text{PQ}}$ 的內積必為 0"}, {"id": "KHC_1_29", "no": 29, "type": "選填題", "src": "107-學測", "stem": "D 為 △ABC 中 $\\overline{\\text{BC}}$ 邊上一點，$\\angle ABC = 75{^\\circ}、\\angle ACB = 45{^\\circ}、\\angle ADB = 60{^\\circ}$。若 $\\overrightarrow{\\text{AD}}\\ = \\ s\\overrightarrow{\\text{AB}}\\ + \\ t\\overrightarrow{\\text{AC}}$，求 (s, t)。"}, {"id": "KHC_1_30", "no": 30, "type": "填充題", "src": "113-學測數A", "stem": "向量 $\\overrightarrow{v}$ 在 $(2, - 3)$ 方向的正射影長比原長少 1、在 $(3,2)$ 方向的正射影長比原長少 2。若 $\\overrightarrow{v}$ 與這兩向量夾角皆為銳角，求 $\\overrightarrow{v}$ 在 $(4,7)$ 方向的正射影長。"}]}}]};
(function(){
  if (window.__KH_BUILT) return; window.__KH_BUILT = true;
  const TC = {'基礎':'#1565c0','進階':'#2e7d32','挑戰':'#e65100','大考':'#c2185b'};
  const TORD = ['基礎','進階','挑戰','大考'];
  function pageCount(p){ return TORD.reduce((s,T)=>s+((p.tiers[T]||[]).length),0); }

  function buildKH(){
    const nodes = document.getElementById('nodes');
    if(!nodes) return;
    const area = document.createElement('div'); area.id='khArea';
    let h = '<div class="sectionhead sec-blue">📘 課後練習（主講義 · 依章節分頁）'
          + '<span style="font-size:12px;font-weight:normal">　勾選做錯的題，會與下方練習本一起納入弱點報告</span></div>';
    KH.pages.forEach((p,pi)=>{
      const mp = (p.map&&p.map.length) ? ('補強節點：'+p.map.join('、'))
                                       : '（此章節無生成器 → 回看講義單元）';
      h += '<div class="node n-blue"><h2>分頁 '+(pi+1)+'　'+esc(p.name)+'</h2>'
         + '<div class="meta">課後練習 · 共 '+pageCount(p)+' 題 · '+mp+'</div>';
      TORD.forEach(T=>{
        const arr = p.tiers[T]||[]; if(!arr.length) return;
        h += '<div class="layer"><h3>'+T+'</h3>';
        arr.forEach((q,i)=>{
          const src = q.src ? '<span class="src">〔'+esc(q.src)+'〕</span> ' : '';
          h += '<div class="q"><input type="checkbox" class="kh" id="'+q.id+'" data-page="'+pi
             + '" data-tier="'+T+'" onchange="upd()"><label for="'+q.id+'">'
             + '<span class="tag" style="background:'+TC[T]+'">'+T+(i+1)+'</span>'
             + '<span style="color:#999;font-size:11px">◎'+esc(q.type)+'</span> '+src+disp(q.stem)+'</label></div>';
        });
        h += '</div>';
      });
      h += '</div>';
    });
    area.innerHTML = h;
    nodes.parentNode.insertBefore(area, nodes);   /* 課後練習在練習本(#nodes)之前 */
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([area]);
  }

  /* 課後練習補強：全域 POOL+shuffle，渲染到 simkh-<code>（與練習本 sim-<code> 分開）*/
  window.drawKH = function(code,n){
    const box = document.getElementById('simkh-'+code); if(!box) return;
    const arr = (POOL[code]||[]).slice();
    if(!arr.length){ box.innerHTML='<div class="simhdr">此節點暫無生成器題庫。</div>'; return; }
    shuffle(arr); const pick = arr.slice(0, Math.min(n,arr.length));
    let h = '<div class="simhdr">補強練習 · 隨機 '+pick.length+' 題（參數化生成器，每次重抽不同）</div>';
    pick.forEach((q,i)=>{
      h += '<div class="simq"><div class="simstem"><b>'+(i+1)+'.</b> 〔'+esc(q.type)+'〕 '+disp(q.stem)+'</div>'
         + '<button class="ansbtn" onclick="this.nextElementSibling.classList.toggle(\'show\')">看答案／詳解</button>'
         + '<div class="simans">答：'+disp(q.answer)+'<br><span class="sol">詳解：'+disp(q.solution)+'</span></div></div>';
    });
    box.innerHTML = h; if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([box]);
  };

  function khReportHTML(){
    const wrong = new Set([].slice.call(document.querySelectorAll('input.kh:checked')).map(c=>c.id));
    let h = '<div class="sec" style="border-top:6px solid var(--blue);background:#f3f8ff">'
          + '<h3 style="color:var(--blue)">📘 課後練習弱點（主講義 · 依章節分頁）</h3>';
    if (wrong.size === 0){
      h += '<div class="empty">課後練習這次全部答對 👍（或尚未勾選課後練習題）</div></div>';
      return h;
    }
    KH.pages.forEach((p,pi)=>{
      const tot = pageCount(p); if(!tot) return;
      let pw=0; const parts=[];
      TORD.forEach(T=>{ const arr=p.tiers[T]||[]; if(!arr.length) return;
        const w=arr.filter(q=>wrong.has(q.id)).length; pw+=w; parts.push(T+' '+w+'/'+arr.length); });
      const pct = Math.round(pw/tot*100);
      const col = pct>=50?'var(--red)':pct>=30?'var(--yel)':'var(--grn)';
      h += '<div class="path" style="background:#eef4ff"><b><span class="dot" style="background:'+col+'"></span>分頁 '
         + (pi+1)+'：'+esc(p.name)+'</b>（錯 '+pw+'/'+tot+'，'+pct+'%）'
         + '<br><span style="font-size:12px;color:#557">'+parts.join('　·　')+'</span>';
      if (pw>0){
        const codes = (p.map||[]).filter(c=>POOL[c]&&POOL[c].length);
        if (codes.length){
          h += '<br>'+codes.map(c=>'<button class="btn-sim" onclick="drawKH(\''+c+'\',3)">🔁 補強練習：'
             + c+' 抽 3 題（可重抽）</button><div class="simbox" id="simkh-'+c+'"></div>').join(' ');
        } else {
          h += '<br><span style="font-size:13px;color:#7a3a00">↩️ 此章節無生成器，請回看講義單元：<b>'+esc(p.name)+'</b></span>';
        }
      }
      h += '</div>';
    });
    h += '</div>';
    return h;
  }

  /* 包裝 genReport：課後練習弱點插到報告最前面（afterbegin）*/
  const origGen = genReport;
  genReport = function(){
    origGen();
    const r = document.getElementById('report');
    if (r){ r.insertAdjacentHTML('afterbegin', khReportHTML());
      if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([r]); }
  };

  /* 包裝 exportReport：課後練習弱點文字也排在前面 */
  const origExp = exportReport;
  exportReport = function(){
    origExp();
    const ta = document.getElementById('exptxt'); if(!ta) return;
    const wrong = new Set([].slice.call(document.querySelectorAll('input.kh:checked')).map(c=>c.id));
    let kt = '【課後練習弱點 · 依章節分頁】\n';
    if (wrong.size === 0){ kt += '（課後練習全部答對）\n'; }
    else KH.pages.forEach((p,pi)=>{
      const tot = pageCount(p); if(!tot) return;
      let pw=0; TORD.forEach(T=>{ (p.tiers[T]||[]).forEach(q=>{ if(wrong.has(q.id)) pw++; }); });
      if (pw>0) kt += '・分頁'+(pi+1)+' '+p.name+'：錯 '+pw+'/'+tot
                    + (p.map&&p.map.length? '（可練 '+p.map.join('、')+'）':'（回看講義）')+'\n';
    });
    kt += '\n';
    if (ta.value.indexOf('需加強節點') >= 0) ta.value = ta.value.replace('需加強節點', kt+'需加強節點');
    else ta.value = kt + ta.value;
  };

  buildKH();
})();
</script>
