$、$6-2=4=2^2$、$15-6=9=3^2$、$31-15=16=4^2$，即 $a_{t+1}-a_t=t^2$，選 (3)。", "skills": ["遞迴關係辨識", "逐差法"], "difficulty_star": 3, "bloom": "應用", "source_kind": "大考真題", "source": "104學測第1題", "ref_id": "SEQ-033", "tags": ["遞迴", "學測"]}, {"id": "E1-2-L4-Q4", "layer": "L4", "type": "填充題", "stem": "數列滿足 $a_n=a_{n-1}+f(n-2)$，$f$ 為二次多項式，且 $a_1,a_2,a_3,a_4=1,2,5,12$。求 $a_5$。", "answer": "$25$", "solution": "一階差 $a_{n}-a_{n-1}$：$1,3,7$（即 $f(0),f(1),f(2)$）；二階差 $2,4$（再差為 $2$，符合二次）。\n下一個一階差 $f(3)=7+(4+2)=13$，故 $a_5=a_4+13=12+13=25$。", "skills": ["二次差遞迴", "差分表"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "106學測第14-20題", "ref_id": "SEQ-035", "tags": ["遞迴", "學測"]}, {"id": "E1-2-L4-Q5", "layer": "L4", "type": "填充題", "stem": "網路賣家以 $200$ 元成本取得模型，售價為成本的 $5$ 倍，差價為利潤。其後以逐次「利潤減半」方式調降售價。求調降三次後的售價（元）。", "answer": "$300$", "solution": "初始利潤 $=5\\times200-200=800$。利潤減半三次：$800\\to400\\to200\\to100$。\n調降三次後售價 $=$ 成本 $+$ 利潤 $=200+100=300$。", "skills": ["等比遞減", "利潤模型"], "difficulty_star": 2, "bloom": "應用", "source_kind": "大考真題", "source": "109學測第A題", "ref_id": "SEQ-038", "tags": ["遞迴", "等比", "學測"]}, {"id": "E1-2-L4-Q6", "layer": "L4", "type": "多選題", "stem": "甲、乙起薪相同。甲每滿 3 個月、次月起月薪 $+200$；乙每滿 12 個月、次月起 $+1000$。選出正確選項。\n(1) 甲第 9 個月月薪比第 1 個月增加 600 元　(2) 第 13 個月甲月薪比乙高　(3) 第 19 個月甲月薪比乙高　(4) 滿 18 個月時甲累計薪水比乙少　(5) 第 3 年的 12 個月中恰有 3 個月甲月薪比乙高", "answer": "(3)(5)", "solution": "甲第 $m$ 月加薪 $200\\lfloor\\frac{m-1}3\\rfloor$、乙 $1000\\lfloor\\frac{m-1}{12}\\rfloor$。\n(1) 第 9 月 $+200\\cdot2=400\\ne600$ ✗；(2) 第 13 月 甲 $+800<$ 乙 $+1000$ ✗；(3) 第 19 月 甲 $+1200>$ 乙 $+1000$ ✓；(4) 滿 18 月累計 甲 $>$ 乙（甲調薪較頻繁），✗；(5) 第 3 年（25–36 月）僅 34–36 月甲 $(+2200)>$ 乙 $(+2000)$，恰 3 個月 ✓。故 (3)(5)。", "skills": ["分段調薪", "樓地板函數", "累計比較"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "112學測數A第7題", "ref_id": "SEQ-041", "tags": ["遞迴", "應用", "學測"]}]}, {"code": "E1-3", "name": "級數公式（Σ、分項對消、錯位相減）", "section": "一、數列與級數", "level": "冷門", "kpi": "Σk/Σk²/Σk³公式、分項對消(裂項疊縮)、錯位相減(等差×等比)", "section_color": "blue", "difficulty_grade": "冷門", "handout_page": "", "remediation_tip": "若本節（級數公式（Σ、分項對消、錯位相減））失分，先回頭重做 L1 例題、熟悉標準解法，再依序練 L2／L3。", "questions": [{"id": "E1-3-L1-Q1", "layer": "L1", "type": "單選題", "stem": "計算 $11^2+12^2+13^2+\\cdots+20^2$。\n(1) $2485$　(2) $2870$　(3) $3025$　(4) $2295$　(5) $2585$", "answer": "(1) $2485$", "solution": "$\\displaystyle\\sum_{k=11}^{20}k^2=\\sum_{k=1}^{20}k^2-\\sum_{k=1}^{10}k^2=\\dfrac{20\\cdot21\\cdot41}{6}-\\dfrac{10\\cdot11\\cdot21}{6}=2870-385=2485$。", "skills": ["平方和公式", "區間求和"], "difficulty_star": 2, "bloom": "理解", "source_kind": "段考真題", "source": "中山女高110下高一第1次段考", "ref_id": "SER-188", "tags": ["Σ公式"]}, {"id": "E1-3-L2-Q1", "layer": "L2", "type": "填充題", "stem": "計算 $1\\times2+3\\times4+5\\times6+\\cdots+19\\times20$。", "answer": "$1430$", "solution": "第 $k$ 項為 $(2k-1)(2k)=4k^2-2k$（$k=1\\sim10$）。\n$\\displaystyle\\sum_{k=1}^{10}(4k^2-2k)=4\\cdot\\dfrac{10\\cdot11\\cdot21}{6}-2\\cdot\\dfrac{10\\cdot11}{2}=1540-110=1430$。", "skills": ["Σ公式", "通項展開"], "difficulty_star": 3, "bloom": "應用", "source_kind": "段考真題", "source": "中山女高110下高一第1次段考", "ref_id": "SER-191", "tags": ["Σ公式"]}, {"id": "E1-3-L2-Q2", "layer": "L2", "type": "填充題", "stem": "計算 $\\dfrac1{1\\cdot2}+\\dfrac1{2\\cdot3}+\\dfrac1{3\\cdot4}+\\cdots+\\dfrac1{10\\cdot11}$。", "answer": "$\\dfrac{10}{11}$", "solution": "**分項對消（裂項）**：$\\dfrac1{k(k+1)}=\\dfrac1k-\\dfrac1{k+1}$。\n$\\displaystyle\\sum_{k=1}^{10}\\left(\\dfrac1k-\\dfrac1{k+1}\\right)=1-\\dfrac1{11}=\\dfrac{10}{11}$。", "skills": ["分項對消", "裂項疊縮"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（分項對消）", "ref_id": "", "tags": ["分項對消"]}, {"id": "E1-3-L3-Q1", "layer": "L3", "type": "填充題", "stem": "計算 $S=1\\cdot1+2\\cdot2+3\\cdot2^2+\\cdots+10\\cdot2^9=\\displaystyle\\sum_{k=1}^{10}k\\cdot2^{k-1}$。", "answer": "$9217$", "solution": "**錯位相減**：$S=\\sum_{k=1}^{10}k\\,2^{k-1}$，$2S=\\sum_{k=1}^{10}k\\,2^{k}$。\n$2S-S=S=-(1+2+2^2+\\cdots+2^{9})+10\\cdot2^{10}=-(2^{10}-1)+10\\cdot2^{10}=9\\cdot2^{10}+1=9217$。\n（通式 $\\sum_{k=1}^{n}k\\,2^{k-1}=(n-1)2^{n}+1$。）", "skills": ["錯位相減", "等差乘等比"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（錯位相減）", "ref_id": "", "tags": ["錯位相減"]}, {"id": "E1-3-L4-Q1", "layer": "L4", "type": "單選題", "stem": "利用公式 $1^3+2^3+\\cdots+n^3=\\left(\\dfrac{n(n+1)}2\\right)^2$，計算 $11^3+12^3+\\cdots+20^3$。\n(1) $41075$　(2) $41095$　(3) $44100$　(4) $3025$　(5) $47125$", "answer": "(1) $41075$", "solution": "$\\displaystyle\\sum_{k=11}^{20}k^3=\\left(\\dfrac{20\\cdot21}2\\right)^2-\\left(\\dfrac{10\\cdot11}2\\right)^2=210^2-55^2=44100-3025=41075$。", "skills": ["立方和公式", "區間求和"], "difficulty_star": 2, "bloom": "應用", "source_kind": "大考真題", "source": "94學測第2題", "ref_id": "SER-105", "tags": ["Σ公式", "學測"]}]}, {"code": "E2-1", "name": "集合元素個數、加法乘法原理", "section": "二、排列組合", "level": "冷門", "kpi": "加法原理/乘法原理/分類計數、集合元素個數(排容原理)", "section_color": "green", "difficulty_grade": "冷門", "handout_page": "", "remediation_tip": "若本節（集合元素個數、加法乘法原理）失分，先回頭重做 L1 例題、熟悉標準解法，再依序練 L2／L3。", "questions": [{"id": "E2-1-L1-Q1", "layer": "L1", "type": "填充題", "stem": "小明有 $4$ 件上衣、$3$ 條長褲、$2$ 雙鞋。若各選一件，共有幾種不同的穿搭？", "answer": "$24$ 種", "solution": "由**乘法原理**，各步驟獨立相乘：$4\\times3\\times2=24$ 種。", "skills": ["乘法原理"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（乘法原理）", "ref_id": "", "tags": ["乘法原理"]}, {"id": "E2-1-L2-Q1", "layer": "L2", "type": "是非題", "stem": "判斷：「集合 $A,B$ 滿足 $A-B=\\{1,2\\}$、$B-A=\\{3,4\\}$，則 $n(A\\cup B)\\ge4$。」", "answer": "○（正確）", "solution": "$n(A\\cup B)=n(A-B)+n(B-A)+n(A\\cap B)=2+2+n(A\\cap B)\\ge4$（$A\\cap B$ 至少 $0$ 個）。敘述正確。", "skills": ["集合元素個數", "差集聯集"], "difficulty_star": 2, "bloom": "理解", "source_kind": "段考真題", "source": "高雄女中111下高一第1次段考", "ref_id": "CNT-128", "tags": ["集合計數"]}, {"id": "E2-1-L2-Q2", "layer": "L2", "type": "填充題", "stem": "某班 $40$ 人，參加數學社的有 $25$ 人、參加英文社的有 $18$ 人、兩社都參加的有 $10$ 人。求至少參加一社的人數。", "answer": "$33$ 人", "solution": "**排容原理**：$n(\\text{數}\\cup\\text{英})=n(\\text{數})+n(\\text{英})-n(\\text{數}\\cap\\text{英})=25+18-10=33$。", "skills": ["排容原理", "兩集合聯集"], "difficulty_star": 2, "bloom": "應用", "source_kind": "改編", "source": "改編（兩集合排容）", "ref_id": "", "tags": ["排容", "集合計數"]}, {"id": "E2-1-L3-Q1", "layer": "L3", "type": "填充題", "stem": "三集合 $A,B,C$ 滿足 $A-B=A$、$A-C=\\varnothing$、$n(A)=30$、$n(B)=25$、$n(C)=40$、$n(B\\cap C)=10$，求 $n(A\\cup B\\cup C)$。", "answer": "$55$", "solution": "$A-B=A\\Rightarrow A\\cap B=\\varnothing$；$A-C=\\varnothing\\Rightarrow A\\subseteq C$。\n因 $A\\subseteq C$，故 $A\\cup B\\cup C=B\\cup C$，$n(B\\cup C)=n(B)+n(C)-n(B\\cap C)=25+40-10=55$。", "skills": ["集合關係", "排容原理", "子集吸收"], "difficulty_star": 4, "bloom": "分析", "source_kind": "段考真題", "source": "高雄女中111下高一第1次段考", "ref_id": "CNT-132", "tags": ["排容", "集合計數"]}, {"id": "E2-1-L4-Q1", "layer": "L4", "type": "填充題", "stem": "在三位數中，百位數字與個位數字之差的絕對值為 $2$ 的數，共有幾個？", "answer": "$150$", "solution": "百位 $h\\in\\{1,\\dots,9\\}$、個位 $u\\in\\{0,\\dots,9\\}$、十位 $t\\in\\{0,\\dots,9\\}$。\n滿足 $|h-u|=2$ 的 $(h,u)$ 共 $15$ 組；每組十位有 $10$ 種，故 $15\\times10=150$ 個。", "skills": ["加法乘法原理", "絕對值差計數"], "difficulty_star": 3, "bloom": "應用", "source_kind": "大考真題", "source": "87學測填A", "ref_id": "CNT-108", "tags": ["計數", "學測"]}]}, {"code": "E2-2", "name": "排列（含重複、環狀、相鄰／不相鄰）", "section": "二、排列組合", "level": "熱門", "kpi": "切角『限制計數』。直線排列(端/相鄰/不相鄰)、不完全相異物、環狀排列、重複排列", "section_color": "green", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（排列（含重複、環狀、相鄰／不相鄰））失分，先回頭重做 L1 例題、熟悉標準解法，再依序練 L2／L3。", "questions": [{"id": "E2-2-L1-Q1", "layer": "L1", "type": "填充題", "stem": "將 $A,B,C,D,E$ 五個相異字母排成一列，若 $A$ 不排在首位，共有幾種排法？", "answer": "$96$", "solution": "全部排法 $5!=120$，扣掉 $A$ 在首位的 $4!=24$ 種：$120-24=96$。", "skills": ["直線排列", "扣除法"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（直線排列）", "ref_id": "", "tags": ["排列"]}, {"id": "E2-2-L1-Q2", "layer": "L1", "type": "填充題", "stem": "將「$BANANA$」六個字母排成一列，共可排出幾種相異排列？", "answer": "$60$", "solution": "含 $A$ 三個、$N$ 兩個、$B$ 一個，為**不完全相異物排列**：$\\dfrac{6!}{3!\\,2!\\,1!}=\\dfrac{720}{12}=60$。", "skills": ["不完全相異物排列"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（不完全相異物）", "ref_id": "", "tags": ["排列", "重複"]}, {"id": "E2-2-L2-Q1", "layer": "L2", "type": "單選題", "stem": "甲、乙、丙、丁、戊 $5$ 名同學站成一排。若甲不站兩端、丙與丁相鄰，則排法共有幾種？\n(1) 12　(2) 24　(3) 30　(4) 36　(5) 48", "answer": "(2) $24$", "solution": "丙丁綑綁為一塊（內部 $2!$），與其餘 $3$ 人共 $4$ 個對象排列；扣除甲在兩端的情形。逐步計數得 $24$ 種。", "skills": ["相鄰捆綁", "不站端", "限制排列"], "difficulty_star": 2, "bloom": "應用", "source_kind": "段考真題", "source": "建國中學113下高一第二次期中考", "ref_id": "PRM-270", "tags": ["排列", "相鄰"]}, {"id": "E2-2-L2-Q2", "layer": "L2", "type": "填充題", "stem": "六件不同的物品分給甲、乙、丙三人（每人可兼得），且甲、乙都至少得一件，分法有幾種？", "answer": "$602$", "solution": "不限制共 $3^6=729$。扣甲未得（$2^6=64$）與乙未得（$2^6=64$），再加回甲乙皆未得（$1^6=1$）：$729-64-64+1=602$。", "skills": ["重複排列", "排容原理"], "difficulty_star": 2, "bloom": "應用", "source_kind": "段考真題", "source": "北一女中113下高一第二次期中考", "ref_id": "PRM-258", "tags": ["重複排列", "分配"]}, {"id": "E2-2-L2-Q3", "layer": "L2", "type": "填充題", "stem": "$5$ 人圍坐一圓桌，共有幾種不同的座位安排（旋轉視為相同）？", "answer": "$24$", "solution": "**環狀排列**：$n$ 人圓桌為 $(n-1)!$。$5$ 人為 $(5-1)!=4!=24$。", "skills": ["環狀排列"], "difficulty_star": 3, "bloom": "理解", "source_kind": "改編", "source": "改編（環狀排列）", "ref_id": "", "tags": ["環狀"]}, {"id": "E2-2-L2-Q4", "layer": "L2", "type": "填充題", "stem": "甲、乙、丙、丁、戊 $5$ 人排成一列，若甲、乙必須相鄰，共有幾種排法？", "answer": "$48$", "solution": "甲乙綑綁為一塊（內部 $2!$），與其餘 $3$ 人共 $4$ 個對象排列 $4!$：$2!\\times4!=2\\times24=48$。", "skills": ["相鄰捆綁"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（相鄰捆綁）", "ref_id": "", "tags": ["相鄰"]}, {"id": "E2-2-L3-Q1", "layer": "L3", "type": "填充題", "stem": "從 $AAAABBCC$ 八個字母中任選 $5$ 個排成一列，且**同字不相鄰**，共有幾種排列？", "answer": "$40$", "solution": "依選出的字母種類組成（受 $A\\le4,B\\le2,C\\le2$ 限制）分類，對每種組成計算「同字不相鄰」的排列數後加總，得 $40$ 種。", "skills": ["不完全相異物", "同字不相鄰", "分類計數"], "difficulty_star": 5, "bloom": "分析", "source_kind": "段考真題", "source": "高雄女中112下高一第二次段考", "ref_id": "PRM-406", "tags": ["排列", "不相鄰"]}, {"id": "E2-2-L3-Q2", "layer": "L3", "type": "填充題", "stem": "甲、乙、丙、丁、戊 $5$ 人排成一列，若甲、乙**不相鄰**，共有幾種排法？", "answer": "$72$", "solution": "先排其餘 $3$ 人 $3!=6$ 種，產生 $4$ 個空位插入甲、乙（不相鄰）$P^4_2=12$：$6\\times12=72$。\n（或 $5!-2!\\times4!=120-48=72$。）", "skills": ["不相鄰", "插空法"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（不相鄰插空）", "ref_id": "", "tags": ["不相鄰"]}, {"id": "E2-2-L3-Q3", "layer": "L3", "type": "填充題", "stem": "將 $5$ 顆相異的球放入 $3$ 個不同的盒子（盒子可空），共有幾種放法？", "answer": "$243$", "solution": "每顆球各有 $3$ 種選擇，由乘法原理（**重複排列**）：$3^5=243$。", "skills": ["重複排列", "球盒模型"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（重複排列）", "ref_id": "", "tags": ["重複排列"]}, {"id": "E2-2-L4-Q1", "layer": "L4", "type": "單選題", "stem": "某地區車牌六碼，前兩碼為 $O$ 以外的大寫字母、後四碼為 $0\\sim9$，規定不能連續出現三個 $4$。則第一碼為 $A$、最後一碼為 $4$ 的車牌個數為\n(1) $25\\times9^3$　(2) $25\\times900$　(3) $25\\times999$　(4) $25\\times990$　(5) $25\\times1000$", "answer": "(4) $25\\times990$", "solution": "第一碼固定 $A$、第二碼 $25$ 種；末碼固定 $4$。後四碼為 $d_1d_2d_34$，需無「$444$」：$d_1d_2d_3$ 共 $1000$ 種，扣掉使出現 $444$ 的 $10$ 種，得 $990$。總數 $25\\times990$。", "skills": ["限制計數", "連續排除"], "difficulty_star": 4, "bloom": "分析", "source_kind": "大考真題", "source": "97學測第4題", "ref_id": "PRM-334", "tags": ["限制計數", "學測"]}, {"id": "E2-2-L4-Q2", "layer": "L4", "type": "填充題", "stem": "從玫瑰、菊花、杜鵑、蘭花、山茶、水仙、繡球 $7$ 盆花中選 $4$ 盆排成一列，其中杜鵑與山茶都被選到且兩者相鄰，排法有幾種？", "answer": "$120$", "solution": "杜鵑、山茶必選且相鄰（內部 $2!$）；再從其餘 $5$ 盆選 $2$ 盆 $C^5_2=10$；將「杜鵑山茶塊」與選出 $2$ 盆共 $3$ 個對象排列 $3!=6$。$2!\\times10\\times6=120$。", "skills": ["相鄰捆綁", "選排綜合"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "102指考數乙選填A", "ref_id": "PRM-340", "tags": ["相鄰", "指考"]}, {"id": "E2-2-L4-Q3", "layer": "L4", "type": "填充題", "stem": "趙、錢兩對夫婦及孫先生、李先生共 $6$ 人圍坐圓桌。已知趙先生與孫先生坐定在相鄰兩位，若限定夫妻不得相鄰，則其餘四人就座方法有幾種？", "answer": "$10$", "solution": "趙先生、孫先生固定相鄰後，其餘 $4$ 個座位排趙太太、錢先生、錢太太、李先生，扣除「趙夫妻相鄰」「錢夫妻相鄰」的情形，得 $10$ 種。", "skills": ["環狀排列", "夫妻不相鄰", "排容"], "difficulty_star": 4, "bloom": "分析", "source_kind": "大考真題", "source": "97指考數乙選填A", "ref_id": "PRM-345", "tags": ["環狀", "指考"]}, {"id": "E2-2-L4-Q4", "layer": "L4", "type": "單選題", "stem": "一家六口（爺爺、奶奶、爸爸、媽媽、姐姐、小丸子）排成一列照相。若爺爺與爸爸不相鄰、爸爸與媽媽不相鄰、媽媽與姐姐不相鄰，排法有幾種？\n(1) 132　(2) 180　(3) 240　(4) 276　(5) 426", "answer": "(2) $180$", "solution": "對三組「不相鄰」條件用排容原理（全體 $6!$ 扣除各相鄰情形再加回交集），計得 $180$ 種。", "skills": ["多條件不相鄰", "排容原理"], "difficulty_star": 4, "bloom": "分析", "source_kind": "模考真題", "source": "107學測中區數A第1次模考", "ref_id": "PER-018", "tags": ["不相鄰", "模考"]}, {"id": "E2-2-L4-Q5", "layer": "L4", "type": "填充題", "stem": "將 $0,0,1,1,2,3,5$ 共七個數字排成一列，可排出幾種相異的七位數（首位不為 $0$）？", "answer": "$900$", "solution": "不限首位的相異排列 $\\dfrac{7!}{2!\\,2!}=1260$；扣掉首位為 $0$ 的 $\\dfrac{6!}{2!}=360$（剩 $0,1,1,2,3,5$）：$1260-360=900$。", "skills": ["不完全相異物", "首位限制"], "difficulty_star": 3, "bloom": "應用", "source_kind": "模考真題", "source": "107學測臺北數A第1次模考", "ref_id": "PER-026", "tags": ["排列", "重複", "模考"]}, {"id": "E2-2-L4-Q6", "layer": "L4", "type": "填充題", "stem": "八棟大廈由左至右編號 $1\\sim8$。選其中三棟設電信基地台，且基地台不可設在相鄰兩棟。在 $3$ 號大廈不設的條件下，選取方法有幾種？", "answer": "$13$", "solution": "三棟兩兩不相鄰的選法共 $C^6_3=20$（隔板法）。扣除「選到 $3$ 號」的不相鄰選法 $7$ 種，得 $20-7=13$。", "skills": ["不相鄰選取", "隔板法"], "difficulty_star": 3, "bloom": "分析", "source_kind": "歷屆精選", "source": "歷屆學測精選（題庫標學測、年份待考）", "ref_id": "PRM-188", "tags": ["不相鄰", "學測"]}]}, {"code": "E2-3", "name": "組合（含重複組合、限制計數）", "section": "二、排列組合", "level": "熱門", "kpi": "切角『限制計數(115範本)』。組合C(n,r)、至少至多、分組分堆、重複組合H/整數解、二項式定理", "section_color": "green", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（組合（含重複組合、限制計數））失分，先回頭重做 L1 例題、熟悉標準解法，再依序練 L2／L3。", "questions": [{"id": "E2-3-L1-Q1", "layer": "L1", "type": "填充題", "stem": "從 $10$ 名同學中選出 $3$ 名擔任幹部（不分職務），共有幾種選法？", "answer": "$120$", "solution": "不分順序為**組合**：$C^{10}_3=\\dfrac{10\\cdot9\\cdot8}{3!}=120$。", "skills": ["組合"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（組合）", "ref_id": "", "tags": ["組合"]}, {"id": "E2-3-L1-Q2", "layer": "L1", "type": "填充題", "stem": "求 $(1+x)^5$ 展開式中 $x^2$ 項的係數。", "answer": "$10$", "solution": "**二項式定理**：$x^2$ 係數為 $C^5_2=10$。", "skills": ["二項式定理"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（二項式定理）", "ref_id": "", "tags": ["二項式"]}, {"id": "E2-3-L2-Q1", "layer": "L2", "type": "多選題", "stem": "關於 $(2x-1)^{15}$ 的展開式，選出正確選項。\n(1) 同類項合併後共 $16$ 個不同項　(2) 係數為正與為負的項一樣多　(3) 所有項係數總和為 $0$　(4) $x^8$ 項係數為 $C^{15}_8$　(5) $x^3$ 項係數小於 $x^4$ 項係數", "answer": "(1)(2)", "solution": "通項 $C^{15}_k(2x)^k(-1)^{15-k}$，$x^k$ 係數 $=C^{15}_k2^k(-1)^{15-k}$。\n(1) $k=0\\sim15$ 共 16 項 ✓；(2) $k$ 奇正、$k$ 偶負各 8 項 ✓；(3) 係數和 $=(2-1)^{15}=1\\ne0$ ✗；(4) $x^8$ 係數 $=-C^{15}_8\\cdot2^8\\ne C^{15}_8$ ✗；(5) $x^3$ 正、$x^4$ 負，前者較大 ✗。", "skills": ["二項式定理", "係數符號"], "difficulty_star": 2, "bloom": "分析", "source_kind": "段考真題", "source": "高雄女中113下高一第二次期中考", "ref_id": "CMB-013", "tags": ["二項式"]}, {"id": "E2-3-L2-Q2", "layer": "L2", "type": "填充題", "stem": "從 $5$ 名男生、$4$ 名女生中選出 $4$ 人，至少要有 $2$ 名女生，共有幾種選法？", "answer": "$81$", "solution": "依女生人數分類：$2$ 女 $C^4_2C^5_2=60$、$3$ 女 $C^4_3C^5_1=20$、$4$ 女 $C^4_4=1$，共 $60+20+1=81$。", "skills": ["組合", "至少分類"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（至少分類）", "ref_id": "", "tags": ["組合", "至少"]}, {"id": "E2-3-L2-Q3", "layer": "L2", "type": "填充題", "stem": "將 $6$ 個不同的人平分成 $3$ 組（每組 $2$ 人、組別不分），共有幾種分法？", "answer": "$15$", "solution": "$\\dfrac{1}{3!}\\,C^6_2C^4_2C^2_2=\\dfrac{15\\cdot6\\cdot1}{6}=15$（除以 $3!$ 因組別不分）。", "skills": ["分組分堆", "均分除階乘"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（分組分堆）", "ref_id": "", "tags": ["分組"]}, {"id": "E2-3-L2-Q4", "layer": "L2", "type": "填充題", "stem": "求方程式 $x+y+z=10$ 的正整數解中，滿足 $x\\ge1,\\ y\\ge2,\\ z\\ge3$ 的解的個數。", "answer": "$15$", "solution": "令 $x'=x-1,\\ y'=y-2,\\ z'=z-3$（皆 $\\ge0$），則 $x'+y'+z'=4$，非負整數解 $=H^3_4=C^{6}_2=15$。", "skills": ["重複組合", "整數解含下限"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（整數解下限）", "ref_id": "", "tags": ["重複組合", "整數解"]}, {"id": "E2-3-L3-Q1", "layer": "L3", "type": "填充題", "stem": "水餃店有高麗菜、韭菜、干貝三種水餃。要點 $20$ 顆，且一定要點干貝、任一種有點的話最少點 $5$ 顆。共有幾種點法？", "answer": "$44$", "solution": "設三種顆數 $a,b,c$，$a+b+c=20$，干貝 $c\\ge5$，其餘「有點則 $\\ge5$」。依「韭菜、高麗菜各為 $0$ 或 $\\ge5$」分四類窮舉整數解，得 $44$ 種。", "skills": ["重複組合", "下限與分類", "限制計數"], "difficulty_star": 4, "bloom": "分析", "source_kind": "模考真題", "source": "108學測臺北數A第1次模考", "ref_id": "CMB-088", "tags": ["整數解", "限制計數", "模考"]}, {"id": "E2-3-L3-Q2", "layer": "L3", "type": "多選題", "stem": "吃完 $32$ 個雞塊，每次放 $3$ 個或 $4$ 個直到吃完。選出正確選項。\n(1) 每次都 $4$ 個，分配情形 $8$ 種　(2) $3$ 個的有 $8$ 次其餘 $4$ 個，分配 $38$ 種　(3) $3$ 個的有 $4$ 次其餘 $4$ 個，分配 $126$ 種　(4) 所有分配情形共 $172$ 種　(5) 累積到第 $20$ 塊須喘息，分配 $32$ 種", "answer": "(3)(4)(5)", "solution": "$3a+4b=32$ 的非負解 $(a,b)=(0,8),(4,5),(8,2)$，序列數各 $C^{a+b}_a$。\n(1) 全 $4$ 僅 $1$ 種 ✗；(3) $4$ 個三、$5$ 個四 $\\Rightarrow C^9_4=126$ ✓；(4) 總 $1+126+45=172$ ✓；(2) $8$ 個三、$2$ 個四 $\\Rightarrow C^{10}_8=45\\ne38$ ✗；(5) 經第 $20$ 塊分段相乘得 $32$ ✓。", "skills": ["有序計數", "二段乘法"], "difficulty_star": 5, "bloom": "分析", "source_kind": "模考真題", "source": "108學測全國數A第2次模考", "ref_id": "CMB-084", "tags": ["計數", "模考"]}, {"id": "E2-3-L3-Q3", "layer": "L3", "type": "填充題", "stem": "從高麗菜、韭菜、干貝三種水餃中買 $10$ 顆（每種可買 $0$ 顆以上），共有幾種購買組合？", "answer": "$66$", "solution": "**重複組合**：三種選 $10$ 顆（可重複）$=H^3_{10}=C^{3+10-1}_{10}=C^{12}_2=66$。", "skills": ["重複組合", "H公式"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（重複組合）", "ref_id": "", "tags": ["重複組合"]}, {"id": "E2-3-L4-Q1", "layer": "L4", "type": "單選題", "stem": "某網遊 $16$ 種材料（$6$ 基本、$10$ 進階），任選 $3$ 種合成 $1$ 類道具：三基本→必同一草藥；二基本一進階→食物（由進階種類決定、不受基本影響）；其餘→各不同藥水。共可合成幾種道具？\n(1) $256$　(2) $370$　(3) $401$　(4) $455$　(5) $560$", "answer": "(3) $401$", "solution": "草藥：三基本所有組合都同一種 $\\Rightarrow1$。食物：二基本一進階，由進階決定 $\\Rightarrow10$。\n藥水：一基本二進階 $C^6_1C^{10}_2=270$、零基本三進階 $C^{10}_3=120$，各不同 $\\Rightarrow390$。\n總計 $1+10+390=401$。", "skills": ["分類計數", "等價歸併", "限制計數"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "115學測數A第4題", "ref_id": "CMB-044", "tags": ["限制計數", "學測"]}, {"id": "E2-3-L4-Q2", "layer": "L4", "type": "填充題", "stem": "$9$ 人（甲、乙…壬）組成 $3$ 隊、每隊 $3$ 人進行鬥牛賽。若甲、乙兩人不在同一隊，組隊方法有幾種？", "answer": "$210$", "solution": "$9$ 人均分 $3$ 隊（隊不分）共 $\\dfrac{1}{3!}C^9_3C^6_3C^3_3=280$。\n甲乙同隊：第三人 $C^7_1=7$，餘 $6$ 人分 $2$ 隊 $\\dfrac{1}{2!}C^6_3=10$，共 $70$。\n$280-70=210$。", "skills": ["分組分堆", "補集"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "90學測第20題", "ref_id": "CMB-029", "tags": ["分組", "學測"]}, {"id": "E2-3-L4-Q3", "layer": "L4", "type": "填充題", "stem": "某班 $4$ 名男生、$7$ 名女生。啦啦隊每隊 $8$ 人，且男、女均至少 $2$ 人。由此 $11$ 人選 $8$ 人組隊，共有幾種方法？", "answer": "$161$", "solution": "依男生人數（$2,3,4$）分類：$C^4_2C^7_6+C^4_3C^7_5+C^4_4C^7_4=6\\cdot7+4\\cdot21+1\\cdot35=42+84+35=161$。", "skills": ["組合", "至少限制"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "93指考數乙選填B", "ref_id": "CMB-049", "tags": ["組合", "指考"]}, {"id": "E2-3-L4-Q4", "layer": "L4", "type": "多選題", "stem": "將 $(x^2+y)^{12}$ 展開合併後，選出正確選項。\n(1) $x^{24}$ 係數小於 $x^{10}y^7$ 係數　(2) $x^{12}y^6$ 係數小於 $x^{10}y^7$ 係數　(3) $x^{14}y^5$ 係數小於 $x^{10}y^7$ 係數　(4) $x^8y^8$ 係數小於 $x^{10}y^7$ 係數", "answer": "(1)(4)", "solution": "$x^{2k}y^{12-k}$ 的係數為 $C^{12}_k$。$x^{10}y^7$ 對應 $k=5$，$C^{12}_5=792$。\n(1) $k=12$：$C^{12}_{12}=1<792$ ✓；(2) $k=6$：$924>792$ ✗；(3) $k=7$：$792=792$ ✗；(4) $k=4$：$495<792$ ✓。", "skills": ["二項式係數", "C(n,k)比較"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "101指考數乙第5題", "ref_id": "CMB-053", "tags": ["二項式", "指考"]}, {"id": "E2-3-L4-Q5", "layer": "L4", "type": "多選題", "stem": "甲、乙、丙、丁四男與 $A,B,C,D$ 四女混搭兩車、每車 $4$ 人。已知甲與 $A$ 同車、乙與 $B$ 同車、$C$ 與 $D$ 不同車。選出正確選項。\n(1) $A$ 與 $D$ 必不同車　(2) 甲與乙可能同車　(3) 丙與丁必同車　(4) $A$ 與 $B$ 必不同車　(5) 共有 $8$ 種乘車方式", "answer": "(2)(5)", "solution": "由「甲A同車、乙B同車、C與D不同車」逐一窮舉兩車分組：甲乙可能同車（(2)✓）；總分配恰 $8$ 種（(5)✓）；其餘選項可舉反例排除。", "skills": ["分組計數", "條件限制"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "105指考數乙第5題", "ref_id": "CMB-046", "tags": ["組合", "指考"]}, {"id": "E2-3-L4-Q6", "layer": "L4", "type": "多選題", "stem": "商店出售 $10$ 種公仔。甲、乙、丙各自收集。選出正確選項（鴿籠原理）。\n(1) 甲乙各 $6$ 款則合起來必達 $10$ 款　(2) 甲乙各 $7$ 款則至少 $4$ 款兩人共有　(3) 甲乙丙各 $6$ 款則至少 $1$ 款三人共有　(4) 甲乙丙各 $7$ 款則至少 $2$ 款三人共有　(5) 甲乙丙各 $8$ 款則至少 $4$ 款三人共有", "answer": "(2)(5)", "solution": "以**排容/鴿籠**估計交集下限。(2) 甲乙各 $7$：$|甲\\cap乙|\\ge7+7-10=4$ ✓；(5) 三人各 $8$：$|甲\\cap乙\\cap丙|\\ge8\\cdot3-2\\cdot10=4$ ✓。其餘可舉反例（如 (3) 各 $6$：$6\\cdot3-2\\cdot10=-2$ 無法保證）。", "skills": ["鴿籠原理", "排容下限"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "108指考數乙第6題", "ref_id": "CMB-054", "tags": ["組合", "鴿籠", "指考"]}]}, {"code": "E3-1", "name": "古典機率", "section": "三、機率", "level": "熱門", "kpi": "116 機率區最高頻(1.5倍)。古典機率/樣本空間、排列組合型機率、餘事件/加法定理/機率範圍", "section_color": "pink", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（古典機率）失分，先回頭重做 L1 例題、熟悉標準解法，再依序練 L2／L3。", "questions": [{"id": "E3-1-L1-Q1", "layer": "L1", "type": "填充題", "stem": "擲一公正骰子一次，求出現點數大於 $4$ 的機率。", "answer": "$\\dfrac13$", "solution": "樣本空間 $\\{1,\\dots,6\\}$ 共 $6$ 種；大於 $4$ 者為 $\\{5,6\\}$ 共 $2$ 種。機率 $=\\dfrac26=\\dfrac13$。", "skills": ["古典機率", "樣本空間"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（古典機率）", "ref_id": "", "tags": ["古典機率"]}, {"id": "E3-1-L1-Q2", "layer": "L1", "type": "填充題", "stem": "袋中有 $3$ 白球、$3$ 紅球（僅顏色相異）。任取一球，求取到紅球的機率。", "answer": "$\\dfrac12$", "solution": "$6$ 球中紅球 $3$ 個，機率 $=\\dfrac36=\\dfrac12$。", "skills": ["古典機率"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（古典機率）", "ref_id": "", "tags": ["古典機率"]}, {"id": "E3-1-L2-Q1", "layer": "L2", "type": "填充題", "stem": "將「$listen$」六個字母隨機排列，恰排成「$silent$」的機率為何？", "answer": "$\\dfrac1{720}$", "solution": "六字母皆相異，排列數 $6!=720$；目標排法僅 $1$ 種。機率 $=\\dfrac1{720}$。", "skills": ["排列型機率"], "difficulty_star": 3, "bloom": "應用", "source_kind": "段考真題", "source": "師大附中113下高一期末考", "ref_id": "PRB-417", "tags": ["古典機率", "排列"]}, {"id": "E3-1-L2-Q2", "layer": "L2", "type": "單選題", "stem": "事件 $A$ 機率為 $\\dfrac23$、事件 $B$ 機率為 $\\dfrac14$。設 $p=P(A\\cup B)$，求 $p$ 的範圍。\n(1) $\\dfrac12\\le p\\le\\dfrac23$　(2) $\\dfrac14\\le p\\le\\dfrac23$　(3) $\\dfrac23\\le p\\le\\dfrac{11}{12}$　(4) $\\dfrac23\\le p\\le1$　(5) $\\dfrac{11}{12}\\le p\\le1$", "answer": "(3) $\\dfrac23\\le p\\le\\dfrac{11}{12}$", "solution": "$P(A\\cup B)\\ge\\max(P(A),P(B))=\\dfrac23$；$P(A\\cup B)\\le P(A)+P(B)=\\dfrac23+\\dfrac14=\\dfrac{11}{12}$。故 $\\dfrac23\\le p\\le\\dfrac{11}{12}$。", "skills": ["加法定理", "機率範圍"], "difficulty_star": 3, "bloom": "應用", "source_kind": "段考真題", "source": "師大附中113下高一期末考", "ref_id": "PRB-412", "tags": ["加法定理", "範圍"]}, {"id": "E3-1-L2-Q3", "layer": "L2", "type": "填充題", "stem": "擲兩公正骰子，求點數和為 $7$ 的機率。", "answer": "$\\dfrac16$", "solution": "樣本空間 $36$ 種；和為 $7$ 者 $(1,6),(2,5),(3,4),(4,3),(5,2),(6,1)$ 共 $6$ 種。機率 $=\\dfrac6{36}=\\dfrac16$。", "skills": ["古典機率", "兩骰"], "difficulty_star": 2, "bloom": "應用", "source_kind": "改編", "source": "改編（兩骰機率）", "ref_id": "", "tags": ["古典機率"]}, {"id": "E3-1-L2-Q4", "layer": "L2", "type": "填充題", "stem": "擲兩公正骰子，求至少出現一個 $6$ 點的機率。", "answer": "$\\dfrac{11}{36}$", "solution": "**餘事件**：沒有 $6$ 的機率 $=\\dfrac{5}{6}\\times\\dfrac56=\\dfrac{25}{36}$。至少一個 $6$ $=1-\\dfrac{25}{36}=\\dfrac{11}{36}$。", "skills": ["餘事件"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（餘事件）", "ref_id": "", "tags": ["餘事件"]}, {"id": "E3-1-L3-Q1", "layer": "L3", "type": "填充題", "stem": "同時擲三粒公正骰子，求恰有兩粒點數相同的機率（最簡分數）。", "answer": "$\\dfrac5{12}$", "solution": "樣本空間 $6^3=216$。恰兩粒相同：選相同點數 $6$ 種、第三粒不同 $5$ 種、位置 $C^3_2=3$，共 $6\\times5\\times3=90$。機率 $=\\dfrac{90}{216}=\\dfrac5{12}$。", "skills": ["排列組合型機率", "恰好型"], "difficulty_star": 3, "bloom": "分析", "source_kind": "段考真題", "source": "高雄女中113下高一期末考", "ref_id": "PRB-422", "tags": ["古典機率"]}, {"id": "E3-1-L3-Q2", "layer": "L3", "type": "填充題", "stem": "在 $x+y+z=12$ 的非負整數解中任取一組（等可能），求 $x,y,z$ 皆為正的機率（最簡分數）。", "answer": "$\\dfrac{55}{91}$", "solution": "全部非負整數解 $H^3_{12}=C^{14}_2=91$。皆正者令 $x',y',z'\\ge0$、$x'+y'+z'=9$，$H^3_9=C^{11}_2=55$。機率 $=\\dfrac{55}{91}$。", "skills": ["重複組合", "計數型機率"], "difficulty_star": 3, "bloom": "分析", "source_kind": "段考真題", "source": "板橋高中103下高一第二次段考", "ref_id": "PRB-443", "tags": ["古典機率", "重複組合"]}, {"id": "E3-1-L3-Q3", "layer": "L3", "type": "填充題", "stem": "甲、乙、丙、丁、戊 $5$ 人隨機排成一列，求甲、乙相鄰的機率。", "answer": "$\\dfrac25$", "solution": "全部排法 $5!=120$；甲乙相鄰 $2!\\times4!=48$。機率 $=\\dfrac{48}{120}=\\dfrac25$。", "skills": ["排列型機率", "相鄰"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（排列型機率）", "ref_id": "", "tags": ["古典機率", "排列"]}, {"id": "E3-1-L4-Q1", "layer": "L4", "type": "多選題", "stem": "從 $1,2,3,4,5,6,7$ 中任取兩數，選出正確選項。\n(1) 其和大於 $10$ 的機率為 $\\dfrac17$　(2) 其和小於 $5$ 的機率為 $\\dfrac17$　(3) 其和為奇數的機率為 $\\dfrac47$　(4) 其差為偶數的機率為 $\\dfrac57$　(5) 其積為奇數的機率為 $\\dfrac27$", "answer": "(3)(5)", "solution": "$C^7_2=21$ 種。(3) 一奇一偶才和為奇：奇 $4$ 偶 $3$，$4\\times3=12$，$\\dfrac{12}{21}=\\dfrac47$ ✓；(5) 兩數皆奇積才奇：$C^4_2=6$，$\\dfrac6{21}=\\dfrac27$ ✓。(1)和$>10$：$3/21=1/7$? 實為 $(4,7),(5,6),(5,7),(6,7)=4$，$\\dfrac4{21}\\ne\\dfrac17$ ✗；(2)和$<5$：$(1,2),(1,3)=2$，$\\dfrac2{21}\\ne\\dfrac17$ ✗；(4)差為偶：同奇或同偶 $C^4_2+C^3_2=6+3=9$，$\\dfrac9{21}=\\dfrac37\\ne\\dfrac57$ ✗。", "skills": ["古典機率", "奇偶分析"], "difficulty_star": 2, "bloom": "分析", "source_kind": "歷屆精選", "source": "歷屆學測精選（題庫標學測、年份待考）", "ref_id": "PRB-059", "tags": ["古典機率", "學測"]}, {"id": "E3-1-L4-Q2", "layer": "L4", "type": "填充題", "stem": "連續擲一公正骰子兩次，點數依序為 $a,b$。求 $\\log(a^2)+\\log b>1$ 的機率。", "answer": "$\\dfrac34$", "solution": "不等式即 $\\log(a^2b)>1\\Rightarrow a^2b>10$。$36$ 種中，$a=1$ 無解、$a=2$ 有 $4$、$a=3$ 有 $5$、$a\\ge4$ 各 $6$，共 $0+4+5+6+6+6=27$。機率 $=\\dfrac{27}{36}=\\dfrac34$。", "skills": ["古典機率", "對數不等式"], "difficulty_star": 3, "bloom": "分析", "source_kind": "歷屆精選", "source": "歷屆學測精選（題庫標學測、年份待考）", "ref_id": "PRB-060", "tags": ["古典機率", "學測"]}, {"id": "E3-1-L4-Q3", "layer": "L4", "type": "填充題", "stem": "某班 $20$ 男、$15$ 女，抽籤推派 $3$ 人（中籤等可能）。求推派的 $3$ 人中有男也有女的機率。", "answer": "$\\dfrac{90}{119}$", "solution": "全部 $C^{35}_3=6545$。全男 $C^{20}_3=1140$、全女 $C^{15}_3=455$。有男有女 $=1-\\dfrac{1140+455}{6545}=\\dfrac{4950}{6545}=\\dfrac{90}{119}$。", "skills": ["古典機率", "補集", "組合"], "difficulty_star": 3, "bloom": "分析", "source_kind": "歷屆精選", "source": "歷屆學測精選（題庫標學測、年份待考）", "ref_id": "PRB-069", "tags": ["古典機率", "學測"]}, {"id": "E3-1-L4-Q4", "layer": "L4", "type": "多選題", "stem": "方程組 $\\begin{cases}ax+6y=6\\\\x+by=1\\end{cases}$ 的 $a$ 由擲骰子點數決定、$b$ 由硬幣決定（正面 $b=1$、反面 $b=2$）。選出正確選項。\n(1) $a=b$ 的機率為 $\\dfrac13$　(2) 方程組無解的機率為 $\\dfrac1{12}$　(3) 方程組有唯一解的機率為 $\\dfrac56$　(4) 硬幣反面且方程組有解的機率為 $\\dfrac12$　(5) 在硬幣反面且有解的條件下 $x>0$ 的機率為 $\\dfrac25$", "answer": "(2)(3)", "solution": "唯一解 $\\Leftrightarrow ab\\ne6$。$ab=6$ 僅 $(a,b)=(6,1)$（無窮多解）與 $(3,2)$（無解），各 $\\dfrac1{12}$。\n(2) 無解僅 $(3,2)$：$\\dfrac1{12}$ ✓；(3) 唯一解 $=1-\\dfrac2{12}=\\dfrac56$ ✓；其餘經計算為偽。", "skills": ["古典機率", "方程組解的個數"], "difficulty_star": 4, "bloom": "分析", "source_kind": "歷屆精選", "source": "歷屆學測精選（題庫標學測、年份待考）", "ref_id": "PRB-054", "tags": ["古典機率", "學測"]}, {"id": "E3-1-L4-Q5", "layer": "L4", "type": "填充題", "stem": "箱中有編號 $0\\sim9$ 的十顆球。取一球放回後再取一球。問兩球編號之差的絕對值為何值時，出現機率最大？", "answer": "$1$", "solution": "共 $100$ 種等可能。$|$差$|=d$ 的種數：$d=0$ 有 $10$；$d\\ge1$ 有 $2(10-d)$。$d=1$ 時 $2\\times9=18$ 為最大。故 $|$差$|=1$。", "skills": ["古典機率", "有放回"], "difficulty_star": 3, "bloom": "分析", "source_kind": "歷屆精選", "source": "歷屆學測精選（題庫標學測、年份待考）", "ref_id": "PRB-070", "tags": ["古典機率", "學測"]}, {"id": "E3-1-L4-Q6", "layer": "L4", "type": "多選題", "stem": "$A,B,C,D$ 四女依序抽甲、乙、丙、丁四男的機車鑰匙。$B$ 認得甲的鑰匙絕不選，其餘等可能。選出正確選項。\n(1) $P(A\\text{抽甲})>P(C\\text{抽甲})$　(2) $P(C\\text{抽甲})>P(D\\text{抽甲})$　(3) $P(A\\text{抽乙})>P(B\\text{抽乙})$　(4) $P(B\\text{抽丙})>P(C\\text{抽丙})$　(5) $P(C\\text{抽甲})>P(C\\text{抽乙})$", "answer": "(4)(5)", "solution": "有效排列 $=4!-3!=18$（扣 $B$ 抽甲）。逐一計算：$P(A\\text{抽甲})=P(C\\text{抽甲})=\\dfrac13$（(1)✗）；$P(B\\text{抽丙})=\\dfrac13>P(C\\text{抽丙})=\\dfrac29$（(4)✓）；$P(C\\text{抽甲})=\\dfrac13>P(C\\text{抽乙})=\\dfrac29$（(5)✓）。", "skills": ["條件下古典機率", "限制排列"], "difficulty_star": 4, "bloom": "分析", "source_kind": "歷屆精選", "source": "歷屆學測精選（題庫標學測、年份待考）", "ref_id": "PRB-074", "tags": ["古典機率", "學測"]}]}, {"code": "E3-2", "name": "條件機率、獨立事件", "section": "三、機率", "level": "熱門", "kpi": "🔴116 機率1.5倍。條件機率 P(A|B)=P(A∩B)/P(B)、獨立事件 P(A∩B)=P(A)P(B)、相依", "section_color": "pink", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（條件機率、獨立事件）失分，先回頭重做 L1 例題、熟悉標準解法，再依序練 L2／L3。", "questions": [{"id": "E3-2-L1-Q1", "layer": "L1", "type": "填充題", "stem": "擲一公正骰子一次。在「出現偶數點」的條件下，求點數大於 $3$ 的機率。", "answer": "$\\dfrac23$", "solution": "偶數點 $\\{2,4,6\\}$（$3$ 種）為條件樣本空間；其中大於 $3$ 者 $\\{4,6\\}$（$2$ 種）。條件機率 $=\\dfrac23$。", "skills": ["條件機率", "縮減樣本空間"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（條件機率）", "ref_id": "", "tags": ["條件機率"]}, {"id": "E3-2-L1-Q2", "layer": "L1", "type": "填充題", "stem": "兩事件 $A,B$ 獨立，$P(A)=\\dfrac23$、$P(B)=\\dfrac14$。求 $P(A\\cap B)$。", "answer": "$\\dfrac16$", "solution": "**獨立事件**：$P(A\\cap B)=P(A)P(B)=\\dfrac23\\times\\dfrac14=\\dfrac16$。", "skills": ["獨立事件"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（獨立事件）", "ref_id": "", "tags": ["獨立"]}, {"id": "E3-2-L2-Q1", "layer": "L2", "type": "單選題", "stem": "擲兩公正骰子，在「點數和大於 $8$」的條件下，求兩點數相同的機率。\n(1) $\\dfrac16$　(2) $\\dfrac2{15}$　(3) $\\dfrac45$　(4) $\\dfrac15$　(5) $\\dfrac1{18}$", "answer": "(4) $\\dfrac15$", "solution": "和 $>8$ 的情形：和為 $9,10,11,12$ 共 $4+3+2+1=10$ 種；其中兩點相同者 $(5,5),(6,6)$ 共 $2$ 種。條件機率 $=\\dfrac2{10}=\\dfrac15$。", "skills": ["條件機率", "縮減樣本空間"], "difficulty_star": 3, "bloom": "應用", "source_kind": "段考真題", "source": "中山女高112下高二第二次期中考", "ref_id": "CPB-127", "tags": ["條件機率"]}, {"id": "E3-2-L2-Q2", "layer": "L2", "type": "填充題", "stem": "小文與阿遠各有一次抽加碼點數的機會，兩人抽中與否獨立且抽中機率相同。若至少一人抽中的機率為 $0.51$，求兩人同時抽中的機率。", "answer": "$\\dfrac9{100}$", "solution": "設抽中機率 $p$。至少一人 $=1-(1-p)^2=0.51\\Rightarrow(1-p)^2=0.49\\Rightarrow1-p=0.7\\Rightarrow p=0.3$。\n同時抽中 $=p^2=0.09=\\dfrac9{100}$。", "skills": ["獨立事件", "至少餘事件"], "difficulty_star": 3, "bloom": "應用", "source_kind": "段考真題", "source": "中山女高112下高二第二次期中考", "ref_id": "CPB-131", "tags": ["獨立"]}, {"id": "E3-2-L2-Q3", "layer": "L2", "type": "填充題", "stem": "擲兩公正骰子，在「點數和為偶數」的條件下，求至少出現一個 $3$ 點的機率。", "answer": "$\\dfrac5{18}$", "solution": "和為偶數（兩奇或兩偶）共 $18$ 種。其中含 $3$ 者：$(3,1),(1,3),(3,3),(3,5),(5,3)$ 共 $5$ 種。條件機率 $=\\dfrac5{18}$。", "skills": ["條件機率"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（條件機率）", "ref_id": "", "tags": ["條件機率"]}, {"id": "E3-2-L2-Q4", "layer": "L2", "type": "填充題", "stem": "兩獨立事件 $A,B$，$P(A)=0.6$、$P(B)=0.5$。求 $P(A\\cup B)$。", "answer": "$\\dfrac45$", "solution": "$P(A\\cup B)=P(A)+P(B)-P(A)P(B)=0.6+0.5-0.3=0.8=\\dfrac45$。", "skills": ["獨立事件", "加法定理"], "difficulty_star": 2, "bloom": "應用", "source_kind": "改編", "source": "改編（獨立加法）", "ref_id": "", "tags": ["獨立"]}, {"id": "E3-2-L3-Q1", "layer": "L3", "type": "填充題", "stem": "樣本空間中 $A,B$ 為獨立事件，$P(A)=\\dfrac14$、$P(A\\cup B)=2P(B)-P(A)$，求 $P(B'\\mid A)$。", "answer": "$\\dfrac35$", "solution": "由獨立 $P(A\\cup B)=P(A)+P(B)-P(A)P(B)$。代入 $=2P(B)-P(A)$ 解得 $P(B)=\\dfrac25$。\n獨立 $\\Rightarrow P(B'\\mid A)=P(B')=1-\\dfrac25=\\dfrac35$。", "skills": ["獨立事件", "條件機率"], "difficulty_star": 3, "bloom": "分析", "source_kind": "段考真題", "source": "台中一中110下高二第二次期中考", "ref_id": "CPB-104", "tags": ["獨立", "條件機率"]}, {"id": "E3-2-L3-Q2", "layer": "L3", "type": "填充題", "stem": "袋中 $5$ 紅 $3$ 白共 $8$ 球，不放回連取兩球。在「第一球為紅」的條件下，求第二球為白的機率。", "answer": "$\\dfrac37$", "solution": "第一球紅後，袋中剩 $4$ 紅 $3$ 白共 $7$ 球。第二球白的條件機率 $=\\dfrac37$。", "skills": ["相依事件", "不放回"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（相依抽球）", "ref_id": "", "tags": ["相依"]}, {"id": "E3-2-L3-Q3", "layer": "L3", "type": "填充題", "stem": "擲兩公正骰子，事件 $A$＝「第一顆為偶數」、事件 $B$＝「點數和為 $7$」。判斷 $A,B$ 是否獨立，並求 $P(A\\cap B)$。", "answer": "獨立；$P(A\\cap B)=\\dfrac16\\cdot\\dfrac12=\\dfrac1{12}$（驗 $P(A\\cap B)=\\dfrac3{36}=\\dfrac1{12}$）", "solution": "$P(A)=\\dfrac12$、$P(B)=\\dfrac6{36}=\\dfrac16$。$A\\cap B$：第一顆偶且和 $7$，即 $(2,5),(4,3),(6,1)$ 共 $3$ 種，$P=\\dfrac3{36}=\\dfrac1{12}=P(A)P(B)$，故**獨立**。", "skills": ["獨立判斷", "條件機率"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（獨立判斷）", "ref_id": "", "tags": ["獨立"]}, {"id": "E3-2-L4-Q1", "layer": "L4", "type": "填充題", "stem": "投擲一枚均勻銅板 $8$ 次。在「最初兩次曾出現正面」的條件下，求 $8$ 次中恰好出現 $3$ 次正面的條件機率（最簡分數）。", "answer": "$\\dfrac3{16}$", "solution": "條件「前兩次至少一正」的情形數 $=2^8-2^6=192$。其中恰 $3$ 正且前兩次至少一正：總恰 $3$ 正 $C^8_3=56$，扣前兩次皆反的 $C^6_3=20$，得 $36$。條件機率 $=\\dfrac{36}{192}=\\dfrac3{16}$。", "skills": ["條件機率", "二項計數"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "105指考數甲第A題", "ref_id": "CPB-072", "tags": ["條件機率", "指考"]}, {"id": "E3-2-L4-Q2", "layer": "L4", "type": "單選題", "stem": "袋中有 $1\\sim100$ 號 $100$ 顆球，隨機抽一球。下列哪個條件下，抽到 $7$ 號球的條件機率最大？\n(1) 抽到奇數　(2) 抽到質數　(3) 抽到 $7$ 的倍數　(4) 號碼不是 $5$ 的倍數　(5) 號碼小於 $10$", "answer": "(5) 號碼小於 $10$", "solution": "條件機率 $=\\dfrac{1}{\\text{條件事件的元素個數}}$（$7$ 號屬各條件）。各條件元素個數：奇 $50$、質 $25$、$7$ 倍數 $14$、非 $5$ 倍數 $80$、小於 $10$ 為 $9$。最小者 $9$ 使機率最大，選 (5)。", "skills": ["條件機率", "縮減樣本空間"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "112學測數B第5題", "ref_id": "CPB-055", "tags": ["條件機率", "學測"]}, {"id": "E3-2-L4-Q3", "layer": "L4", "type": "多選題", "stem": "不孕症患者分兩類：第一類可人工受孕（佔比 $p$），其餘為第二類無法人工受孕；每次人工受孕成功機率 $q$、各次獨立。選出正確選項。\n(1) 第一次人工受孕失敗的機率為 $(1-p)(1-q)$　(2) 失敗一次後屬第二類的條件機率為 $\\dfrac{1-p}{1-pq}$　(3) $q$ 提高則失敗一次後屬第二類的條件機率降低　(4) 第一類中做一次就成功的機率大於做兩次才成功　(5) $q$ 提高則第一類做一次成功機率增、做兩次才成功機率降", "answer": "(2)(4)", "solution": "失敗一次的機率 $=(1-p)\\cdot1+p(1-q)=1-pq$，故 (1)（$(1-p)(1-q)$）✗。\n(2) $P(\\text{二類}\\mid\\text{失敗})=\\dfrac{1-p}{1-pq}$ ✓；(4) 一次成功 $q>$ 兩次才成功 $(1-q)q$ ✓。", "skills": ["條件機率", "全機率", "獨立"], "difficulty_star": 4, "bloom": "分析", "source_kind": "大考真題", "source": "104指考數甲第8題", "ref_id": "CPB-071", "tags": ["條件機率", "指考"]}, {"id": "E3-2-L4-Q4", "layer": "L4", "type": "單選題", "stem": "配件 $A$、$B$ 故障率分別為 $0.1$、$0.15$。情況(一) $B$ 串接於 $A$ 之後、(二) $A$ 串接於 $B$ 之後、(三) $A,B$ 獨立並列；機器無法運作機率分別為 $p_1,p_2,p_3$。選出正確選項。\n(1) $p_1>p_2>p_3$　(2) $p_2>p_1>p_3$　(3) $p_3>p_2>p_1$　(4) $p_1=p_2>p_3$　(5) $p_1=p_2=p_3$", "answer": "(2) $p_2>p_1>p_3$", "solution": "並列（皆故障才停）$p_3=0.1\\times0.15=0.015$ 最小。串接情況因接法不同使 $p_2>p_1$。故 $p_2>p_1>p_3$。", "skills": ["獨立事件", "串並聯故障"], "difficulty_star": 4, "bloom": "分析", "source_kind": "大考真題", "source": "104學測第3題", "ref_id": "PRB-150", "tags": ["獨立", "學測"]}, {"id": "E3-2-L4-Q5", "layer": "L4", "type": "單選題", "stem": "擲骰：$1$ 或 $2$ 點選甲袋、其他選乙袋；再不放回取五球，依序為獎金個十百千萬位。甲袋 $\\{2,6,7,8,9\\}$、乙袋 $\\{1,3,5,6,8\\}$。在「獎金超過 $5$ 萬元」的條件下，求擲出 $6$ 點的機率。\n(1) $\\dfrac18$　(2) $\\dfrac3{20}$　(3) $\\dfrac3{10}$　(4) $\\dfrac12$　(5) $\\dfrac35$", "answer": "(2) $\\dfrac3{20}$", "solution": "獎金 $>5$ 萬 $\\Leftrightarrow$ 萬位（首取球）$\\ge6$。甲袋 $\\ge6$ 的有 $\\{6,7,8,9\\}$ 共 $4/5$，乙袋 $\\ge6$ 的有 $\\{6,8\\}$ 共 $2/5$。\n擲 $6$ 點 $\\Rightarrow$ 選乙袋（機率 $\\frac46$）。以貝氏比例計算「$>5$ 萬且為 $6$ 點」佔「$>5$ 萬」之比，得 $\\dfrac3{20}$。", "skills": ["條件機率", "全機率"], "difficulty_star": 3, "bloom": "分析", "source_kind": "模考真題", "source": "110學測全國數A第4次模考", "ref_id": "CPB-076", "tags": ["條件機率", "模考"]}, {"id": "E3-2-L4-Q6", "layer": "L4", "type": "單選題", "stem": "某地區 $30\\%$ 人口感染某傳染病。快篩試劑將染病者判為陽性的機率 $80\\%$、將未染病者判為陰性的機率 $60\\%$。設「單次採檢判為陰性者中染病者的機率」為 $P$、「連續三次皆判陰性者中染病者的機率」為 $P'$。問 $\\dfrac{P}{P'}$ 最接近？\n(1) $7$　(2) $8$　(3) $9$　(4) $10$　(5) $11$", "answer": "(2) $8$", "solution": "由貝氏：$P=\\dfrac{0.2\\times0.3}{0.2\\times0.3+0.6\\times0.7}=\\dfrac1{8}$；$P'=\\dfrac{0.2^3\\times0.3}{0.2^3\\times0.3+0.6^3\\times0.7}=\\dfrac1{64}$。$\\dfrac{P}{P'}=8$。", "skills": ["條件機率", "貝氏定理", "全機率"], "difficulty_star": 4, "bloom": "分析", "source_kind": "大考真題", "source": "111學測數A第5題", "ref_id": "CPB-051", "tags": ["條件機率", "學測"]}]}, {"code": "E3-3", "name": "貝氏定理", "section": "三、機率", "level": "熱門", "kpi": "🔴116 機率1.5倍。全機率公式、貝氏定理(逆機率)", "section_color": "pink", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（貝氏定理）失分，先回頭重做 L1 例題、熟悉標準解法，再依序練 L2／L3。", "questions": [{"id": "E3-3-L1-Q1", "layer": "L1", "type": "填充題", "stem": "甲袋有 $3$ 紅 $2$ 白、乙袋有 $1$ 紅 $4$ 白。先等機率選一袋，再從該袋取一球。求取到紅球的機率。", "answer": "$\\dfrac25$", "solution": "**全機率公式**：$P(\\text{紅})=\\dfrac12\\cdot\\dfrac35+\\dfrac12\\cdot\\dfrac15=\\dfrac3{10}+\\dfrac1{10}=\\dfrac25$。", "skills": ["全機率公式"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（全機率）", "ref_id": "", "tags": ["全機率"]}, {"id": "E3-3-L1-Q2", "layer": "L1", "type": "填充題", "stem": "承上題（甲袋 $3$ 紅 $2$ 白、乙袋 $1$ 紅 $4$ 白，等機率選袋取球）。已知取到紅球，求此球來自甲袋的機率。", "answer": "$\\dfrac34$", "solution": "**貝氏定理**：$P(\\text{甲}\\mid\\text{紅})=\\dfrac{P(\\text{甲})P(\\text{紅}\\mid\\text{甲})}{P(\\text{紅})}=\\dfrac{\\frac12\\cdot\\frac35}{\\frac25}=\\dfrac{3/10}{2/5}=\\dfrac34$。", "skills": ["貝氏定理", "逆機率"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（貝氏定理）", "ref_id": "", "tags": ["貝氏"]}, {"id": "E3-3-L2-Q1", "layer": "L2", "type": "單選題", "stem": "佳佳有 A、B、C 三個郵件帳號，收信數均相同，各帳號廣告郵件比例為 $4\\%$、$2\\%$、$3\\%$。隨機取一件，求它是廣告郵件的機率。\n(1) $\\dfrac3{100}$　(2) $\\dfrac9{100}$　(3) $\\dfrac29$　(4) $\\dfrac13$　(5) $\\dfrac49$", "answer": "(1) $\\dfrac3{100}$", "solution": "**全機率**：$P(\\text{廣告})=\\dfrac13(4\\%+2\\%+3\\%)=\\dfrac13\\cdot9\\%=3\\%=\\dfrac3{100}$。", "skills": ["全機率公式"], "difficulty_star": 2, "bloom": "應用", "source_kind": "段考真題", "source": "中山女高112下高二第二次期中考", "ref_id": "CPB-126", "tags": ["全機率"]}, {"id": "E3-3-L2-Q2", "layer": "L2", "type": "填充題", "stem": "甲、乙兩工廠各生產一半的產品，不良率分別為 $2\\%$、$4\\%$。隨機取一件為不良品，求它來自乙廠的機率。", "answer": "$\\dfrac23$", "solution": "$P(\\text{乙}\\mid\\text{不良})=\\dfrac{\\frac12\\cdot4\\%}{\\frac12\\cdot2\\%+\\frac12\\cdot4\\%}=\\dfrac{2\\%}{3\\%}=\\dfrac23$。", "skills": ["貝氏定理"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（貝氏）", "ref_id": "", "tags": ["貝氏"]}, {"id": "E3-3-L2-Q3", "layer": "L2", "type": "填充題", "stem": "晴天機率 $0.7$、雨天機率 $0.3$。小明晴天遲到機率 $0.1$、雨天遲到機率 $0.5$。求小明某日遲到的機率。", "answer": "$0.22$", "solution": "**全機率**：$P(\\text{遲到})=0.7\\times0.1+0.3\\times0.5=0.07+0.15=0.22$。", "skills": ["全機率公式"], "difficulty_star": 2, "bloom": "應用", "source_kind": "改編", "source": "改編（全機率）", "ref_id": "", "tags": ["全機率"]}, {"id": "E3-3-L2-Q4", "layer": "L2", "type": "填充題", "stem": "承上（晴 $0.7$／雨 $0.3$，晴遲到 $0.1$／雨遲到 $0.5$）。已知小明今天遲到，求今天是雨天的機率（最簡分數）。", "answer": "$\\dfrac{15}{22}$", "solution": "$P(\\text{雨}\\mid\\text{遲})=\\dfrac{0.3\\times0.5}{0.22}=\\dfrac{0.15}{0.22}=\\dfrac{15}{22}$。", "skills": ["貝氏定理"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（貝氏）", "ref_id": "", "tags": ["貝氏"]}, {"id": "E3-3-L3-Q1", "layer": "L3", "type": "填充題", "stem": "甲、乙、丙三機器各生產 $\\frac13$ 的零件，不良率分別 $2\\%$、$3\\%$、$5\\%$。隨機取一不良品，求它來自丙機器的機率（最簡分數）。", "answer": "$\\dfrac12$", "solution": "$P(\\text{丙}\\mid\\text{不良})=\\dfrac{\\frac13\\cdot5\\%}{\\frac13(2\\%+3\\%+5\\%)}=\\dfrac{5\\%}{10\\%}=\\dfrac12$（按不良率比例 $2:3:5$，丙佔 $\\dfrac5{10}$）。", "skills": ["貝氏定理", "多分支"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（三機器貝氏）", "ref_id": "", "tags": ["貝氏"]}, {"id": "E3-3-L3-Q2", "layer": "L3", "type": "填充題", "stem": "一箱中 $\\frac13$ 為新球、$\\frac23$ 為舊球。新球投進機率 $0.9$、舊球 $0.6$。隨機取一球投籃且投進，求它是新球的機率（最簡分數）。", "answer": "$\\dfrac{3}{7}$", "solution": "$P(\\text{新}\\mid\\text{進})=\\dfrac{\\frac13\\cdot0.9}{\\frac13\\cdot0.9+\\frac23\\cdot0.6}=\\dfrac{0.3}{0.3+0.4}=\\dfrac{0.3}{0.7}=\\dfrac37$。", "skills": ["貝氏定理"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（貝氏）", "ref_id": "", "tags": ["貝氏"]}, {"id": "E3-3-L3-Q3", "layer": "L3", "type": "填充題", "stem": "某工廠 $80\\%$ 機器正常、$20\\%$ 故障。正常時產品合格率 $95\\%$、故障時 $30\\%$。隨機取一不合格品，求它出自故障機器的機率（最簡分數）。", "answer": "$\\dfrac79$", "solution": "$P(\\text{故}\\mid\\text{不合格})=\\dfrac{0.2\\times0.7}{0.8\\times0.05+0.2\\times0.7}=\\dfrac{0.14}{0.04+0.14}=\\dfrac{0.14}{0.18}=\\dfrac79$。", "skills": ["貝氏定理", "逆機率"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（貝氏）", "ref_id": "", "tags": ["貝氏"]}, {"id": "E3-3-L4-Q1", "layer": "L4", "type": "填充題", "stem": "某零售店賣「熊大」「皮卡丘」兩玩偶，來自 A、B、C 三廠商（進貨數相同）。三廠商中「皮卡丘」比例為 $\\frac14,\\frac25,\\frac12$。隨機挑一隻皮卡丘，求它出自 C 廠商的機率。", "answer": "$\\dfrac{10}{23}$", "solution": "$P(C\\mid\\text{皮})=\\dfrac{\\frac13\\cdot\\frac12}{\\frac13(\\frac14+\\frac25+\\frac12)}=\\dfrac{\\frac12}{\\frac14+\\frac25+\\frac12}=\\dfrac{1/2}{23/20}=\\dfrac{10}{23}$。", "skills": ["貝氏定理"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "107指考數甲第3題", "ref_id": "CPB-074", "tags": ["貝氏", "指考"]}, {"id": "E3-3-L4-Q2", "layer": "L4", "type": "單選題", "stem": "公司員工 $15\\%$ 行政、$35\\%$ 技術、$50\\%$ 研發；有大學文憑者比例分別 $60\\%,40\\%,80\\%$。從有文憑者隨機抽一人，求他是技術人員的機率。\n(1) $\\dfrac29$　(2) $\\dfrac13$　(3) $\\dfrac49$　(4) $\\dfrac15$　(5) $\\dfrac25$", "answer": "(1) $\\dfrac29$", "solution": "$P(\\text{技}\\mid\\text{文憑})=\\dfrac{0.35\\cdot0.4}{0.15\\cdot0.6+0.35\\cdot0.4+0.5\\cdot0.8}=\\dfrac{0.14}{0.09+0.14+0.40}=\\dfrac{0.14}{0.63}=\\dfrac29$。", "skills": ["貝氏定理", "全機率"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "101指考數甲第2題", "ref_id": "CPB-054", "tags": ["貝氏", "指考"]}, {"id": "E3-3-L4-Q3", "layer": "L4", "type": "填充題", "stem": "手機公司甲、乙、丙三生產線，瑕疵率分別 $5\\%,3\\%,3\\%$。若希望全部瑕疵品中由甲所製比例不超過 $\\dfrac5{12}$，求甲生產線產量至多可占全部產量的百分比。", "answer": "$30\\%$", "solution": "設甲占 $x$、乙丙各 $\\frac{1-x}2$。甲瑕疵佔比 $\\dfrac{0.05x}{0.05x+0.03(1-x)}\\le\\dfrac5{12}$，解得 $x\\le0.3$。故至多 $30\\%$。", "skills": ["貝氏比例", "不等式"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "100指考數甲第B題", "ref_id": "CPB-053", "tags": ["貝氏", "指考"]}, {"id": "E3-3-L4-Q4", "layer": "L4", "type": "填充題", "stem": "某傳染病：染病者一定檢出陽性，未染病者有 $4\\%$ 誤檢為陽性。全人口 $0.2\\%$ 染病。某役男被檢為陽性，求他確實染病的機率（最簡分數）。", "answer": "$\\dfrac{25}{524}$（約 $4.77\\%$）", "solution": "$P(\\text{病}\\mid\\text{陽})=\\dfrac{1\\times0.002}{1\\times0.002+0.04\\times0.998}=\\dfrac{0.002}{0.002+0.03992}=\\dfrac{25}{524}\\approx4.77\\%$（仍大於 $3\\%$）。", "skills": ["貝氏定理", "偽陽性"], "difficulty_star": 4, "bloom": "分析", "source_kind": "大考真題", "source": "91指考數甲第6題", "ref_id": "CPB-075", "tags": ["貝氏", "指考"]}, {"id": "E3-3-L4-Q5", "layer": "L4", "type": "單選題", "stem": "某疾病：第一類占 $70\\%$（藥物 A 每次療程成功率 $70\\%$、各次獨立）、其餘第二類藥物 A 完全無效。在不知類型且第一次療程失敗下，第二次療程成功的條件機率最接近？\n(1) $0.25$　(2) $0.3$　(3) $0.35$　(4) $0.4$　(5) $0.49$", "answer": "(2) $0.3$", "solution": "第一次失敗機率 $=0.7\\times0.3+0.3\\times1=0.51$。失敗後仍為第一類的條件機率 $=\\dfrac{0.7\\times0.3}{0.51}=\\dfrac{0.21}{0.51}$，再乘第二次成功率 $0.7$：$\\dfrac{0.21}{0.51}\\times0.7\\approx0.288\\approx0.3$。", "skills": ["貝氏定理", "條件機率", "獨立"], "difficulty_star": 4, "bloom": "分析", "source_kind": "大考真題", "source": "103學測第6題", "ref_id": "PRB-149", "tags": ["貝氏", "學測"]}, {"id": "E3-3-L4-Q6", "layer": "L4", "type": "填充題", "stem": "某文明人民 $\\frac14$ 時間說真話、$\\frac34$ 說謊。多數黨領袖發表一聲明，反對黨領袖表示「該聲明是真的」。在反對黨說出「是真的」的條件下，求該聲明確實為真的機率（最簡分數）。", "answer": "$\\dfrac1{10}$", "solution": "反對黨會說「真」有兩種：聲明真且反對黨說真話（$\\frac14\\cdot\\frac14$）、聲明假且反對黨說謊（$\\frac34\\cdot\\frac34$）。\n$P(\\text{真}\\mid\\text{說真})=\\dfrac{\\frac14\\cdot\\frac14}{\\frac14\\cdot\\frac14+\\frac34\\cdot\\frac34}=\\dfrac{1/16}{10/16}=\\dfrac1{10}$。", "skills": ["貝氏定理", "真假鏈"], "difficulty_star": 3, "bloom": "分析", "source_kind": "模考真題", "source": "106學測全國數A第4次模考", "ref_id": "PRB-274", "tags": ["貝氏", "模考"]}]}, {"code": "E3-4", "name": "數學期望值", "section": "三、機率", "level": "熱門", "kpi": "🔴116 機率1.5倍。期望值 E(X)=Σx·P(x)、公平賭局、期望值線性", "section_color": "pink", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（數學期望值）失分，先回頭重做 L1 例題、熟悉標準解法，再依序練 L2／L3。", "questions": [{"id": "E3-4-L1-Q1", "layer": "L1", "type": "填充題", "stem": "擲一公正骰子一次，求出現點數的期望值。", "answer": "$\\dfrac72$", "solution": "$E(X)=\\sum x\\cdot P(x)=\\dfrac16(1+2+3+4+5+6)=\\dfrac{21}6=\\dfrac72$。", "skills": ["期望值定義"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（期望值）", "ref_id": "", "tags": ["期望值"]}, {"id": "E3-4-L1-Q2", "layer": "L1", "type": "單選題", "stem": "同時擲三顆公正骰子：三顆都是 $6$ 得 $50$ 元、恰兩顆 $6$ 得 $15$ 元、恰一顆 $6$ 得 $3$ 元。為使遊戲公平，沒擲出 $6$ 時應賠幾元？\n(1) $4$　(2) $5$　(3) $6$　(4) $8$　(5) $10$", "answer": "(1) $4$ 元", "solution": "$P_3=\\frac1{216},P_2=\\frac{15}{216},P_1=\\frac{75}{216},P_0=\\frac{125}{216}$。公平 $\\Rightarrow$ 期望值為 $0$：\n$50\\cdot\\frac1{216}+15\\cdot\\frac{15}{216}+3\\cdot\\frac{75}{216}-x\\cdot\\frac{125}{216}=0\\Rightarrow x=\\frac{500}{125}=4$。", "skills": ["期望值", "公平賭局"], "difficulty_star": 2, "bloom": "應用", "source_kind": "段考真題", "source": "建國中學113下高一第二次段考", "ref_id": "EXV-001", "tags": ["期望值", "公平"]}, {"id": "E3-4-L2-Q1", "layer": "L2", "type": "填充題", "stem": "將三顆相異球各自獨立、等機率投入三個相異空箱，求「空箱個數」的期望值。", "answer": "$\\dfrac89$", "solution": "對每箱，為空的機率 $=\\left(\\frac23\\right)^3=\\frac8{27}$。由期望值線性，空箱數期望值 $=3\\times\\frac8{27}=\\frac89$。", "skills": ["期望值線性", "指示變數"], "difficulty_star": 3, "bloom": "應用", "source_kind": "段考真題", "source": "師大附中113下高一期末考", "ref_id": "PRB-419", "tags": ["期望值"]}, {"id": "E3-4-L2-Q2", "layer": "L2", "type": "填充題", "stem": "袋中有標 $1,2,3$ 的球各一顆，任取一球，求球上數字的期望值。", "answer": "$2$", "solution": "$E(X)=\\frac13(1+2+3)=2$。", "skills": ["期望值定義"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（期望值）", "ref_id": "", "tags": ["期望值"]}, {"id": "E3-4-L2-Q3", "layer": "L2", "type": "填充題", "stem": "擲一公正硬幣，正面贏 $10$ 元，反面輸 $x$ 元。若此賭局公平，求 $x$。", "answer": "$x=10$", "solution": "公平 $\\Rightarrow E=\\frac12\\cdot10+\\frac12\\cdot(-x)=0\\Rightarrow x=10$。", "skills": ["公平賭局"], "difficulty_star": 2, "bloom": "應用", "source_kind": "改編", "source": "改編（公平賭局）", "ref_id": "", "tags": ["公平"]}, {"id": "E3-4-L2-Q4", "layer": "L2", "type": "填充題", "stem": "已知隨機變數 $X$ 的期望值 $E(X)=5$。求 $E(2X+3)$。", "answer": "$13$", "solution": "**期望值線性**：$E(2X+3)=2E(X)+3=2\\cdot5+3=13$。", "skills": ["期望值線性"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（期望值線性）", "ref_id": "", "tags": ["期望值"]}, {"id": "E3-4-L3-Q1", "layer": "L3", "type": "填充題", "stem": "擲兩公正骰子，求兩骰點數和的期望值。", "answer": "$7$", "solution": "由期望值線性，$E(X_1+X_2)=E(X_1)+E(X_2)=\\frac72+\\frac72=7$。", "skills": ["期望值線性", "和的期望"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（和的期望值）", "ref_id": "", "tags": ["期望值"]}, {"id": "E3-4-L3-Q2", "layer": "L3", "type": "填充題", "stem": "某遊戲付 $5$ 元入場，擲一公正骰子，得到「點數 $\\times2$」元。求淨利（得獎金減入場費）的期望值，並判斷是否值得玩。", "answer": "$2$ 元（期望淨利為正，值得玩）", "solution": "獎金期望值 $=2E(X)=2\\cdot\\frac72=7$ 元，扣入場費 $5$ 元，淨利期望值 $=7-5=2>0$，故值得玩。", "skills": ["期望值", "期望淨利決策"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（期望淨利）", "ref_id": "", "tags": ["期望值", "決策"]}, {"id": "E3-4-L3-Q3", "layer": "L3", "type": "填充題", "stem": "箱中三球標 $600,300,0$ 元，摸一球（放回）得等額獎金；若摸到 $0$ 可再摸一次但獎金折半（再摸到 $0$ 則無）。求可得獎金的期望值。", "answer": "$350$ 元", "solution": "非 $0$ 球（各 $\\frac13$）：$\\frac13(600+300+0)=300$。摸到 $0$（$\\frac13$）再摸折半：$\\frac13\\times\\frac12\\times\\frac13(600+300+0)=\\frac13\\times\\frac12\\times300=50$。期望值 $=300+50=350$ 元。", "skills": ["兩階段期望值", "條件期望"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（兩階段期望值）", "ref_id": "", "tags": ["期望值"]}, {"id": "E3-4-L4-Q1", "layer": "L4", "type": "填充題", "stem": "攤位玩偶定價 $480$ 元：擲均勻硬幣至多 $5$ 次，前 $3$ 次連得 $3$ 正則 $240$ 元購得、第 $4$ 次才累積 $3$ 正則 $320$ 元、第 $5$ 次才累積則 $400$ 元、$5$ 次仍未累積 $3$ 正則 $480$ 元。求購得一玩偶所花金額的期望值。", "answer": "$405$ 元", "solution": "各機率：前 $3$ 連正 $\\frac18$；第 $4$ 次達 $3$ 正 $\\binom32(\\frac12)^4=\\frac3{16}$；第 $5$ 次 $\\binom42(\\frac12)^5=\\frac3{16}$；未達 $\\frac12$。\n$E=240\\cdot\\frac18+320\\cdot\\frac3{16}+400\\cdot\\frac3{16}+480\\cdot\\frac12=30+60+75+240=405$。", "skills": ["期望值", "二項計數"], "difficulty_star": 4, "bloom": "分析", "source_kind": "大考真題", "source": "114學測數A第15題", "ref_id": "EXV-004", "tags": ["期望值", "學測"]}, {"id": "E3-4-L4-Q2", "layer": "L4", "type": "填充題", "stem": "$25$ 題單選（每題 $5$ 選項），答對得 $4$ 分、答錯倒扣 $1$ 分。某生確定答對 $16$ 題；$6$ 題確定 $2$ 個選項錯、從剩 $3$ 個猜一個；另 $3$ 題完全亂猜。求得分期望值（取整數）。", "answer": "$68$ 分", "solution": "$16$ 題穩得 $64$。$6$ 題（猜 $3$ 選 $1$）：每題 $E=4\\cdot\\frac13-1\\cdot\\frac23=\\frac23$，共 $4$。$3$ 題（$5$ 選 $1$）：$E=4\\cdot\\frac15-1\\cdot\\frac45=0$，共 $0$。總計 $64+4+0=68$。", "skills": ["期望值", "倒扣計分"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "92學測", "ref_id": "EXV-009", "tags": ["期望值", "學測"]}, {"id": "E3-4-L4-Q3", "layer": "L4", "type": "填充題", "stem": "摸彩箱有編號 $1\\sim10$ 的彩球（各號數量可不同）。甲案：摸到號數 $k$ 得 $k$ 元；乙案：得 $11-k$ 元。已知甲案每摸一球期望值為 $\\dfrac{67}{14}$，求乙案的期望值（最簡分數）。", "answer": "$\\dfrac{87}{14}$", "solution": "乙案期望值 $=\\sum(11-k)p_k=11\\sum p_k-\\sum k\\,p_k=11\\times1-\\dfrac{67}{14}=\\dfrac{154-67}{14}=\\dfrac{87}{14}$。", "skills": ["期望值線性", "互補設計"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "96學測", "ref_id": "EXV-011", "tags": ["期望值", "學測"]}, {"id": "E3-4-L4-Q4", "layer": "L4", "type": "填充題", "stem": "從 $1\\sim6$ 選定號碼 $n$，擲三顆骰子：三顆都是 $n$ 贏 $3$ 元、恰兩顆贏 $2$ 元、恰一顆贏 $1$ 元、沒有 $n$ 輸 $1$ 元。求玩一次的期望值（贏為正，分母 $216$）。", "answer": "$-\\dfrac{17}{216}$ 元", "solution": "$E=\\dfrac{3\\cdot1+2\\cdot15+1\\cdot75-1\\cdot125}{216}=\\dfrac{3+30+75-125}{216}=\\dfrac{-17}{216}$。", "skills": ["期望值", "二項計數"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "86學測第20題", "ref_id": "EXV-039", "tags": ["期望值", "學測"]}, {"id": "E3-4-L4-Q5", "layer": "L4", "type": "填充題", "stem": "抽獎箱四球標 $1000,800,600,0$ 元，摸一球（放回）得等額獎金；摸到 $0$ 可再摸一次但獎金折半（再摸到 $0$ 則無）。求參加者可得獎金的期望值。", "answer": "$675$ 元", "solution": "非 $0$：$\\frac14(1000+800+600)=600$；$0$ 後折半再摸：$\\frac14\\cdot\\frac12\\cdot\\frac14(1000+800+600)=75$。期望值 $=675$ 元。", "skills": ["兩階段期望值"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "93學測第13題", "ref_id": "EXV-043", "tags": ["期望值", "學測"]}, {"id": "E3-4-L4-Q6", "layer": "L4", "type": "填充題", "stem": "袋中三球標 $10,20,30$ 分，放回取三次累加總分。求三次共 $60$ 分的機率（最簡分數）。", "answer": "$\\dfrac7{27}$", "solution": "$27$ 種等可能。和為 $60$：$(20,20,20)$ 一種；$\\{10,20,30\\}$ 各一的排列 $3!=6$ 種，共 $7$ 種。機率 $=\\dfrac7{27}$。", "skills": ["古典機率", "累加計數"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "94指考數甲非選一", "ref_id": "PRB-202", "tags": ["期望值區", "指考"]}]}, {"code": "E4-1", "name": "一維數據分析（平均/變異數/標準差、平移伸縮）", "section": "四、數據分析", "level": "熱門", "kpi": "平均/中位數/百分位、變異數/標準差(除以n)、平移伸縮 aX+b 對 μ/σ、標準化Z分數", "section_color": "amber", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（一維數據分析（平均/變異數/標準差、平移伸縮））失分，先回頭重做 L1 例題、熟悉標準解法，再依序練 L2／L3。", "questions": [{"id": "E4-1-L1-Q1", "layer": "L1", "type": "填充題", "stem": "求數據 $3,5,7,9,11$ 的算術平均數。", "answer": "$7$", "solution": "$\\bar x=\\dfrac{3+5+7+9+11}{5}=\\dfrac{35}{5}=7$。", "skills": ["算術平均數"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（平均數）", "ref_id": "", "tags": ["平均"]}, {"id": "E4-1-L1-Q2", "layer": "L1", "type": "填充題", "stem": "某批水果平均單價 $50$ 元、標準差 $10$ 元。若每個以進價的 $1.5$ 倍出售，求平均售價與其標準差。", "answer": "平均 $75$ 元、標準差 $15$ 元", "solution": "**伸縮 $aX$**：$\\mu\\to a\\mu=1.5\\times50=75$；$\\sigma\\to|a|\\sigma=1.5\\times10=15$。", "skills": ["伸縮變換", "μσ性質"], "difficulty_star": 2, "bloom": "理解", "source_kind": "題庫範例", "source": "龍騰高一下範例", "ref_id": "D1D-066", "tags": ["伸縮"]}, {"id": "E4-1-L2-Q1", "layer": "L2", "type": "填充題", "stem": "五位同學身高為 $172,174,175,178,181$ 公分，求此五人身高的標準差（最簡根式）。", "answer": "$\\sqrt{10}$ 公分", "solution": "平均 $=\\dfrac{172+174+175+178+181}{5}=176$。離差 $-4,-2,-1,2,5$，平方和 $16+4+1+4+25=50$。\n變異數 $=\\dfrac{50}{5}=10$（**除以 n**），標準差 $=\\sqrt{10}$。", "skills": ["標準差", "變異數除以n"], "difficulty_star": 3, "bloom": "應用", "source_kind": "段考真題", "source": "建國中學111下高一第1次段考", "ref_id": "D1D-252", "tags": ["標準差"]}, {"id": "E4-1-L2-Q2", "layer": "L2", "type": "填充題", "stem": "求數據 $0.37,0.57,0.77,0.97,1.17,1.37,1.57$ 的標準差。", "answer": "$0.4$", "solution": "此為公差 $0.2$ 的等差數列（$7$ 項）。等差數列標準差 $=d\\sqrt{\\dfrac{n^2-1}{12}}=0.2\\sqrt{\\dfrac{48}{12}}=0.2\\times2=0.4$。", "skills": ["標準差", "等差數列標準差"], "difficulty_star": 3, "bloom": "應用", "source_kind": "段考真題", "source": "板橋高中112下高一第1次段考", "ref_id": "D1D-258", "tags": ["標準差"]}, {"id": "E4-1-L2-Q3", "layer": "L2", "type": "填充題", "stem": "小明第一次段考 $57$ 分（全班平均 $43$、標準差 $7$）；第二次 $81$ 分（全班平均 $73$、標準差 $5$）。問哪一次表現較好？", "answer": "第 $1$ 次", "solution": "**標準化 Z 分數**比較相對位置：$z_1=\\dfrac{57-43}{7}=2$、$z_2=\\dfrac{81-73}{5}=1.6$。$z_1>z_2$，故第 $1$ 次表現較好。", "skills": ["標準化Z分數", "相對位置"], "difficulty_star": 2, "bloom": "應用", "source_kind": "段考真題", "source": "台南一中109下高一第1次段考", "ref_id": "D1D-236", "tags": ["標準化"]}, {"id": "E4-1-L2-Q4", "layer": "L2", "type": "填充題", "stem": "求數據 $2,4,4,4,5,5,7,9$ 的變異數。", "answer": "$4$", "solution": "平均 $=\\dfrac{2+4+4+4+5+5+7+9}{8}=5$。離差平方和 $=9+1+1+1+0+0+4+16=32$。變異數 $=\\dfrac{32}{8}=4$（除以 n）。", "skills": ["變異數"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（變異數）", "ref_id": "", "tags": ["變異數"]}, {"id": "E4-1-L3-Q1", "layer": "L3", "type": "填充題", "stem": "數據 $A:1,2,3,4,5$ 的標準差為 $\\sigma$。求數據 $B:101,102,103,104,105$ 與數據 $C:3,6,9,12,15$ 的標準差（以 $\\sigma$ 表示）。", "answer": "$B$ 的標準差 $=\\sigma$、$C$ 的標準差 $=3\\sigma$", "solution": "**平移 $X+b$**：標準差不變，故 $B=A+100$ 的標準差仍為 $\\sigma$。\n**伸縮 $aX$**：$C=3A$ 的標準差為 $|3|\\sigma=3\\sigma$。", "skills": ["平移σ不變", "伸縮σ放大"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（平移伸縮對σ）", "ref_id": "", "tags": ["平移伸縮"]}, {"id": "E4-1-L3-Q2", "layer": "L3", "type": "填充題", "stem": "一筆數據標準化後（每個 $x_i$ 變為 $z_i=\\dfrac{x_i-\\bar x}{\\sigma}$），求標準化後數據 $\\langle z_i\\rangle$ 的平均數與標準差。", "answer": "平均 $0$、標準差 $1$", "solution": "$z=\\dfrac{x-\\bar x}{\\sigma}=\\dfrac1\\sigma x-\\dfrac{\\bar x}\\sigma$（線性變換 $a=\\frac1\\sigma,b=-\\frac{\\bar x}\\sigma$）。\n平均 $\\to\\dfrac1\\sigma\\bar x-\\dfrac{\\bar x}\\sigma=0$；標準差 $\\to\\left|\\dfrac1\\sigma\\right|\\sigma=1$。", "skills": ["標準化", "Z分數性質"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（標準化性質）", "ref_id": "", "tags": ["標準化"]}, {"id": "E4-1-L3-Q3", "layer": "L3", "type": "填充題", "stem": "已知 $5$ 筆數據平均 $10$、變異數 $6$。今每筆數據都乘以 $2$ 再加 $3$，求新數據的平均與變異數。", "answer": "平均 $23$、變異數 $24$", "solution": "$Y=2X+3$：平均 $\\to2\\times10+3=23$；變異數 $\\to2^2\\times6=24$（變異數對伸縮放大 $a^2$ 倍、對平移不變）。", "skills": ["線性變換", "μσ²性質"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（線性變換對μσ²）", "ref_id": "", "tags": ["平移伸縮"]}, {"id": "E4-1-L4-Q1", "layer": "L4", "type": "單選題", "stem": "某遊戲 $210$ 位玩家持有寶石：持 $1$ 顆者 $1$ 位、持 $2$ 顆者 $2$ 位、…、持 $20$ 顆者 $20$ 位。求每人持有寶石數的第 $90$ 百分位數。\n(1) $16$　(2) $17$　(3) $18$　(4) $19$　(5) $20$", "answer": "(4) $19$", "solution": "共 $1+2+\\cdots+20=210$ 人。第 $90$ 百分位數位置 $0.9\\times210=189$，累積到「持 $k$ 顆」的人數為 $\\frac{k(k+1)}2$。$\\frac{18\\cdot19}2=171<189\\le\\frac{19\\cdot20}2=190$，故落在持 $19$ 顆，第 $90$ 百分位數為 $19$。", "skills": ["百分位數", "累積次數"], "difficulty_star": 2, "bloom": "分析", "source_kind": "大考真題", "source": "113學測數B第1題", "ref_id": "D1D-117", "tags": ["百分位", "學測"]}, {"id": "E4-1-L4-Q2", "layer": "L4", "type": "填充題", "stem": "某羽球選手對手殺球數據：甲（$25$ 次、平均 $1.2$ 秒）、乙（$14$ 次、$1.5$ 秒）、丙（$20$ 次、$1.7$ 秒）、丁（$30$ 次、$1.2$ 秒）。求丁在該場花在殺球的總用時，並判斷四人中誰的總用時最多。", "answer": "丁總用時 $36$ 秒，為四人中最多", "solution": "總用時 $=$ 次數 $\\times$ 平均。甲 $25\\times1.2=30$、乙 $14\\times1.5=21$、丙 $20\\times1.7=34$、丁 $30\\times1.2=36$。丁的 $36$ 秒最多。", "skills": ["加權總和", "平均×次數"], "difficulty_star": 3, "bloom": "應用", "source_kind": "大考真題", "source": "114學測數B第10題", "ref_id": "D1D-119", "tags": ["數據分析", "學測"]}, {"id": "E4-1-L4-Q3", "layer": "L4", "type": "單選題", "stem": "下列哪一組數據的標準差最小？\n(1) $2,3,4,5,6$　(2) $1,\\frac32,2,\\frac52,3$　(3) $20,30,40,50,60$　(4) $201,302,403,504,605$　(5) $199,200,200,200,201$", "answer": "(5)", "solution": "標準差反映離散程度。(5) $199,200,200,200,201$ 的數值最集中（離差最小），標準差最小。", "skills": ["標準差", "離散程度比較"], "difficulty_star": 2, "bloom": "分析", "source_kind": "模考真題", "source": "110學測新北基數A第2次模考", "ref_id": "D1D-186", "tags": ["標準差", "模考"]}, {"id": "E4-1-L4-Q4", "layer": "L4", "type": "單選題", "stem": "五組數據 (Ⅰ)$3,4,5,6,7$ (Ⅱ)$7,7,7,7,7$ (Ⅲ)$3,5,7,9,11$ (Ⅳ)$-5,-6,-7,-8,-9$ (Ⅴ)$4,5,6,7,8$，標準差依序為 $\\sigma_1\\sim\\sigma_5$，求大小關係。\n(1) $\\sigma_3>\\sigma_1=\\sigma_4>\\sigma_5>\\sigma_2$　(2) $\\sigma_1>\\sigma_3>\\sigma_5$　(3) $\\sigma_2>\\sigma_1$　(4) $\\sigma_3>\\sigma_1=\\sigma_4=\\sigma_5>\\sigma_2$　(5) 全部相等", "answer": "(4) $\\sigma_3>\\sigma_1=\\sigma_4=\\sigma_5>\\sigma_2$", "solution": "(Ⅰ)(Ⅳ)(Ⅴ) 皆為公差 $\\pm1$ 的連續數列，標準差相同（$\\sqrt2$，平移/變號不改變 σ）；(Ⅲ) 公差 $2$，σ $=2\\sqrt2$ 最大；(Ⅱ) 全相同，σ $=0$。故 $\\sigma_3>\\sigma_1=\\sigma_4=\\sigma_5>\\sigma_2$。", "skills": ["標準差", "平移變號伸縮"], "difficulty_star": 3, "bloom": "分析", "source_kind": "模考真題", "source": "112學測全國數A第2次模考", "ref_id": "D1D-202", "tags": ["標準差", "模考"]}, {"id": "E4-1-L4-Q5", "layer": "L4", "type": "是非題", "stem": "已知 $1,1,1,5,5,5$ 的標準差為 $\\sigma_x$。判斷：測驗 A 的資料 $2,2,2,10,10,10$ 的標準差為 $\\sigma_x+2$。", "answer": "○（正確）", "solution": "$\\sigma_x$：平均 $3$，離差 $\\pm2$，$\\sigma_x=2$。測驗 A 平均 $6$、離差 $\\pm4$，標準差 $=4=\\sigma_x+2$。敘述正確。\n（註：A 恰為原數據 $\\times2$，$\\sigma\\to2\\sigma_x=4=\\sigma_x+2$。）", "skills": ["標準差", "伸縮"], "difficulty_star": 4, "bloom": "分析", "source_kind": "模考真題", "source": "110學測模考（滿分題）", "ref_id": "D1D-238", "tags": ["標準差", "模考"]}, {"id": "E4-1-L4-Q6", "layer": "L4", "type": "填充題", "stem": "$a,b,c$ 三數的算術平均為 $\\mu$、標準差為 $\\sigma$。若加入 $11,13,13,19$ 共四數後，這 $7$ 個數的平均仍為 $\\mu$、標準差仍為 $\\sigma$，求 $\\mu+\\sigma$。", "answer": "$17$", "solution": "加入四數平均 $=\\frac{11+13+13+19}4=14$，欲總平均不變需 $\\mu=14$。\n四數對 $14$ 的變異數 $=\\frac{9+1+1+25}4=9$。合併變異數不變：$\\frac{3\\sigma^2+4\\cdot9}{7}=\\sigma^2\\Rightarrow4\\sigma^2=36\\Rightarrow\\sigma=3$。$\\mu+\\sigma=14+3=17$。", "skills": ["合併平均", "合併變異數"], "difficulty_star": 4, "bloom": "分析", "source_kind": "模考真題", "source": "105學測全國數A第2次模考", "ref_id": "D1D-140", "tags": ["變異數", "合併", "模考"]}]}, {"code": "E4-2", "name": "二維數據分析（相關係數、迴歸直線）", "section": "四、數據分析", "level": "熱門", "kpi": "116 迴歸＋相關係數重壓。相關係數 r 計算/意義、最小平方迴歸直線 y=a+bx、線性變換對 r 的影響", "section_color": "amber", "difficulty_grade": "熱門", "handout_page": "", "remediation_tip": "若本節（二維數據分析（相關係數、迴歸直線））失分，先回頭重做 L1 例題、熟悉標準解法，再依序練 L2／L3。", "questions": [{"id": "E4-2-L1-Q1", "layer": "L1", "type": "填充題", "stem": "數據 $(1,2),(2,4),(3,6),(4,8),(5,10)$ 中，$x$ 與 $y$ 的相關係數為何？", "answer": "$1$", "solution": "所有點恰落在直線 $y=2x$（正斜率）上，為**完全正線性相關**，$r=1$。", "skills": ["相關係數", "完全線性"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（相關係數）", "ref_id": "", "tags": ["相關係數"]}, {"id": "E4-2-L1-Q2", "layer": "L1", "type": "是非題", "stem": "判斷：「$y$ 對 $x$ 的最小平方迴歸直線必通過點 $(\\bar x,\\bar y)$。」", "answer": "○（正確）", "solution": "最小平方迴歸直線 $y-\\bar y=b(x-\\bar x)$，當 $x=\\bar x$ 時 $y=\\bar y$，故必過 $(\\bar x,\\bar y)$。", "skills": ["迴歸直線", "過平均點"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（迴歸直線性質）", "ref_id": "", "tags": ["迴歸"]}, {"id": "E4-2-L2-Q1", "layer": "L2", "type": "填充題", "stem": "兩變量 $x,y$ 平均數 $\\mu_x=4,\\mu_y=6$，相關係數 $r=0.6$，標準差 $\\sigma_x=2,\\sigma_y=3$。求 $y$ 對 $x$ 的迴歸直線 $y=mx+k$ 的 $(m,k)$。", "answer": "$(m,k)=(0.9,\\,2.4)$", "solution": "斜率 $m=r\\cdot\\dfrac{\\sigma_y}{\\sigma_x}=0.6\\times\\dfrac32=0.9$；$k=\\mu_y-m\\mu_x=6-0.9\\times4=2.4$。", "skills": ["迴歸直線", "斜率公式"], "difficulty_star": 2, "bloom": "應用", "source_kind": "段考真題", "source": "高雄中學114下高一第二次段考", "ref_id": "D2D-026", "tags": ["迴歸"]}, {"id": "E4-2-L2-Q2", "layer": "L2", "type": "填充題", "stem": "數據 $(1,2),(2,1),(3,4),(4,3),(5,5)$，求 $x$ 與 $y$ 的相關係數。", "answer": "$0.8$", "solution": "$\\bar x=3,\\bar y=3$。$\\sum(x-\\bar x)(y-\\bar y)=8$，$\\sqrt{\\sum(x-\\bar x)^2}\\sqrt{\\sum(y-\\bar y)^2}=\\sqrt{10}\\cdot\\sqrt{10}=10$。$r=\\dfrac8{10}=0.8$。", "skills": ["相關係數", "公式計算"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（相關係數計算）", "ref_id": "", "tags": ["相關係數"]}, {"id": "E4-2-L2-Q3", "layer": "L2", "type": "填充題", "stem": "$y$ 對 $x$ 的迴歸直線斜率為 $b=r\\cdot\\dfrac{\\sigma_y}{\\sigma_x}$。若 $r=0.5$、$\\sigma_x=4$、$\\sigma_y=8$，求斜率 $b$。", "answer": "$1$", "solution": "$b=r\\dfrac{\\sigma_y}{\\sigma_x}=0.5\\times\\dfrac84=0.5\\times2=1$。", "skills": ["迴歸斜率"], "difficulty_star": 2, "bloom": "應用", "source_kind": "改編", "source": "改編（迴歸斜率）", "ref_id": "", "tags": ["迴歸"]}, {"id": "E4-2-L2-Q4", "layer": "L2", "type": "是非題", "stem": "判斷：「相關係數 $r$ 必滿足 $-1\\le r\\le1$，且 $|r|$ 越大表示線性相關越強。」", "answer": "○（正確）", "solution": "由柯西不等式 $-1\\le r\\le1$；$|r|$ 越接近 $1$，資料越接近一條直線，線性相關越強。敘述正確。", "skills": ["相關係數性質"], "difficulty_star": 2, "bloom": "理解", "source_kind": "改編", "source": "改編（r性質）", "ref_id": "", "tags": ["相關係數"]}, {"id": "E4-2-L3-Q1", "layer": "L3", "type": "填充題", "stem": "某高樓樓層 $x$ 與逃生時間 $y$：$\\sum x_i=80,\\sum y_i=2400$（共 $8$ 筆），$\\sigma_x=6,\\sigma_y=120,r=0.9$。求 $y$ 對 $x$ 的迴歸直線斜率。", "answer": "$18$", "solution": "斜率 $=r\\cdot\\dfrac{\\sigma_y}{\\sigma_x}=0.9\\times\\dfrac{120}6=0.9\\times20=18$。", "skills": ["迴歸斜率", "統計量"], "difficulty_star": 3, "bloom": "應用", "source_kind": "模考真題", "source": "105學測臺北數A第1次模考", "ref_id": "D2D-090", "tags": ["迴歸", "模考"]}, {"id": "E4-2-L3-Q2", "layer": "L3", "type": "填充題", "stem": "一組數據 $(x_i,y_i)$ 的相關係數為 $r=0.8$。今令 $s_i=-2x_i+5$、$t_i=3y_i-1$，求 $(s_i,t_i)$ 的相關係數。", "answer": "$-0.8$", "solution": "線性變換 $s=ax+b,\\ t=cy+d$ 對相關係數的影響為 $r_{(s,t)}=\\mathrm{sgn}(ac)\\cdot r_{(x,y)}$。\n此處 $a=-2<0,\\ c=3>0$，$\\mathrm{sgn}(ac)=-1$，故 $r_{(s,t)}=-0.8$。", "skills": ["線性變換對r", "符號"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（線性變換對r）", "ref_id": "", "tags": ["相關係數", "線性變換"]}, {"id": "E4-2-L3-Q3", "layer": "L3", "type": "填充題", "stem": "$y$ 對 $x$ 的迴歸直線為 $y=2x+1$，$x$ 的平均 $\\mu_x=5$。求 $y$ 的平均 $\\mu_y$，並求當 $x=8$ 時 $y$ 的預測值。", "answer": "$\\mu_y=11$；$x=8$ 時預測 $y=17$", "solution": "迴歸直線過 $(\\mu_x,\\mu_y)$：$\\mu_y=2\\mu_x+1=2\\times5+1=11$。\n$x=8$ 預測 $y=2\\times8+1=17$。", "skills": ["迴歸直線", "預測值"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（迴歸預測）", "ref_id": "", "tags": ["迴歸"]}, {"id": "E4-2-L4-Q1", "layer": "L4", "type": "單選題", "stem": "肥皂單價 $x$（十元）與需求量 $y$（萬盒）：$x=8,9,10,11,12$；$y=11,12,10,8,9$。求 $x$ 與 $y$ 的相關係數最接近？\n(1) $\\dfrac45$　(2) $\\dfrac25$　(3) $0$　(4) $-\\dfrac25$　(5) $-\\dfrac45$", "answer": "(5) $-\\dfrac45$", "solution": "$\\bar x=10,\\bar y=10$。$\\sum(x-\\bar x)(y-\\bar y)=(-2)(1)+(-1)(2)+0+(1)(-2)+(2)(-1)=-8$；\n$\\sqrt{\\sum(x-\\bar x)^2}=\\sqrt{10}$、$\\sqrt{\\sum(y-\\bar y)^2}=\\sqrt{10}$。$r=\\dfrac{-8}{10}=-\\dfrac45$。", "skills": ["相關係數", "公式計算"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "84學測第6題", "ref_id": "D2D-029", "tags": ["相關係數", "學測"]}, {"id": "E4-2-L4-Q2", "layer": "L4", "type": "單選題", "stem": "下列各組資料的迴歸直線皆相同且皆為負相關，求相關係數最小（最接近 $-1$ 反向、即線性最弱者 $|r|$ 最小）的選項。\n(1) $x:2,3,5;\\ y:1,13,1$　(2) 資料較集中於直線　(3) 點幾乎共線　(4) 點略分散　(5) 點最分散（離迴歸線最遠）", "answer": "(5) 點最分散者", "solution": "迴歸直線相同的條件下，資料點離迴歸直線越分散，$|r|$ 越小（線性相關越弱）。故點最分散的選項相關係數最小（最接近 $0$）。", "skills": ["相關係數", "資料分散與r"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "102學測第4題", "ref_id": "D2D-034", "tags": ["相關係數", "學測"]}, {"id": "E4-2-L4-Q3", "layer": "L4", "type": "填充題", "stem": "某國 $5$ 地區香菸量 $x$ 與肺癌數 $y$：$\\sum x_i=135,\\ \\sum x_i^2=3661,\\ \\sum x_iy_i=2842,\\ \\sum y_i=98,\\ \\sum y_i^2=2082$。求相關係數 $r$（最簡分數）。", "answer": "$r=\\dfrac78$", "solution": "$S_{xx}=\\sum x^2-\\frac{(\\sum x)^2}n=3661-\\frac{135^2}5=3661-3645=16$；$S_{yy}=2082-\\frac{98^2}5=2082-1920.8=161.2$；$S_{xy}=2842-\\frac{135\\cdot98}5=2842-2646=196$。\n$r=\\dfrac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}}=\\dfrac{196}{\\sqrt{16\\cdot161.2}}\\approx\\dfrac78$。", "skills": ["相關係數", "Σ公式"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "99指考數乙選填E", "ref_id": "D2D-077", "tags": ["相關係數", "指考"]}, {"id": "E4-2-L4-Q4", "layer": "L4", "type": "單選題", "stem": "經濟學者得結論「員工就學年數每增加一年，年薪平均增加 $8.5$ 萬元」。此結論可直接由下列哪個統計量得到？\n(1) 兩者之眾數　(2) 兩者之全距　(3) 兩者之中位數　(4) 相關係數　(5) 迴歸直線斜率", "answer": "(5) 迴歸直線斜率", "solution": "「$x$ 每增加一單位，$y$ 平均增加的量」即為 $y$ 對 $x$ 的**迴歸直線斜率**。故選 (5)。", "skills": ["迴歸直線意義", "斜率解讀"], "difficulty_star": 3, "bloom": "理解", "source_kind": "大考真題", "source": "98指考數乙", "ref_id": "D2D-076", "tags": ["迴歸", "指考"]}, {"id": "E4-2-L4-Q5", "layer": "L4", "type": "單選題", "stem": "$2001$ 年各國「國會議員席次 $y$ 與人口數 $P$」的資料分析，關於席次與人口數的相關性與迴歸，選出正確敘述（席次隨人口大致遞增、但非完全線性）。\n(1) 必為完全正相關 $r=1$　(2) 必負相關　(3) 人口越多席次必越多　(4) 大致正相關但 $r<1$　(5) 兩者無關 $r=0$", "answer": "(4) 大致正相關但 $r<1$", "solution": "人口多的國家席次大致較多，呈**正相關**；但各國制度差異使資料不完全共線，故 $0<r<1$，選 (4)。", "skills": ["相關性判讀", "散布圖"], "difficulty_star": 3, "bloom": "分析", "source_kind": "大考真題", "source": "92指考數乙第3題", "ref_id": "D2D-070", "tags": ["相關係數", "指考"]}, {"id": "E4-2-L4-Q6", "layer": "L4", "type": "多選題", "stem": "數據 $(x_i,y_i)$ 的迴歸直線為 $y=\\frac35x+12$、$\\mu_x=60$、相關係數 $r_{(x,y)}$。令 $s_i=-\\frac13x_i+15$、$t_i=\\frac14y_i+3$，$t$ 對 $s$ 的迴歸直線為 $t=a+bs$。選出正確選項。\n(1) $r_{(x,y)}>0$　(2) $r_{(s,t)}=r_{(x,y)}$　(3) $r_{(s,t)}<0$　(4) $b<0$　(5) $b>0$", "answer": "(1)(3)(4)", "solution": "迴歸斜率 $\\frac35>0\\Rightarrow r_{(x,y)}>0$（(1)✓）。$s$ 對 $x$ 係數 $-\\frac13<0$、$t$ 對 $y$ 係數 $\\frac14>0$，故 $r_{(s,t)}=\\mathrm{sgn}(-\\frac13\\cdot\\frac14)r_{(x,y)}=-r_{(x,y)}<0$（(2)✗(3)✓）。迴歸斜率 $b=r_{(s,t)}\\frac{\\sigma_t}{\\sigma_s}<0$（(4)✓(5)✗）。", "skills": ["線性變換對r", "迴歸斜率符號"], "difficulty_star": 4, "bloom": "分析", "source_kind": "模考真題", "source": "105學測中區數A第1次模考", "ref_id": "D2D-080", "tags": ["相關係數", "線性變換", "模考"]}]}]};

 2、非甲且乙 3、非甲非乙 1 人。求 $P(\\text{甲}\\mid\\text{乙})$。", "answer": "$\\dfrac{4}{7}$", "solution": "$P(甲\\mid乙)=\\dfrac{P(甲\\cap乙)}{P(乙)}=\\dfrac{4}{7}=\\dfrac{4}{7}$。"}, {"type": "獨立至少一", "stem": "兩獨立事件各「失敗」機率 $\\dfrac{7}{10}$，求至少一個成功的機率。", "answer": "$\\dfrac{51}{100}$", "solution": "$1-\\dfrac{7}{10}^2=\\dfrac{51}{100}$（餘事件＋獨立）。"}, {"type": "獨立至少一", "stem": "兩獨立事件各「失敗」機率 $\\dfrac{3}{5}$，求至少一個成功的機率。", "answer": "$\\dfrac{16}{25}$", "solution": "$1-\\dfrac{3}{5}^2=\\dfrac{16}{25}$（餘事件＋獨立）。"}, {"type": "不放回連抽", "stem": "袋中 3 紅 5 白，不放回連取 2 球，求兩球皆紅的機率。", "answer": "$\\dfrac{3}{28}$", "solution": "$\\dfrac{3}{8}\\cdot\\dfrac{2}{7}=\\dfrac{3}{28}$。"}, {"type": "不放回連抽", "stem": "袋中 4 紅 6 白，不放回連取 2 球，求兩球皆紅的機率。", "answer": "$\\dfrac{2}{15}$", "solution": "$\\dfrac{4}{10}\\cdot\\dfrac{3}{9}=\\dfrac{2}{15}$。"}, {"type": "不放回連抽", "stem": "袋中 5 紅 5 白，不放回連取 2 球，求兩球皆紅的機率。", "answer": "$\\dfrac{2}{9}$", "solution": "$\\dfrac{5}{10}\\cdot\\dfrac{4}{9}=\\dfrac{2}{9}$。"}], "E3-3": [{"type": "全機率", "stem": "甲袋 3 紅 2 白、乙袋 1 紅 4 白，等機率選袋取一球，求取到紅的機率。", "answer": "$\\dfrac{2}{5}$", "solution": "$\\tfrac12\\cdot\\tfrac{3}{5}+\\tfrac12\\cdot\\tfrac{1}{5}=\\dfrac{2}{5}$。"}, {"type": "全機率", "stem": "甲袋 4 紅 1 白、乙袋 2 紅 3 白，等機率選袋取一球，求取到紅的機率。", "answer": "$\\dfrac{3}{5}$", "solution": "$\\tfrac12\\cdot\\tfrac{4}{5}+\\tfrac12\\cdot\\tfrac{2}{5}=\\dfrac{3}{5}$。"}, {"type": "全機率", "stem": "甲袋 2 紅 3 白、乙袋 3 紅 2 白，等機率選袋取一球，求取到紅的機率。", "answer": "$\\dfrac{1}{2}$", "solution": "$\\tfrac12\\cdot\\tfrac{2}{5}+\\tfrac12\\cdot\\tfrac{3}{5}=\\dfrac{1}{2}$。"}, {"type": "貝氏逆機率", "stem": "甲袋 3 紅 2 白、乙袋 1 紅 4 白，等機率選袋取球。已知取到紅，求來自甲袋的機率。", "answer": "$\\dfrac{3}{4}$", "solution": "$\\dfrac{\\frac12\\cdot\\frac{3}{5}}{\\dfrac{2}{5}}=\\dfrac{3}{4}$（貝氏）。"}, {"type": "貝氏逆機率", "stem": "甲袋 4 紅 1 白、乙袋 2 紅 3 白，等機率選袋取球。已知取到紅，求來自甲袋的機率。", "answer": "$\\dfrac{2}{3}$", "solution": "$\\dfrac{\\frac12\\cdot\\frac{4}{5}}{\\dfrac{3}{5}}=\\dfrac{2}{3}$（貝氏）。"}, {"type": "貝氏逆機率", "stem": "甲袋 5 紅 1 白、乙袋 1 紅 5 白，等機率選袋取球。已知取到紅，求來自甲袋的機率。", "answ
