n則 $f(x) - g(x) = 2ax^4 + 2bx^3 + (p(x) - q(x))$，由於 $2a \\ne 0$，故 $\\deg(f - g) = 4$。", "skills": ["首項互消觀念", "次數運算"], "difficulty_star": 3, "bloom": "理解", "source_kind": "改編", "source": "改編自模考題（針對首項互消的反向應用設計）", "ref_id": null, "tags": ["次數", "首項互消"]}, {"id": "F1-1-L3-Q1", "layer": "L3", "type": "填充題", "stem": "設 $f(x)$、$g(x)$ 為實係數多項式，$\\deg f(x) = 4$、$\\deg g(x) = 3$。若多項式方程式 $f(x) - g(x) = 0$ 恰有 4 個相異實根，求 $\\deg[f(x) \\cdot g(x) - g(x)^2]$。", "answer": "$7$", "solution": "觀察 $f(x) \\cdot g(x) - g(x)^2 = g(x) \\cdot [f(x) - g(x)]$。\n由 $\\deg f = 4 \\ne 3 = \\deg g$，故 $\\deg(f-g) = 4$；題給「恰有 4 相異實根」與我們的次數無關（資訊冗餘，但驗證 $f-g$ 確為 4 次）。\n因此 $\\deg[g(x) \\cdot (f(x) - g(x))] = 3 + 4 = 7$。", "skills": ["次數運算", "因式分解觀察", "綜合判斷"], "difficulty_star": 4, "bloom": "應用", "source_kind": "改編", "source": "改編自高一加深練習（結合次數與因式分解）", "ref_id": null, "tags": ["次數", "綜合應用"]}, {"id": "F1-1-L4-Q1", "layer": "L4", "type": "多選題", "stem": "設 $P(x)$、$Q(x)$ 為實係數多項式。下列敘述哪些恆成立？\n(1) $\\deg(P(x) + Q(x)) = \\max\\{\\deg P(x), \\deg Q(x)\\}$\n(2) 若 $P(x)$、$Q(x)$ 均非零多項式，則 $\\deg(P(x) \\cdot Q(x)) = \\deg P(x) + \\deg Q(x)$\n(3) 若 $P(x)$、$Q(x)$ 皆為三次多項式，則 $P(x) + Q(x)$ 必為三次多項式\n(4) 若 $\\deg P(x) \\ge \\deg Q(x)$ 且 $P(x)$ 除以 $Q(x)$ 之商為 $R(x)$，則 $\\deg R(x) = \\deg P(x) - \\deg Q(x)$\n(5) 零多項式的次數定義為 $0$", "answer": "(2)(4)", "solution": "(1) ✗：若同次首項互消，可能嚴格小於 max。\n(2) ✓：兩非零多項式相乘，首項係數相乘必不為零，故 $\\deg = $ 加總。\n(3) ✗：若兩個三次首項互消，可降至 $\\le 2$ 次。例如 $P=x^3$、$Q=-x^3+x$，則 $P+Q=x$。\n(4) ✓：除法關係式 $P(x) = Q(x) \\cdot R(x) + r(x)$，$\\deg r < \\deg Q$，比較最高次：$\\deg P = \\deg Q + \\deg R$。\n(5) ✗：零多項式之次數無定義（或記為 $-\\infty$），非 $0$。", "skills": ["次數法則綜合", "概念辨析"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編自 86 學測多選題型（概念綜合）", "ref_id": null, "tags": ["次數", "概念辨析", "多選"]}], "related_nodes": ["F1-2", "F1-4"], "remediation_tip": "若本節 ≥2 題錯，回看講義 §一-1「多項式的定義與次數」（P.3-4）。重點：deg(f±g) ≤ max（同次首項可互消）、deg(fg) = 加總、零多項式次數無定義。"}, {"code": "F1-2", "name": "多項式的相等", "section": "一、多項式函數", "section_color": "green", "difficulty_grade": "冷門", "handout_page": "4-5", "concepts": ["多項式相等 ⟺ 對應同次項係數全部相等", "恆等式：對所有 x 成立，可比較係數或代入特定 x 求未知", "n 個點（n+1 點）唯一決定一個 n 次多項式", "零化代值法：代入使部分項變 0 的特定 x 值分離係數"], "question_count": 5, "layer_distribution": {"L1": 1, "L2": 2, "L3": 1, "L4": 1}, "questions": [{"id": "F1-2-L1-Q1", "layer": "L1", "type": "填充題", "stem": "若 $(a - 1)x^2 + (b + 2)x + (c - 3) = 0$ 對所有實數 $x$ 恆成立，求 $a,\\ b,\\ c$。", "answer": "$a = 1,\\ b = -2,\\ c = 3$", "solution": "多項式恆等於 $0$ $\\iff$ 各次項係數皆為 $0$。\\n$a-1=0,\\ b+2=0,\\ c-3=0 \\Rightarrow a=1,\\ b=-2,\\ c=3$。", "skills": ["係數比較", "恆等式"], "difficulty_star": 1, "bloom": "記憶", "source_kind": "原題", "source": "教材標準例（恆等式比較係數）", "ref_id": null, "tags": ["多項式相等", "恆等式"]}, {"id": "F1-2-L2-Q1", "layer": "L2", "type": "填充題", "stem": "若 $2x^2 - 5x + 3 = a(x - 1)^2 + b(x - 1) + c$ 對所有 $x$ 成立，求 $a + b + c$。", "answer": "$1$", "solution": "令 $u = x-1$（$x=u+1$）：$2(u+1)^2-5(u+1)+3 = 2u^2-u$，故 $a=2,\\ b=-1,\\ c=0$。\\n$a+b+c=1$。（亦可代 $x=2$：左式 $=2(4)-10+3=1$，恰為 $a+b+c$。）", "skills": ["平移展開", "比較係數"], "difficulty_star": 2, "bloom": "理解", "source_kind": "原題", "source": "段考常見基本題型（以 (x−1) 冪表示）", "ref_id": null, "tags": ["多項式相等", "恆等式"]}, {"id": "F1-2-L2-Q2", "layer": "L2", "type": "填充題", "stem": "設 $f(x)$ 為二次多項式，且 $f(1) = 3,\\ f(2) = 8,\\ f(3) = 15$。求 $f(4)$。", "answer": "$24$", "solution": "二次多項式由三點唯一決定。一階差 $8-3=5,\\ 15-8=7$；二階差 $7-5=2$（定值）。\n故下一個一階差 $7+2=9$，$f(4)=15+9=24$。（驗證 $f(x)=x^2+2x$ 過三點，$f(4)=24$。）", "skills": ["三點定二次", "差分法"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（由三點值求二次多項式之值）", "ref_id": null, "tags": ["多項式相等", "插值"]}, {"id": "F1-2-L3-Q1", "layer": "L3", "type": "填充題", "stem": "設 $a,\\ b,\\ c$ 使 $x^2 = a(x - 1)(x - 2) + b\\,x(x - 2) + c\\,x(x - 1)$ 對所有 $x$ 成立，求 $a + b + c$。", "answer": "$1$", "solution": "零化代值法：\\n$x=0$：$a(-1)(-2)=2a=0 \\Rightarrow a=0$。\\n$x=1$：$b(1)(-1)=-b=1 \\Rightarrow b=-1$。\\n$x=2$：$c(2)(1)=2c=4 \\Rightarrow c=2$。\\n$a+b+c=0-1+2=1$。", "skills": ["零化代值法", "恆等式"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（零化代值分離係數）", "ref_id": null, "tags": ["多項式相等", "零化代值"]}, {"id": "F1-2-L4-Q1", "layer": "L4", "type": "單選題", "stem": "設 $a,\\ b,\\ c$ 為實數，且多項式 $f(x) = a(x-1)(x-3) + b(x-1)(x-4) + c(x-3)(x-4)$ 化簡後得 $f(x) = x^2$。有關 $a,\\ b,\\ c$ 的大小關係，下列何者正確？\n(1) $a > b > c$　(2) $a > c > b$　(3) $b > c > a$　(4) $c > a > b$　(5) $c > b > a$", "answer": "(2) $a > c > b$", "solution": "零化代值法（代入使兩項為 0 的 $x$）：\\n$x=1$：$f(1)=c(1-3)(1-4)=6c=1 \\Rightarrow c=\\dfrac{1}{6}$。\\n$x=3$：$f(3)=b(3-1)(3-4)=-2b=9 \\Rightarrow b=-\\dfrac{9}{2}$。\\n$x=4$：$f(4)=a(4-1)(4-3)=3a=16 \\Rightarrow a=\\dfrac{16}{3}$。\n故 $a=\\dfrac{16}{3}>c=\\dfrac{1}{6}>b=-\\dfrac{9}{2}$，選 (2)。", "skills": ["零化代值法", "多項式相等"], "difficulty_star": 3, "bloom": "應用", "source_kind": "原題", "source": "114 學測B 第 6 題", "ref_id": "PLD-280", "tags": ["學測", "多項式相等", "零化代值"]}], "related_nodes": ["F1-1", "F1-3"], "remediation_tip": "若本節 ≥2 題錯，回看講義 §一-2「多項式的相等」（P.4-5）。核心：多項式相等⟺同次係數相等；恆等式可比較係數或代特定值；n+1 點定 n 次多項式；零化代值法是分離係數的利器。"}, {"code": "F1-3", "name": "係數和的妙招", "section": "一、多項式函數", "section_color": "green", "difficulty_grade": "冷門", "handout_page": "5-6", "concepts": ["f(1) = 所有係數之和", "f(-1) = 偶次項係數和 − 奇次項係數和", "f(0) = 常數項", "偶次項係數和 = (f(1)+f(-1))/2；奇次項係數和 = (f(1)−f(-1))/2", "f(x)−f(−x) 消去偶次項、只留奇次項（反之 f(x)+f(−x) 留偶次項）"], "question_count": 5, "layer_distribution": {"L1": 1, "L2": 2, "L3": 1, "L4": 1}, "questions": [{"id": "F1-3-L1-Q1", "layer": "L1", "type": "填充題", "stem": "設 $f(x) = 2x^3 - x^2 + 3x - 5$。求 $f(x)$ 所有係數之和。", "answer": "$-1$", "solution": "所有係數之和 $= f(1) = 2 - 1 + 3 - 5 = -1$。", "skills": ["f(1)=係數和"], "difficulty_star": 1, "bloom": "記憶", "source_kind": "原題", "source": "教材標準例（係數和 = f(1)）", "ref_id": null, "tags": ["係數和"]}, {"id": "F1-3-L2-Q1", "layer": "L2", "type": "填充題", "stem": "求 $(2x - 1)^4$ 展開後所有係數之和。", "answer": "$1$", "solution": "所有係數之和 $= f(1) = (2\\cdot 1 - 1)^4 = 1^4 = 1$。（代 $x=1$ 即得，免展開。）", "skills": ["f(1)=係數和"], "difficulty_star": 2, "bloom": "理解", "source_kind": "原題", "source": "段考常見基本題型（代 x=1 求係數和）", "ref_id": null, "tags": ["係數和"]}, {"id": "F1-3-L2-Q2", "layer": "L2", "type": "填充題", "stem": "求 $(2x - 1)^3$ 展開後偶次項（含常數項）係數之和。", "answer": "$-13$", "solution": "偶次項係數和 $= \\dfrac{f(1) + f(-1)}{2}$。\\n$f(1) = 1^3 = 1$，$f(-1) = (-3)^3 = -27$。\n偶次項係數和 $= \\dfrac{1 + (-27)}{2} = -13$。（驗證：$(2x-1)^3 = 8x^3 - 12x^2 + 6x - 1$，偶次項 $-12 + (-1) = -13$。）", "skills": ["(f(1)+f(-1))/2", "奇偶次拆解"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（偶次項係數和）", "ref_id": null, "tags": ["係數和", "奇偶次"]}, {"id": "F1-3-L3-Q1", "layer": "L3", "type": "填充題", "stem": "設 $(x^2 + x + 1)^5 = a_0 + a_1 x + a_2 x^2 + \\cdots + a_{10}x^{10}$。求 $a_1 + a_3 + a_5 + a_7 + a_9$。", "answer": "$121$", "solution": "奇次項係數和 $= \\dfrac{f(1) - f(-1)}{2}$。\\n$f(1) = (1+1+1)^5 = 3^5 = 243$；$f(-1) = (1-1+1)^5 = 1^5 = 1$。\\n$a_1+a_3+a_5+a_7+a_9 = \\dfrac{243 - 1}{2} = 121$。", "skills": ["(f(1)−f(-1))/2", "奇次項係數和"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（展開式奇次項係數和）", "ref_id": null, "tags": ["係數和", "奇偶次"]}, {"id": "F1-3-L4-Q1", "layer": "L4", "type": "單選題", "stem": "設 $f(x) = ax^6 - bx^4 + 3x - \\sqrt{2}$，其中 $a,\\ b$ 為非零實數，則 $f(5) - f(-5)$ 之值為？\n(1) $-30$　(2) $0$　(3) $2\\sqrt{2}$　(4) $30$　(5) 無法確定（與 $a,\\ b$ 有關）", "answer": "(4) $30$", "solution": "$f(x) - f(-x)$ 會消去所有偶次項與常數項，只留奇次項的兩倍。\n偶次項 $ax^6,\\ -bx^4$ 與常數 $-\\sqrt2$ 在 $f(5)$ 與 $f(-5)$ 相同，相減為 $0$。\n奇次項 $3x$：$3(5) - 3(-5) = 30$。故 $f(5)-f(-5)=30$，與 $a,\\ b$ 無關，選 (4)。", "skills": ["f(x)−f(−x) 消偶次", "奇偶次性質"], "difficulty_star": 3, "bloom": "應用", "source_kind": "原題", "source": "96 學測 第 1 題", "ref_id": "PLD-256", "tags": ["學測", "係數和", "奇偶次"]}], "related_nodes": ["F1-1", "F1-2"], "remediation_tip": "若本節 ≥2 題錯，回看講義 §一-3「係數和的妙招」（P.5-6）。核心：f(1)=係數和、f(-1)=偶次和−奇次和、f(0)=常數項；偶/奇次項係數和用 (f(1)±f(-1))/2；f(x)±f(−x) 可挑出偶/奇次項。代特定值免展開是關鍵。"}, {"code": "F1-4", "name": "多項式除法", "section": "一、多項式函數", "section_color": "green", "difficulty_grade": "熱門", "handout_page": "7-9", "concepts": ["除法原理：f(x) = g(x)·q(x) + r(x)，deg r < deg g", "餘式定理：f(x) 除以 (x−a) 的餘式為 f(a)", "因式定理：(x−a) 為 f(x) 的因式 ⟺ f(a) = 0", "綜合除法（除式為一次式 x−a 時的快速演算）", "長除法（除式為二次以上時）", "多除式餘式：除以 (x−a)(x−b)… 時餘式次數 < 除式次數，代入根求係數"], "question_count": 15, "layer_distribution": {"L1": 2, "L2": 4, "L3": 3, "L4": 6}, "questions": [{"id": "F1-4-L1-Q1", "layer": "L1", "type": "填充題", "stem": "以綜合除法計算 $f(x) = 2x^3 - 3x^2 + x - 5$ 除以 $(x - 2)$ 的商式與餘式。", "answer": "商式 $2x^2 + x + 3$，餘式 $1$", "solution": "綜合除法（以 $x = 2$ 為除點，列出係數 $2,\\ -3,\\ 1,\\ -5$）：\\n$2 \\to 2$；$2\\times 2 + (-3) = 1$；$1\\times 2 + 1 = 3$；$3\\times 2 + (-5) = 1$。\n故商式為 $2x^2 + x + 3$，餘式為 $1$。\n驗證（餘式定理）：$f(2) = 16 - 12 + 2 - 5 = 1$，與餘式一致。", "skills": ["綜合除法", "餘式定理驗證"], "difficulty_star": 1, "bloom": "記憶", "source_kind": "原題", "source": "教材標準例（綜合除法入門）", "ref_id": null, "tags": ["綜合除法", "商式餘式"]}, {"id": "F1-4-L1-Q2", "layer": "L1", "type": "填充題", "stem": "設 $f(x) = x^4 - 3x^2 + 2x - 1$。利用餘式定理求 $f(x)$ 除以 $(x + 2)$ 的餘式。", "answer": "$-1$", "solution": "餘式定理：$f(x)$ 除以 $(x - a)$ 的餘式為 $f(a)$。此處 $x + 2 = x - (-2)$，故餘式 $= f(-2)$。\\n$f(-2) = (-2)^4 - 3(-2)^2 + 2(-2) - 1 = 16 - 12 - 4 - 1 = -1$。", "skills": ["餘式定理"], "difficulty_star": 1, "bloom": "理解", "source_kind": "原題", "source": "教材標準例（餘式定理入門）", "ref_id": null, "tags": ["餘式定理"]}, {"id": "F1-4-L2-Q1", "layer": "L2", "type": "填充題", "stem": "已知 $(x - 1)$ 為 $f(x) = x^3 + ax^2 - x - 2$ 的因式，求實數 $a$。", "answer": "$a = 2$", "solution": "因式定理：$(x - 1)$ 為因式 $\\iff f(1) = 0$。\\n$f(1) = 1 + a - 1 - 2 = a - 2 = 0 \\Rightarrow a = 2$。", "skills": ["因式定理"], "difficulty_star": 2, "bloom": "理解", "source_kind": "原題", "source": "段考常見基本題型（因式定理求係數）", "ref_id": null, "tags": ["因式定理", "求係數"]}, {"id": "F1-4-L2-Q2", "layer": "L2", "type": "填充題", "stem": "設多項式 $f(x)$ 除以 $(x - 1)$ 的餘式為 $3$，除以 $(x - 2)$ 的餘式為 $5$。求 $f(x)$ 除以 $(x - 1)(x - 2)$ 的餘式。", "answer": "$2x + 1$", "solution": "除式為二次，餘式設為 $ax + b$（次數 $< 2$）。\n由餘式定理：$f(1) = 3 \\Rightarrow a + b = 3$；$f(2) = 5 \\Rightarrow 2a + b = 5$。\n兩式相減：$a = 2$，代回得 $b = 1$。故餘式為 $2x + 1$。", "skills": ["餘式定理", "多除式餘式（待定係數）"], "difficulty_star": 2, "bloom": "應用", "source_kind": "改編", "source": "改編自雙條件餘式題型（換為一次除式、簡化數據）", "ref_id": null, "tags": ["餘式定理", "待定係數"]}, {"id": "F1-4-L2-Q3", "layer": "L2", "type": "填充題", "stem": "利用綜合除法（餘式定理）求 $f(x) = x^3 - 2x^2 + 3x - 4$ 在 $x = 3$ 的值 $f(3)$。", "answer": "$14$", "solution": "以綜合除法用 $x = 3$ 除 $f(x)$，所得餘式即 $f(3)$：\n係數 $1,\\ -2,\\ 3,\\ -4$；$1 \\to 1$；$1\\times 3 + (-2) = 1$；$1\\times 3 + 3 = 6$；$6\\times 3 + (-4) = 14$。\n故 $f(3) = 14$。（直接代入亦得 $27 - 18 + 9 - 4 = 14$。）", "skills": ["綜合除法", "餘式定理"], "difficulty_star": 2, "bloom": "應用", "source_kind": "原題", "source": "教材標準例（綜合除法求函數值）", "ref_id": null, "tags": ["綜合除法", "求值"]}, {"id": "F1-4-L2-Q4", "layer": "L2", "type": "填充題", "stem": "設 $f(x) = 2x^3 + ax^2 + bx + 6$ 同時能被 $(x + 1)$ 與 $(x - 2)$ 整除，求實數 $a,\\ b$。", "answer": "$a = -5,\\ b = -1$", "solution": "因式定理：$f(-1) = 0$ 且 $f(2) = 0$。\\n$f(-1) = -2 + a - b + 6 = 0 \\Rightarrow a - b = -4$。\\n$f(2) = 16 + 4a + 2b + 6 = 0 \\Rightarrow 2a + b = -11$。\n兩式相加：$3a = -15 \\Rightarrow a = -5$，代回 $b = a + 4 = -1$。", "skills": ["因式定理", "聯立方程"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編自雙因式整除題型（增加為兩個未知數）", "ref_id": null, "tags": ["因式定理", "雙條件"]}, {"id": "F1-4-L3-Q1", "layer": "L3", "type": "填充題", "stem": "設多項式 $f(x)$ 除以 $(x - 1)$、$(x - 2)$、$(x - 3)$ 的餘式分別為 $2,\\ 3,\\ 6$。求 $f(x)$ 除以 $(x - 1)(x - 2)(x - 3)$ 的餘式。", "answer": "$x^2 - 2x + 3$", "solution": "除式為三次，餘式設 $ax^2 + bx + c$。由餘式定理：\\n$f(1) = a + b + c = 2$；$f(2) = 4a + 2b + c = 3$；$f(3) = 9a + 3b + c = 6$。\n相鄰兩式相減：$3a + b = 1$、$5a + b = 3$，再相減得 $2a = 2 \\Rightarrow a = 1$，於是 $b = -2$、$c = 3$。\n故餘式為 $x^2 - 2x + 3$。", "skills": ["餘式定理", "多除式二次餘式", "聯立方程"], "difficulty_star": 4, "bloom": "應用", "source_kind": "改編", "source": "改編加深自雙條件餘式題（推廣為三條件、二次餘式）", "ref_id": null, "tags": ["餘式定理", "二次餘式", "待定係數"]}, {"id": "F1-4-L3-Q2", "layer": "L3", "type": "填充題", "stem": "設首項係數為 $1$ 的三次多項式 $f(x)$，已知 $1$ 與 $2$ 皆為 $f(x) = 0$ 的根，且 $f(x)$ 除以 $(x - 3)$ 的餘式為 $8$。求 $f(x)$ 的第三個根與 $f(0)$。", "answer": "第三個根為 $-1$，$f(0) = 2$", "solution": "由因式定理，$1,\\ 2$ 為根且首項係數 $1$，設第三根為 $k$，則 $f(x) = (x - 1)(x - 2)(x - k)$。\n餘式定理：$f(3) = (3 - 1)(3 - 2)(3 - k) = 2(3 - k) = 8 \\Rightarrow 3 - k = 4 \\Rightarrow k = -1$。\n故 $f(x) = (x - 1)(x - 2)(x + 1)$，$f(0) = (-1)(-2)(1) = 2$。", "skills": ["因式定理", "餘式定理", "根與係數連結"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（結合因式定理、餘式定理與根的結構，反向求未知根）", "ref_id": null, "tags": ["因式定理", "餘式定理", "綜合"]}, {"id": "F1-4-L3-Q3", "layer": "L3", "type": "填充題", "stem": "求 $x^5$ 除以 $(x - 1)(x - 2)(x + 1)$ 的餘式。", "answer": "$10x^2 + x - 10$", "solution": "除式為三次，餘式設 $ax^2 + bx + c$，令 $x^5 = (x-1)(x-2)(x+1)\\,q(x) + ax^2 + bx + c$。\n代入三根：\\n$x = 1$：$1 = a + b + c$；$x = 2$：$32 = 4a + 2b + c$；$x = -1$：$-1 = a - b + c$。\n第一式減第三式：$2b = 2 \\Rightarrow b = 1$。代回 $a + c = 0$（即 $c = -a$）。\n第二式：$4a + 2 - a = 32 \\Rightarrow 3a = 30 \\Rightarrow a = 10$，$c = -10$。\n故餘式為 $10x^2 + x - 10$。", "skills": ["餘式定理", "高次方除法", "二次餘式"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（高次方除以三個一次式乘積，求二次餘式）", "ref_id": null, "tags": ["餘式定理", "高次方", "二次餘式"]}, {"id": "F1-4-L4-Q1", "layer": "L4", "type": "填充題", "stem": "設多項式 $f(x)$ 除以 $x^2 - 5x + 4$ 的餘式為 $x + 2$；除以 $x^2 - 5x + 6$ 的餘式為 $3x + 4$。則 $f(x)$ 除以 $x^2 - 4x + 3$ 的餘式為何？", "answer": "$5x - 2$", "solution": "$x^2 - 5x + 4 = (x - 1)(x - 4) \\Rightarrow f(1) = 1 + 2 = 3$。\\n$x^2 - 5x + 6 = (x - 2)(x - 3) \\Rightarrow f(3) = 9 + 4 = 13$。\\n$x^2 - 4x + 3 = (x - 1)(x - 3)$，餘式設 $ax + b$：$f(1) = a + b = 3$，$f(3) = 3a + b = 13$。\n解得 $a = 5,\\ b = -2$，餘式為 $5x - 2$。", "skills": ["餘式定理", "多除式餘式", "因式分解"], "difficulty_star": 3, "bloom": "應用", "source_kind": "原題", "source": "90 學測 第 14 題", "ref_id": "PLD-248", "tags": ["學測", "餘式定理", "多除式"]}, {"id": "F1-4-L4-Q2", "layer": "L4", "type": "多選題", "stem": "已知 $f(x)$ 除以 $x^2 - 1$ 的餘式為 $2x + 1$。試選出正確的選項。\n(1) $f(1) = 2$\n(2) $f(1) = 3$\n(3) $f(x)$ 可以為 $2x + 1$\n(4) $f(x)$ 必為 $2x + 1$\n(5) $4x^4 + 2x^3 - 3$ 除以 $x^2 - 1$ 的餘式為 $2x + 1$", "answer": "(2)(3)(5)", "solution": "由餘式定理，$f(1) = 2(1) + 1 = 3$。\n(1) ✗、(2) ✓。\n(3) 一次式 $2x + 1$（次數 $< 2$）除以 $x^2 - 1$ 餘式就是自己，故 $f$ 可以為 $2x + 1$，✓。\n(4) $f$ 可再加任意 $(x^2 - 1)$ 的倍式，並非唯一，✗。\n(5) 由 sympy 驗算 $\\,4x^4 + 2x^3 - 3$ 除以 $x^2 - 1$ 餘式確為 $2x + 1$，✓。\n故選 (2)(3)(5)。", "skills": ["餘式定理", "餘式唯一性辨析"], "difficulty_star": 3, "bloom": "分析", "source_kind": "原題", "source": "107 學測 第 9 題", "ref_id": "PLD-269", "tags": ["學測", "餘式定理", "多選"]}, {"id": "F1-4-L4-Q3", "layer": "L4", "type": "多選題", "stem": "設 $f_1(x),\\ f_2(x)$ 為實係數三次多項式，$g(x)$ 為實係數二次多項式。已知 $f_1(x),\\ f_2(x)$ 除以 $g(x)$ 的餘式分別為 $r_1(x),\\ r_2(x)$。試選出正確的選項。\n(1) $-f_1(x)$ 除以 $g(x)$ 的餘式為 $-r_1(x)$\n(2) $f_1(x) + f_2(x)$ 除以 $g(x)$ 的餘式為 $r_1(x) + r_2(x)$\n(3) $f_1(x)f_2(x)$ 除以 $g(x)$ 的餘式為 $r_1(x)r_2(x)$\n(4) $f_1(x)$ 除以 $3g(x)$ 的餘式為 $\\dfrac{1}{3}r_1(x)$\n(5) $f_1(x)r_2(x) - f_2(x)r_1(x)$ 可被 $g(x)$ 整除", "answer": "(1)(2)(5)", "solution": "設 $f_i = q_i g + r_i$（$\\deg r_i < 2$）。\n(1) $-f_1 = -q_1 g + (-r_1)$，餘式 $-r_1$，✓。\n(2) $f_1 + f_2 = (q_1 + q_2)g + (r_1 + r_2)$，且 $\\deg(r_1 + r_2) < 2$，餘式 $r_1 + r_2$，✓。\n(3) $r_1 r_2$ 次數可達 $2$ 以上，仍需再除以 $g$，✗。\n(4) 除式變為 $3g$（仍二次），餘式仍是 $r_1$ 而非 $\\tfrac{1}{3}r_1$，✗。\n(5) $f_1 r_2 - f_2 r_1 = (q_1 g + r_1)r_2 - (q_2 g + r_2)r_1 = g(q_1 r_2 - q_2 r_1)$，可被 $g$ 整除，✓。\n故選 (1)(2)(5)。", "skills": ["除法原理", "餘式運算性質", "概念辨析"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "108 學測 第 12 題", "ref_id": "PLD-271", "tags": ["學測", "除法原理", "多選"]}, {"id": "F1-4-L4-Q4", "layer": "L4", "type": "填充題", "stem": "設 $a,\\ b$ 為實數（$a > 0$）。若多項式 $ax^2 + (2a + b)x - 12$ 除以 $x^2 + (2 - a)x - 2a$ 所得餘式為 $6$，則 $(a,\\ b) = ?$", "answer": "$(a,\\ b) = (3,\\ -9)$", "solution": "被除式與除式皆為二次，商為常數 $a$（最高次比）：\\n$ax^2 + (2a + b)x - 12 = a\\bigl[x^2 + (2 - a)x - 2a\\bigr] + R(x)$。\\n$R(x) = (2a + b)x - 12 - a(2 - a)x + 2a^2 = (a^2 + b)x + (2a^2 - 12)$。\n餘式為常數 $6$：$a^2 + b = 0$ 且 $2a^2 - 12 = 6 \\Rightarrow a^2 = 9 \\Rightarrow a = 3$（取正），$b = -a^2 = -9$。", "skills": ["長除法", "餘式（待定）", "係數比較"], "difficulty_star": 4, "bloom": "應用", "source_kind": "原題", "source": "112 學測A 第 14 題", "ref_id": "PLD-276", "tags": ["學測", "長除法", "係數比較"]}, {"id": "F1-4-L4-Q5", "layer": "L4", "type": "填充題", "stem": "已知 $f(x),\\ g(x),\\ h(x)$ 皆為實係數三次多項式，且除以 $x^2 - 2x + 3$ 的餘式分別為 $x + 1,\\ x - 3,\\ -2$。若 $xf(x) + a\\,g(x) + b\\,h(x)$ 可被 $x^2 - 2x + 3$ 整除（$a,\\ b$ 為實數），求 $a,\\ b$。", "answer": "$a = -3,\\ b = 3$", "solution": "在模 $x^2 - 2x + 3$ 下，$xf(x) + a\\,g(x) + b\\,h(x) \\equiv x(x + 1) + a(x - 3) + b(-2)$。\\n$x(x + 1) = x^2 + x = (x^2 - 2x + 3) + (3x - 3) \\equiv 3x - 3$。\n整體餘式 $= (3 + a)x + (-3 - 3a - 2b)$。\n要整除須餘式為 $0$：$3 + a = 0 \\Rightarrow a = -3$；$-3 - 3(-3) - 2b = 0 \\Rightarrow 6 - 2b = 0 \\Rightarrow b = 3$。", "skills": ["餘式定理", "同餘運算", "整除條件"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "113 學測A 第 14 題", "ref_id": "PLD-278", "tags": ["學測", "整除", "同餘"]}, {"id": "F1-4-L4-Q6", "layer": "L4", "type": "多選題", "stem": "設 $f(x) = (1 - x)(2 - x)^2(4 + x)$。試選出正確的選項。\n(1) $f(x)$ 除以 $(1 - x)(2 - x)(4 + x)$ 的餘式為 $-x + 2$\n(2) 若將 $f(x)$ 表為 $a(x - 2)^4 + b(x - 2)^3 + c(x - 2)^2$，則 $c = -6$\n(3) $f(x) > 0$ 的解區間為 $(-4,\\ 2)$\n(4) $\\dfrac{f(2026)}{f(-2022)} > 1$\n(5) $f(2026) > f(-2022)$", "answer": "(2)(4)", "solution": "(1) $f(x) = (2 - x)\\cdot[(1 - x)(2 - x)(4 + x)]$，故餘式為 $0$，✗。\n(2) 令 $u = x - 2$：$f = (-1 - u)\\,u^2\\,(6 + u) = -u^4 - 7u^3 - 6u^2$，故 $c = -6$，✓。\n(3) 根為 $-4,\\ 1,\\ 2$（$2$ 為重根）。$(2 - x)^2 \\ge 0$，$f > 0$ 的解為 $(-4,\\ 1)$ 而非 $(-4,\\ 2)$，✗。\n(4) $f(2026), f(-2022)$ 皆為負，比值 $\\dfrac{(-2025)(2030)}{(2023)(-2018)} > 1$，✓。\n(5) 兩值皆負且 $|f(2026)| > |f(-2022)|$，故 $f(2026) < f(-2022)$，✗。\n故選 (2)(4)。", "skills": ["因式定理", "餘式定理", "多項式不等式", "符號判斷"], "difficulty_star": 3, "bloom": "分析", "source_kind": "原題", "source": "115 學測B 第 9 題", "ref_id": "PLD-281", "tags": ["學測", "因式分解", "餘式", "多選"]}], "related_nodes": ["F1-1", "F1-5", "F1-6"], "remediation_tip": "若本節 ≥3 題錯，回看講義 §一-4「多項式除法」（P.7-9）。核心：餘式定理 f(x)÷(x−a) 餘 f(a)、因式定理 f(a)=0⟺(x−a) 為因式、綜合除法（一次除式）與長除法（高次除式）、多除式時餘式次數小於除式並用代根法求係數。建議先把 L1、L2 做熟再挑戰 L3、L4。"}, {"code": "F1-5", "name": "根與係數關係（Vieta）", "section": "一、多項式函數", "section_color": "green", "difficulty_grade": "熱門", "handout_page": "10-12", "concepts": ["二次 ax²+bx+c=0：α+β = −b/a，αβ = c/a", "三次 ax³+bx²+cx+d=0：Σα = −b/a，Σαβ = c/a，αβγ = −d/a", "對稱式化簡：α²+β² = (α+β)²−2αβ；α³+β³ = (α+β)³−3αβ(α+β)；1/α+1/β = (α+β)/(αβ)", "三次冪和：α³+β³+γ³ 由 e1,e2,e3 表出", "由根反向構造方程式、由對稱式條件反求係數", "判別式 b²−4ac 判別相異實根（本節僅處理實根情形）"], "question_count": 15, "layer_distribution": {"L1": 2, "L2": 4, "L3": 3, "L4": 6}, "_curriculum_note": "依教師裁定（2026-06-16），本節嚴守 108 課綱必修範圍，全面排除：共軛虛根成對定理、有理根定理、勘根定理、三次以上方程虛根/複根討論。所有題目僅出現實根。", "questions": [{"id": "F1-5-L1-Q1", "layer": "L1", "type": "填充題", "stem": "設 $\\alpha,\\ \\beta$ 為二次方程式 $2x^2 - 7x + 3 = 0$ 的兩根。求 $\\alpha + \\beta$ 與 $\\alpha\\beta$。", "answer": "$\\alpha + \\beta = \\dfrac{7}{2}$，$\\alpha\\beta = \\dfrac{3}{2}$", "solution": "二次方程 $ax^2 + bx + c = 0$：$\\alpha + \\beta = -\\dfrac{b}{a}$、$\\alpha\\beta = \\dfrac{c}{a}$。\n此處 $a=2,\\ b=-7,\\ c=3$，故 $\\alpha+\\beta=\\dfrac{7}{2}$，$\\alpha\\beta=\\dfrac{3}{2}$。（驗證：$2x^2-7x+3=(2x-1)(x-3)$，根 $\\tfrac12,\\ 3$。）", "skills": ["二次根與係數"], "difficulty_star": 1, "bloom": "記憶", "source_kind": "原題", "source": "教材標準例（Vieta 入門）", "ref_id": null, "tags": ["根與係數", "二次"]}, {"id": "F1-5-L1-Q2", "layer": "L1", "type": "填充題", "stem": "設 $\\alpha,\\ \\beta,\\ \\gamma$ 為三次方程式 $x^3 - 6x^2 + 11x - 6 = 0$ 的三根。求 $\\alpha+\\beta+\\gamma$、$\\alpha\\beta+\\beta\\gamma+\\gamma\\alpha$、$\\alpha\\beta\\gamma$。", "answer": "$6,\\ 11,\\ 6$", "solution": "首一三次 $x^3+bx^2+cx+d=0$：$\\Sigma\\alpha=-b=6$；$\\Sigma\\alpha\\beta=c=11$；$\\alpha\\beta\\gamma=-d=6$。\n（本式 $=(x-1)(x-2)(x-3)$，三實根 $1,2,3$ 符合。）", "skills": ["三次根與係數"], "difficulty_star": 2, "bloom": "理解", "source_kind": "原題", "source": "教材標準例（三次 Vieta）", "ref_id": null, "tags": ["根與係數", "三次"]}, {"id": "F1-5-L2-Q1", "layer": "L2", "type": "填充題", "stem": "設 $\\alpha,\\ \\beta$ 為 $x^2 - 5x + 2 = 0$ 的兩根，求 $\\alpha^2 + \\beta^2$。", "answer": "$21$", "solution": "$\\alpha+\\beta=5,\\ \\alpha\\beta=2$。$\\alpha^2+\\beta^2=(\\alpha+\\beta)^2-2\\alpha\\beta=25-4=21$。", "skills": ["對稱式化簡", "平方和"], "difficulty_star": 2, "bloom": "理解", "source_kind": "原題", "source": "段考常見基本題型（平方和對稱式）", "ref_id": null, "tags": ["根與係數", "對稱式"]}, {"id": "F1-5-L2-Q2", "layer": "L2", "type": "填充題", "stem": "設 $\\alpha,\\ \\beta$ 為 $3x^2 - 4x - 1 = 0$ 的兩根，求 $\\dfrac{1}{\\alpha} + \\dfrac{1}{\\beta}$。", "answer": "$-4$", "solution": "$\\alpha+\\beta=\\dfrac{4}{3},\\ \\alpha\\beta=-\\dfrac{1}{3}$。$\\dfrac{1}{\\alpha}+\\dfrac{1}{\\beta}=\\dfrac{\\alpha+\\beta}{\\alpha\\beta}=\\dfrac{4/3}{-1/3}=-4$。", "skills": ["對稱式化簡", "倒數和"], "difficulty_star": 2, "bloom": "應用", "source_kind": "原題", "source": "段考常見基本題型（倒數和對稱式）", "ref_id": null, "tags": ["根與係數", "對稱式"]}, {"id": "F1-5-L2-Q3", "layer": "L2", "type": "填充題", "stem": "已知 $\\alpha,\\ \\beta$ 為 $x^2 - 3x + 1 = 0$ 的兩根。求以 $\\alpha + 2$、$\\beta + 2$ 為兩根的首一二次方程式。", "answer": "$x^2 - 7x + 11 = 0$", "solution": "原方程：$\\alpha+\\beta=3,\\ \\alpha\\beta=1$。\n新根之和 $=(\\alpha+\\beta)+4=7$；新根之積 $=\\alpha\\beta+2(\\alpha+\\beta)+4=1+6+4=11$。\n故首一二次方程為 $x^2-7x+11=0$。", "skills": ["由根構造方程", "對稱式"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（根平移後反向構造方程式）", "ref_id": null, "tags": ["根與係數", "構造方程"]}, {"id": "F1-5-L2-Q4", "layer": "L2", "type": "填充題", "stem": "設 $x^2 + px + q = 0$ 的兩根 $\\alpha,\\ \\beta$ 滿足 $\\alpha + \\beta = 5$ 且 $\\alpha^2 + \\beta^2 = 13$。求實數 $p,\\ q$。", "answer": "$p = -5,\\ q = 6$", "solution": "$\\alpha+\\beta=-p=5\\Rightarrow p=-5$。\\n$\\alpha^2+\\beta^2=(\\alpha+\\beta)^2-2\\alpha\\beta=25-2\\alpha\\beta=13\\Rightarrow \\alpha\\beta=6$，而 $\\alpha\\beta=q$，故 $q=6$。", "skills": ["根與係數反求", "對稱式"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（由對稱式條件反求係數）", "ref_id": null, "tags": ["根與係數", "反求係數"]}, {"id": "F1-5-L3-Q1", "layer": "L3", "type": "填充題", "stem": "設 $\\alpha,\\ \\beta,\\ \\gamma$ 為 $x^3 - 2x^2 - x + 2 = 0$ 的三根，求 $\\alpha^3 + \\beta^3 + \\gamma^3$。", "answer": "$8$", "solution": "由 Vieta：$e_1=\\Sigma\\alpha=2,\\ e_2=\\Sigma\\alpha\\beta=-1,\\ e_3=\\alpha\\beta\\gamma=-2$。\n三次冪和公式：$\\alpha^3+\\beta^3+\\gamma^3=e_1^3-3e_1e_2+3e_3=8-3(2)(-1)+3(-2)=8+6-6=8$。\n（本式 $=(x-1)(x+1)(x-2)$，三實根 $1,-1,2$，立方和 $1-1+8=8$，符合。）", "skills": ["三次冪和", "對稱式", "Newton 恆等式"], "difficulty_star": 4, "bloom": "應用", "source_kind": "改編", "source": "改編（三次立方和對稱式，三實根）", "ref_id": null, "tags": ["根與係數", "三次", "冪和"]}, {"id": "F1-5-L3-Q2", "layer": "L3", "type": "填充題", "stem": "設二次方程式 $x^2 - kx + (k - 1) = 0$ 的兩根之平方和為 $10$，求所有實數 $k$。", "answer": "$k = 4$ 或 $k = -2$", "solution": "設兩根 $\\alpha,\\ \\beta$，$\\alpha+\\beta=k,\\ \\alpha\\beta=k-1$。\\n$\\alpha^2+\\beta^2=k^2-2(k-1)=k^2-2k+2=10\\Rightarrow k^2-2k-8=0\\Rightarrow(k-4)(k+2)=0$，$k=4$ 或 $-2$。\n判別式 $(k)^2-4(k-1)=(k-2)^2\\ge 0$，兩值皆得相異實根（$k=4$：根 $1,3$；$k=-2$：根 $1,-3$），故兩解皆取。", "skills": ["根與係數反求", "對稱式", "判別式檢核"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（含參數平方和求 k，確保實根）", "ref_id": null, "tags": ["根與係數", "參數"]}, {"id": "F1-5-L3-Q3", "layer": "L3", "type": "填充題", "stem": "設 $\\alpha,\\ \\beta$ 為 $x^2 - 5x + 6 = 0$ 的兩根，求 $\\alpha^3 + \\beta^3$。", "answer": "$35$", "solution": "$\\alpha+\\beta=5,\\ \\alpha\\beta=6$。\\n$\\alpha^3+\\beta^3=(\\alpha+\\beta)^3-3\\alpha\\beta(\\alpha+\\beta)=125-3(6)(5)=125-90=35$。\n（$x^2-5x+6=(x-2)(x-3)$，$2^3+3^3=8+27=35$，符合。）", "skills": ["立方和對稱式"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（立方和對稱式，實根）", "ref_id": null, "tags": ["根與係數", "立方和"]}, {"id": "F1-5-L4-Q1", "layer": "L4", "type": "填充題", "stem": "設 $a$ 為實數，令 $\\alpha,\\ \\beta$ 為二次方程式 $x^2 + ax + (a - 2) = 0$ 的兩根。試問當 $a$ 為何值時，$|\\alpha - \\beta|$ 有最小值？", "answer": "$a = 2$", "solution": "由 Vieta：$\\alpha+\\beta=-a,\\ \\alpha\\beta=a-2$。\\n$(\\alpha-\\beta)^2=(\\alpha+\\beta)^2-4\\alpha\\beta=a^2-4(a-2)=(a-2)^2+4>0$（恆有相異實根）。\n當 $a=2$ 時 $(\\alpha-\\beta)^2$ 最小值 $4$，故 $|\\alpha-\\beta|$ 最小，發生於 $a=2$（此時根為 $0,\\ -2$，$|\\alpha-\\beta|=2$）。", "skills": ["根與係數", "配方法求極值"], "difficulty_star": 3, "bloom": "應用", "source_kind": "原題", "source": "93 指考數乙 選填A", "ref_id": "PLD-311", "tags": ["指考", "根與係數", "極值"]}, {"id": "F1-5-L4-Q2", "layer": "L4", "type": "填充題", "stem": "設 $k$ 為整數。若方程式 $kx^2 + 7x + 1 = 0$ 有兩個相異實根，且兩根的乘積介於 $\\dfrac{5}{71}$ 與 $\\dfrac{6}{71}$ 之間，求 $k$。", "answer": "$k = 12$", "solution": "兩根乘積 $=\\dfrac{1}{k}$，需 $\\dfrac{5}{71}<\\dfrac{1}{k}<\\dfrac{6}{71}$，即 $\\dfrac{71}{6}<k<\\dfrac{71}{5}$（$11.83<k<14.2$）。\n又相異實根須判別式 $>0$：$49-4k>0\\Rightarrow k<12.25$。\n兩條件取交集，整數 $k=12$。", "skills": ["根與係數（乘積）", "判別式"], "difficulty_star": 3, "bloom": "應用", "source_kind": "原題", "source": "92 學測 第 17 題", "ref_id": "QDR-064", "tags": ["學測", "根與係數", "判別式"]}, {"id": "F1-5-L4-Q3", "layer": "L4", "type": "單選題", "stem": "設 $\\alpha,\\ \\beta$ 為方程式 $x^2 + 5x + 3 = 0$ 的兩根，則 $\\alpha^3 + \\beta^3$ 之值為何？\n(1) $110$　(2) $80$　(3) $-50$　(4) $-80$　(5) $-100$", "answer": "(4) $-80$", "solution": "$\\alpha+\\beta=-5,\\ \\alpha\\beta=3$（判別式 $25-12>0$，兩相異實根）。\\n$\\alpha^3+\\beta^3=(\\alpha+\\beta)^3-3\\alpha\\beta(\\alpha+\\beta)=(-5)^3-3(3)(-5)=-125+45=-80$。選 (4)。", "skills": ["立方和對稱式"], "difficulty_star": 2, "bloom": "應用", "source_kind": "原題", "source": "108 學測 數A 第1次模考（臺北）單1", "ref_id": "PLD-451", "tags": ["模考", "根與係數", "立方和"]}, {"id": "F1-5-L4-Q4", "layer": "L4", "type": "填充題", "stem": "已知實係數二次多項式函數 $y = f(x)$ 滿足 $f(3) = f(-7)$，且方程式 $f(x) = 0$ 有相異兩實根。試求其兩根之積的範圍。", "answer": "兩根之積小於 $4$", "solution": "$f(3)=f(-7)$ $\\Rightarrow$ 對稱軸 $x=\\dfrac{3+(-7)}{2}=-2$，故可設 $f(x)=a(x+2)^2+b=ax^2+4ax+(4a+b)$。\n有相異實根 $\\Rightarrow (x+2)^2=-\\dfrac{b}{a}$ 有兩解 $\\Rightarrow -\\dfrac{b}{a}>0 \\Rightarrow \\dfrac{b}{a}<0$。\n由 Vieta：兩根之積 $=\\dfrac{4a+b}{a}=4+\\dfrac{b}{a}<4$。故兩根之積恆小於 $4$。", "skills": ["二次對稱軸", "根與係數（乘積）", "不等式推理"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "107 指考數乙 非選一（取第3小題）", "ref_id": "QDR-104", "tags": ["指考", "根與係數", "對稱軸"]}, {"id": "F1-5-L4-Q5", "layer": "L4", "type": "填充題", "stem": "已知實係數方程式 $x^3 - px^2 - \\dfrac{13}{4}x + \\dfrac{15}{8} = 0$ 的三個相異實根成等差數列，求 $p$（化為最簡分數）。", "answer": "$p = \\dfrac{3}{2}$", "solution": "設三根為 $m-d,\\ m,\\ m+d$（等差）。三根之和 $=3m=p$，且 $m$ 為一根。\n將 $p=3m$ 代入並令 $x=m$ 為根：$m^3-3m\\cdot m^2-\\dfrac{13}{4}m+\\dfrac{15}{8}=0\\Rightarrow -2m^3-\\dfrac{13}{4}m+\\dfrac{15}{8}=0$，\n乘 $-8$：$16m^3+26m-15=0$，得 $m=\\dfrac12$。故 $p=3m=\\dfrac{3}{2}$。\n（驗證：$p=\\tfrac32$ 時三根為 $-\\tfrac32,\\ \\tfrac12,\\ \\tfrac52$，公差 $2$，相異實根。）", "skills": ["三次根與係數", "等差數列", "代根求參數"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "105 學測 數A 第2次模考（全國·高中）選填B", "ref_id": "PLD-336", "tags": ["模考", "根與係數", "等差根"]}, {"id": "F1-5-L4-Q6", "layer": "L4", "type": "單選題", "stem": "設 $a \\in \\{-6, -4, -2, 2, 4, 6\\}$ 為實係數三次多項式 $f(x)$ 的最高次項係數。若 $y = f(x)$ 的圖形與 $x$ 軸交於三點，且其 $x$ 坐標成首項為 $-7$、公差為 $a$ 的等差數列，則共有幾個 $a$ 使得 $f(0) > 0$？\n(1) 1 個　(2) 2 個　(3) 3 個　(4) 4 個　(5) 5 個", "answer": "(1) 1 個", "solution": "三實根為 $-7,\\ -7+a,\\ -7+2a$，故 $f(x)=a(x+7)(x+7-a)(x+7-2a)$。\\n$f(0)=7a(7-a)(7-2a)$。代入：$a=2$ 得 $7\\cdot2\\cdot5\\cdot3=210>0$ ✓；其餘 $a=4,6,-2,-4,-6$ 皆 $<0$。\n僅 $a=2$，選 (1)。", "skills": ["三根與最高次係數", "等差數列", "符號判斷"], "difficulty_star": 3, "bloom": "應用", "source_kind": "原題", "source": "113 學測A 第 3 題", "ref_id": "CUB-032", "tags": ["學測", "根與係數", "等差根"]}], "related_nodes": ["F1-4", "F1-6"], "remediation_tip": "若本節 ≥3 題錯，回看講義 §一-5「根與係數關係」（P.10-12）。核心：二次 α+β=−b/a、αβ=c/a；三次三組對稱式；對稱式化簡（平方和、立方和、倒數和、三次冪和）；由根構造方程與反求係數。本節僅處理實根（共軛虛根成對、有理根、勘根定理屬選修數甲，不在範圍）。"}, {"code": "F1-6", "name": "多項式不等式", "section": "一、多項式函數", "section_color": "green", "difficulty_grade": "熱門", "handout_page": "13-15", "concepts": ["一次不等式的移項與變號", "二次不等式：因式分解或配方，依開口方向與兩根定解集", "高次（因式）不等式：數線標根、區間符號法判正負", "恆正/恆負因式（判別式<0 的二次）可整段約去或保留符號", "偶次因式 (x−a)^{2k}：除挖去 x=a 外不改變號", "整數解個數、解集反推係數、含參數不等式的解集條件"], "question_count": 15, "layer_distribution": {"L1": 2, "L2": 4, "L3": 3, "L4": 6}, "_curriculum_note": "依教師裁定（2026-06-16）：嚴守 108 課綱，全程以因式分解＋區間符號法（數線標根）解題，不使用勘根定理，題目僅出現實根；恆正二次因式以判別式<0 判定後約去。", "questions": [{"id": "F1-6-L1-Q1", "layer": "L1", "type": "填充題", "stem": "解不等式 $x^2 - x - 6 > 0$。", "answer": "$x < -2$ 或 $x > 3$", "solution": "因式分解：$x^2-x-6=(x-3)(x+2)$。\n開口向上，兩根 $-2,\\ 3$，$>0$ 取兩根之外：$x<-2$ 或 $x>3$。", "skills": ["二次不等式", "因式分解"], "difficulty_star": 1, "bloom": "記憶", "source_kind": "原題", "source": "教材標準例（二次不等式入門）", "ref_id": null, "tags": ["二次不等式"]}, {"id": "F1-6-L1-Q2", "layer": "L1", "type": "填充題", "stem": "解不等式 $x^2 - 4x + 3 \\le 0$。", "answer": "$1 \\le x \\le 3$", "solution": "$x^2-4x+3=(x-1)(x-3)$，開口向上，兩根 $1,\\ 3$，$\\le 0$ 取兩根之間（含端點）：$1\\le x\\le 3$。", "skills": ["二次不等式", "因式分解"], "difficulty_star": 1, "bloom": "理解", "source_kind": "原題", "source": "教材標準例（二次不等式入門）", "ref_id": null, "tags": ["二次不等式"]}, {"id": "F1-6-L2-Q1", "layer": "L2", "type": "填充題", "stem": "解不等式 $-x^2 + 2x + 3 \\ge 0$。", "answer": "$-1 \\le x \\le 3$", "solution": "兩邊同乘 $-1$（不等號變向）：$x^2-2x-3\\le 0$，即 $(x-3)(x+1)\\le 0$。\n兩根 $-1,\\ 3$，取兩根之間：$-1\\le x\\le 3$。", "skills": ["二次不等式", "首項負號處理"], "difficulty_star": 2, "bloom": "理解", "source_kind": "原題", "source": "段考常見基本題型（首項為負的二次不等式）", "ref_id": null, "tags": ["二次不等式"]}, {"id": "F1-6-L2-Q2", "layer": "L2", "type": "填充題", "stem": "解不等式 $(x + 1)(x - 2)(x - 4) < 0$。", "answer": "$x < -1$ 或 $2 < x < 4$", "solution": "零點 $-1,\\ 2,\\ 4$ 在數線上分四段。三次式最高次係數為正，最右段（$x>4$）為正，依序向左變號：$(+)(−)(+)(−)$。\n取 $<0$ 的段：$x<-1$ 或 $2<x<4$。", "skills": ["三次因式不等式", "數線標根區間符號法"], "difficulty_star": 2, "bloom": "應用", "source_kind": "原題", "source": "教材標準例（三次因式不等式）", "ref_id": null, "tags": ["高次不等式", "符號法"]}, {"id": "F1-6-L2-Q3", "layer": "L2", "type": "填充題", "stem": "不等式 $x^2 - 6x + 5 < 0$ 有多少個整數解？", "answer": "$3$ 個", "solution": "$x^2-6x+5=(x-1)(x-5)<0\\Rightarrow 1<x<5$。\n區間內整數為 $2,\\ 3,\\ 4$，共 $3$ 個。", "skills": ["二次不等式", "整數解計數"], "difficulty_star": 2, "bloom": "應用", "source_kind": "改編", "source": "改編（二次不等式整數解個數）", "ref_id": null, "tags": ["二次不等式", "整數解"]}, {"id": "F1-6-L2-Q4", "layer": "L2", "type": "填充題", "stem": "解不等式 $(x^2 + 1)(x - 2) < 0$。", "answer": "$x < 2$", "solution": "$x^2+1>0$ 對所有實數恆成立（判別式 $<0$ 且開口向上），可整段約去且不改變號。\n故不等式 $\\iff x-2<0 \\iff x<2$。", "skills": ["恆正因式約去", "符號判斷"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（含恆正二次因式的不等式）", "ref_id": null, "tags": ["高次不等式", "恆正因式"]}, {"id": "F1-6-L3-Q1", "layer": "L3", "type": "填充題", "stem": "解不等式 $(x - 1)^2 (x + 3) < 0$。", "answer": "$x < -3$", "solution": "$(x-1)^2 \\ge 0$，且僅在 $x=1$ 時為 $0$。\n要乘積 $<0$，須 $(x-1)^2>0$（即 $x\\ne 1$）且 $x+3<0$。\\n$x+3<0\\Rightarrow x<-3$（此範圍自動 $x\\ne 1$）。故解為 $x<-3$。", "skills": ["偶次因式處理", "區間符號法"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（含平方因式的高次不等式）", "ref_id": null, "tags": ["高次不等式", "偶次因式"]}, {"id": "F1-6-L3-Q2", "layer": "L3", "type": "填充題", "stem": "設 $a,\\ b,\\ c$ 為實數。已知不等式 $ax^2 + bx + c > 0$ 的解為 $-1 < x < 3$。求不等式 $cx^2 + bx + a < 0$ 的解。", "answer": "$-1 < x < \\dfrac{1}{3}$", "solution": "$ax^2+bx+c>0$ 解為有界開區間 $\\Rightarrow a<0$，且兩根為 $-1,\\ 3$。\n由根與係數：$ax^2+bx+c=a(x+1)(x-3)$，故 $b=-2a,\\ c=-3a$。\n代入 $cx^2+bx+a=-3a x^2-2a x+a=a(-3x^2-2x+1)=-a(3x^2+2x-1)=-a(3x-1)(x+1)$。\n因 $a<0$，$-a>0$，故 $cx^2+bx+a<0 \\iff (3x-1)(x+1)<0 \\iff -1<x<\\dfrac{1}{3}$。", "skills": ["解集反推係數", "二次不等式", "參數化"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（由解集反推係數再解新不等式）", "ref_id": null, "tags": ["二次不等式", "解集反推"]}, {"id": "F1-6-L3-Q3", "layer": "L3", "type": "填充題", "stem": "解不等式 $(x^2 - 4)(x^2 - 2x - 3) \\ge 0$。", "answer": "$x \\le -2$ 或 $-1 \\le x \\le 2$ 或 $x \\ge 3$", "solution": "因式分解：$(x-2)(x+2)\\,(x-3)(x+1)\\ge 0$。\n零點由小到大 $-2,\\ -1,\\ 2,\\ 3$，四次式最高次係數為正，最右段為正，依序變號：$(+)(−)(+)(−)(+)$。\n取 $\\ge 0$ 的段（含端點）：$x\\le -2$、$-1\\le x\\le 2$、$x\\ge 3$。", "skills": ["四次因式不等式", "區間符號法"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（雙二次乘積的高次不等式）", "ref_id": null, "tags": ["高次不等式", "符號法"]}, {"id": "F1-6-L4-Q1", "layer": "L4", "type": "單選題", "stem": "設 $f(x)$ 為二次函數，且不等式 $f(x) > 0$ 的解為 $-2 < x < 4$，則 $f(2x) < 0$ 的解為？\n(1) $-1 < x < 2$　(2) $x < -1$ 或 $x > 2$　(3) $x < -2$ 或 $x > 4$　(4) $-4 < x < 8$　(5) $x < -4$ 或 $x > 8$", "answer": "(2) $x < -1$ 或 $x > 2$", "solution": "$f(x)>0 \\iff -2<x<4$，故 $f(x)<0 \\iff x<-2$ 或 $x>4$。\n以 $2x$ 代 $x$：$f(2x)<0 \\iff 2x<-2$ 或 $2x>4 \\iff x<-1$ 或 $x>2$。選 (2)。", "skills": ["不等式解集變數變換"], "difficulty_star": 3, "bloom": "分析", "source_kind": "原題", "source": "86 學測 第 3 題", "ref_id": "PIN-013", "tags": ["學測", "二次不等式", "變數變換"]}, {"id": "F1-6-L4-Q2", "layer": "L4", "type": "填充題", "stem": "不等式 $(x^2 - 4x + 2)(2x - 5)(2x - 37) \\le 0$ 有多少個整數解？", "answer": "$17$ 個", "solution": "零點：$x^2-4x+2=0 \\Rightarrow x=2\\pm\\sqrt2\\approx 0.59,\\ 3.41$；$2x-5=0\\Rightarrow x=2.5$；$2x-37=0\\Rightarrow x=18.5$。\n四個零點把數線分段，依區間符號法，乘積 $\\le 0$ 的範圍為 $[2-\\sqrt2,\\ 2.5]\\cup[2+\\sqrt2,\\ 18.5]$。\n整數解：前段 $\\{1,\\ 2\\}$ 共 2 個；後段 $\\{4,5,\\dots,18\\}$ 共 15 個。合計 $17$ 個。", "skills": ["高次因式不等式", "區間符號法", "整數解計數"], "difficulty_star": 4, "bloom": "應用", "source_kind": "原題", "source": "92 學測補考 第 16 題", "ref_id": "PIN-014", "tags": ["學測", "高次不等式", "整數解"]}, {"id": "F1-6-L4-Q3", "layer": "L4", "type": "多選題", "stem": "對於下列哪些選項，可以找到實數 $a$，使得選項裡所有的數都同時滿足一元二次不等式 $x^2 + (2 - a)x - 2a < 0$？\n(1) $-1,\\ 0$\n(2) $1,\\ 2,\\ 3,\\ \\dots$（所有正整數）\n(3) $-3,\\ -4,\\ -5,\\ \\dots$（所有小於 $-2$ 的整數）\n(4) $97,\\ 2008$\n(5) $-\\pi,\\ \\pi$", "answer": "(1)(4)", "solution": "因式分解：$x^2+(2-a)x-2a=(x-a)(x+2)<0$。\n依 $a$ 與 $-2$ 大小：$a>-2$ 時解為 $-2<x<a$；$a<-2$ 時解為 $a<x<-2$。\n解集必為以 $-2$ 為一端、$a$ 為另一端的「有界開區間」。\n(1) $\\{-1,0\\}$ 都 $>-2$，取 $a$ 夠大即可 ✓。\n(2) 全體正整數無上界，需 $a=\\infty$，不可能 ✗。\n(3) 全體 $<-2$ 整數無下界，需 $a=-\\infty$ ✗。\n(4) $\\{97,2008\\}$ 都 $>-2$，取 $a>2008$ ✓。\n(5) $-\\pi\\approx-3.14<-2$，但 $\\pi>-2$，無法同時落在同一個含 $-2$ 為端點的區間 ✗。\n選 (1)(4)。", "skills": ["含參二次不等式", "解集結構分析", "存在性判斷"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "97 指考數乙 第 7 題", "ref_id": "PIN-096", "tags": ["指考", "含參不等式", "多選"]}, {"id": "F1-6-L4-Q4", "layer": "L4", "type": "多選題", "stem": "關於多項式不等式 $x^2(x+5)(x+1)(x-4)(x-7) < (2x-3)(x+5)(x+1)(x-4)(x-7)$，下列哪些選項是它的一個解？\n(1) $-2\\pi$　(2) $-\\pi$　(3) $\\pi$　(4) $2\\pi$", "answer": "(2)(4)", "solution": "移項並提公因式 $(x+5)(x+1)(x-4)(x-7)$：\\n$(x+5)(x+1)(x-4)(x-7)\\,[\\,x^2-(2x-3)\\,]<0$，即 $(x+5)(x+1)(x-4)(x-7)(x^2-2x+3)<0$。\\n$x^2-2x+3$ 判別式 $=4-12<0$ 且開口向上 $\\Rightarrow$ 恆正，可約去。\n化為 $(x+5)(x+1)(x-4)(x-7)<0$，零點 $-5,-1,4,7$。區間符號法取 $<0$ 段：$-5<x<-1$ 或 $4<x<7$。\n驗各選項：$-2\\pi\\approx-6.28$ ✗；$-\\pi\\approx-3.14\\in(-5,-1)$ ✓；$\\pi\\approx3.14$ ✗；$2\\pi\\approx6.28\\in(4,7)$ ✓。選 (2)(4)。", "skills": ["高次不等式", "恆正因式約去", "區間符號法"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "99 指考數乙 第 3 題", "ref_id": "PIN-097", "tags": ["指考", "高次不等式", "多選"]}, {"id": "F1-6-L4-Q5", "layer": "L4", "type": "多選題", "stem": "下列哪些多項式不等式的實數解恰為 $-1 < x < 3$？\n(1) $(x+1)(x-3) < 0$\n(2) $x^2(x+1)(x-3) < 0$\n(3) $(x+1)^3(x-3) < 0$\n(4) $(x+1)(x-3)(x^2-x+1) < 0$\n(5) $(x+1)(x-3)(x^3+4) < 0$", "answer": "(1)(3)(4)", "solution": "基準：$(x+1)(x-3)<0 \\iff -1<x<3$。\n(1) ✓。\n(2) $x^2\\ge 0$ 須挖去 $x=0$，解為 $-1<x<3$ 且 $x\\ne 0$，非整段 ✗。\n(3) $(x+1)^3$ 與 $(x+1)$ 同號，解同基準 $-1<x<3$ ✓。\n(4) $x^2-x+1$ 判別式 $<0$ 恆正，可約去，解同基準 ✓。\n(5) $x^3+4$ 多一實零點 $x=-\\sqrt[3]{4}$，使解集多出一段 ✗。\n選 (1)(3)(4)。", "skills": ["解集比較", "偶次因式", "恆正因式"], "difficulty_star": 3, "bloom": "分析", "source_kind": "原題", "source": "108 學測 數A 第1次模考（E1）多11", "ref_id": "PIN-123", "tags": ["模考", "高次不等式", "多選"]}, {"id": "F1-6-L4-Q6", "layer": "L4", "type": "單選題", "stem": "已知 $x$ 為實數，不等式 $(2x^2 + x + 1)(-x^2 + mx + n) \\ge 0$ 的解為 $3 \\le x \\le 7$，則 $m + n$ 的值為？\n(1) $-11$　(2) $11$　(3) $-31$　(4) $31$　(5) $0$", "answer": "(1) $-11$", "solution": "$2x^2+x+1$ 判別式 $1-8<0$ 且開口向上 $\\Rightarrow$ 恆正，可約去。\n故原不等式 $\\iff -x^2+mx+n\\ge 0$，其解為 $3\\le x\\le 7$。\n解為 $[3,7]$ 的二次（開口向下）：$-(x-3)(x-7)\\ge 0$，即 $-x^2+10x-21\\ge 0$。\n比較得 $m=10,\\ n=-21$，$m+n=-11$。選 (1)。", "skills": ["恆正因式約去", "解集反推係數"], "difficulty_star": 3, "bloom": "應用", "source_kind": "原題", "source": "109 學測 數A 第4次模考（南一）單1", "ref_id": "PIN-128", "tags": ["模考", "二次不等式", "解集反推"]}], "related_nodes": ["F1-4", "F1-5", "F3-1"], "remediation_tip": "若本節 ≥3 題錯，回看講義 §一-6「多項式不等式」（P.13-15）。核心：先因式分解→數線標根→區間符號法判正負；首項為負先變號；判別式<0 的二次因式恆正（可約去）；偶次因式只挖點不改號。整數解、解集反推係數、含參存在性為高頻變化題型。本節僅處理實根，不用勘根定理。"}, {"code": "F2-1", "name": "狹義三角函數", "section": "二、三角函數", "section_color": "blue", "difficulty_grade": "冷門", "handout_page": "三角-1~2", "concepts": ["直角三角形中 sinθ=對邊/斜邊、cosθ=鄰邊/斜邊、tanθ=對邊/鄰邊", "餘割 cscθ=1/sinθ、正割 secθ=1/cosθ、餘切 cotθ=1/tanθ", "畢氏定理連結三邊；已知一三角函數值可求其餘（銳角）", "互餘關係 sin(90°−θ)=cosθ 等"], "question_count": 5, "layer_distribution": {"L1": 1, "L2": 2, "L3": 1, "L4": 1}, "_curriculum_note": "108課綱必修；排除反三角函數、和差化積/積化和差（選修數甲）。", "questions": [{"id": "F2-1-L1-Q1", "layer": "L1", "type": "填充題", "stem": "直角三角形中，$\\theta$ 的對邊長 $3$、鄰邊長 $4$、斜邊長 $5$。求 $\\sin\\theta,\\ \\cos\\theta,\\ \\tan\\theta$。", "answer": "$\\sin\\theta=\\dfrac{3}{5},\\ \\cos\\theta=\\dfrac{4}{5},\\ \\tan\\theta=\\dfrac{3}{4}$", "solution": "依定義：$\\sin\\theta=\\dfrac{\\text{對邊}}{\\text{斜邊}}=\\dfrac{3}{5}$，$\\cos\\theta=\\dfrac{\\text{鄰邊}}{\\text{斜邊}}=\\dfrac{4}{5}$，$\\tan\\theta=\\dfrac{\\text{對邊}}{\\text{鄰邊}}=\\dfrac{3}{4}$。", "skills": ["三角函數定義"], "difficulty_star": 1, "bloom": "記憶", "source_kind": "原題", "source": "教材標準例（3-4-5 直角三角形）", "ref_id": null, "tags": ["狹義三角函數", "定義"]}, {"id": "F2-1-L2-Q1", "layer": "L2", "type": "填充題", "stem": "設 $\\theta$ 為銳角且 $\\sin\\theta=\\dfrac{5}{13}$。求 $\\cos\\theta$ 與 $\\tan\\theta$。", "answer": "$\\cos\\theta=\\dfrac{12}{13},\\ \\tan\\theta=\\dfrac{5}{12}$", "solution": "由 $\\sin^2\\theta+\\cos^2\\theta=1$（$\\theta$ 銳角，$\\cos\\theta>0$）：$\\cos\\theta=\\sqrt{1-\\tfrac{25}{169}}=\\dfrac{12}{13}$。\\n$\\tan\\theta=\\dfrac{\\sin\\theta}{\\cos\\theta}=\\dfrac{5/13}{12/13}=\\dfrac{5}{12}$。（即 5-12-13 直角三角形。）", "skills": ["畢氏關係", "由一值求其餘"], "difficulty_star": 2, "bloom": "理解", "source_kind": "原題", "source": "段考常見基本題型", "ref_id": null, "tags": ["狹義三角函數"]}, {"id": "F2-1-L2-Q2", "layer": "L2", "type": "填充題", "stem": "一梯子斜靠牆面，梯長 $6$ 公尺，與地面的夾角為 $60°$。求梯子頂端離地的高度。", "answer": "$3\\sqrt{3}$ 公尺", "solution": "高度為對邊：$6\\sin 60°=6\\cdot\\dfrac{\\sqrt3}{2}=3\\sqrt3$（公尺）。", "skills": ["三角函數定義應用"], "difficulty_star": 2, "bloom": "應用", "source_kind": "改編", "source": "改編（直角三角形實際情境）", "ref_id": null, "tags": ["狹義三角函數", "應用"]}, {"id": "F2-1-L3-Q1", "layer": "L3", "type": "填充題", "stem": "設 $\\theta$ 為銳角且 $\\tan\\theta=2$。求 $\\dfrac{\\sin\\theta+\\cos\\theta}{\\sin\\theta-\\cos\\theta}$。", "answer": "$3$", "solution": "分子分母同除以 $\\cos\\theta$：$\\dfrac{\\sin\\theta+\\cos\\theta}{\\sin\\theta-\\cos\\theta}=\\dfrac{\\tan\\theta+1}{\\tan\\theta-1}=\\dfrac{2+1}{2-1}=3$。", "skills": ["齊次式除 cosθ", "tan 轉換"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（齊次三角式化為 tan）", "ref_id": null, "tags": ["狹義三角函數", "齊次式"]}, {"id": "F2-1-L4-Q1", "layer": "L4", "type": "單選題", "stem": "有一等腰三角形底邊為 $10$，頂角 $72°$。下列何者可以表示腰長？\n(1) $5\\sin 36°$　(2) $5\\tan 36°$　(3) $5\\cot 36°$　(4) $5\\sec 36°$　(5) $5\\csc 36°$", "answer": "(5) $5\\csc 36°$", "solution": "自頂點向底邊作高，將等腰三角形分成兩個全等直角三角形：底邊一半 $=5$，頂角一半 $=36°$。\n在該直角三角形中，$\\sin 36°=\\dfrac{5}{\\text{腰}}$，故腰 $=\\dfrac{5}{\\sin 36°}=5\\csc 36°$。選 (5)。", "skills": ["三角函數定義", "等腰三角形分割"], "difficulty_star": 3, "bloom": "應用", "source_kind": "原題", "source": "89 學測 第 1 題", "ref_id": "TRI-120", "tags": ["學測", "狹義三角函數"]}], "related_nodes": ["F2-2", "F2-3"], "remediation_tip": "若本節 ≥2 題錯，回看講義「狹義三角函數」。核心：sin/cos/tan 三邊比定義、畢氏關係由一值求其餘、齊次式同除 cosθ 化為 tan。"}, {"code": "F2-2", "name": "廣義三角函數（含極坐標）", "section": "二、三角函數", "section_color": "blue", "difficulty_grade": "冷門", "handout_page": "三角-3~4", "concepts": ["坐標定義：終邊上一點 P(x,y)，r=√(x²+y²)，sinθ=y/r、cosθ=x/r、tanθ=y/x", "各象限正負（ASTC）：I 全正、II 僅 sin、III 僅 tan、IV 僅 cos", "廣義特別角（120°,135°,150°,210°…）以參考角與象限符號求值", "極坐標 (r,θ) 與直角坐標 (x,y) 互換：x=r cosθ, y=r sinθ"], "question_count": 5, "layer_distribution": {"L1": 1, "L2": 2, "L3": 1, "L4": 1}, "_curriculum_note": "108課綱必修；排除反三角函數、和差化積/積化和差（選修數甲）。", "questions": [{"id": "F2-2-L1-Q1", "layer": "L1", "type": "填充題", "stem": "設角 $\\theta$ 的終邊通過點 $P(-3,\\ 4)$。求 $\\sin\\theta,\\ \\cos\\theta,\\ \\tan\\theta$。", "answer": "$\\sin\\theta=\\dfrac{4}{5},\\ \\cos\\theta=-\\dfrac{3}{5},\\ \\tan\\theta=-\\dfrac{4}{3}$", "solution": "$r=\\sqrt{(-3)^2+4^2}=5$。\\n$\\sin\\theta=\\dfrac{y}{r}=\\dfrac{4}{5}$，$\\cos\\theta=\\dfrac{x}{r}=-\\dfrac{3}{5}$，$\\tan\\theta=\\dfrac{y}{x}=-\\dfrac{4}{3}$。", "skills": ["廣義角坐標定義"], "difficulty_star": 1, "bloom": "記憶", "source_kind": "原題", "source": "教材標準例（終邊上一點）", "ref_id": null, "tags": ["廣義三角函數", "定義"]}, {"id": "F2-2-L2-Q1", "layer": "L2", "type": "填充題", "stem": "求 $\\sin 120°$、$\\cos 135°$、$\\tan 240°$。", "answer": "$\\sin120°=\\dfrac{\\sqrt3}{2},\\ \\cos135°=-\\dfrac{\\sqrt2}{2},\\ \\tan240°=\\sqrt3$", "solution": "用參考角與象限符號：\\n$\\sin120°=\\sin(180°-60°)=\\sin60°=\\dfrac{\\sqrt3}{2}$（II 象限 sin>0）。\\n$\\cos135°=-\\cos45°=-\\dfrac{\\sqrt2}{2}$（II 象限 cos<0）。\\n$\\tan240°=\\tan(180°+60°)=\\tan60°=\\sqrt3$（III 象限 tan>0）。", "skills": ["參考角", "象限符號"], "difficulty_star": 2, "bloom": "理解", "source_kind": "原題", "source": "段考常見基本題型（廣義特別角）", "ref_id": null, "tags": ["廣義三角函數", "特別角"]}, {"id": "F2-2-L2-Q2", "layer": "L2", "type": "填充題", "stem": "將極坐標 $\\left(4,\\ \\dfrac{2\\pi}{3}\\right)$ 化為直角坐標。", "answer": "$(-2,\\ 2\\sqrt3)$", "solution": "$x=r\\cos\\theta=4\\cos120°=4\\cdot(-\\tfrac12)=-2$；$y=r\\sin\\theta=4\\sin120°=4\\cdot\\dfrac{\\sqrt3}{2}=2\\sqrt3$。\n故直角坐標為 $(-2,\\ 2\\sqrt3)$。", "skills": ["極坐標↔直角坐標"], "difficulty_star": 2, "bloom": "應用", "source_kind": "改編", "source": "改編（極坐標轉換）", "ref_id": null, "tags": ["極坐標", "坐標轉換"]}, {"id": "F2-2-L3-Q1", "layer": "L3", "type": "填充題", "stem": "設 $\\theta$ 為第二象限角且 $\\cos\\theta=-\\dfrac{3}{5}$。求 $\\sin\\theta+\\tan\\theta$。", "answer": "$-\\dfrac{8}{15}$", "solution": "第二象限 $\\sin\\theta>0$：$\\sin\\theta=\\sqrt{1-\\cos^2\\theta}=\\sqrt{1-\\tfrac{9}{25}}=\\dfrac{4}{5}$。\\n$\\tan\\theta=\\dfrac{\\sin\\theta}{\\cos\\theta}=\\dfrac{4/5}{-3/5}=-\\dfrac{4}{3}$。\\n$\\sin\\theta+\\tan\\theta=\\dfrac{4}{5}-\\dfrac{4}{3}=\\dfrac{12-20}{15}=-\\dfrac{8}{15}$。", "skills": ["象限判號", "畢氏關係"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（象限符號＋畢氏關係）", "ref_id": null, "tags": ["廣義三角函數", "象限"]}, {"id": "F2-2-L4-Q1", "layer": "L4", "type": "單選題", "stem": "下列哪一個選項的數值最接近 $\\cos(2.6\\pi)$？\n(1) $\\sin(2.6\\pi)$　(2) $\\tan(2.6\\pi)$　(3) $\\cot(2.6\\pi)$　(4) $\\sec(2.6\\pi)$　(5) $\\csc(2.6\\pi)$", "answer": "(3) $\\cot(2.6\\pi)$", "solution": "$2.6\\pi=2\\pi+0.6\\pi$，與 $0.6\\pi=108°$ 同界，位於第二象限。\\n$\\cos(2.6\\pi)=\\cos108°\\approx-0.309$。各選項：$\\sin\\approx0.951$、$\\tan\\approx-3.08$、$\\cot\\approx-0.325$、$\\sec\\approx-3.24$、$\\csc\\approx1.05$。\n與 $-0.309$ 最接近者為 $\\cot(2.6\\pi)\\approx-0.325$，選 (3)。", "skills": ["廣義角化簡", "各三角函數值比較"], "difficulty_star": 3, "bloom": "分析", "source_kind": "原題", "source": "105 指考數甲 第 2 題", "ref_id": "PLR-001", "tags": ["指考", "廣義三角函數"]}], "related_nodes": ["F2-1", "F2-3"], "remediation_tip": "若本節 ≥2 題錯，回看講義「廣義三角函數與極坐標」。核心：坐標定義 sinθ=y/r 等、ASTC 各象限正負、參考角求廣義特別角、極坐標與直角坐標互換。"}, {"code": "F2-3", "name": "特別角函數值", "section": "二、三角函數", "section_color": "blue", "difficulty_grade": "冷門", "handout_page": "三角-2~3", "concepts": ["30°,45°,60° 的 sin/cos/tan 標準值（含 0°,90° 邊界）", "sin30°=1/2, sin45°=√2/2, sin60°=√3/2；cos 反序；tan30°=√3/3, tan45°=1, tan60°=√3", "特別角值的四則組合與化簡", "畢氏恆等式 sin²θ+cos²θ=1、1+tan²θ=sec² 於特別角的應用"], "question_count": 5, "layer_distribution": {"L1": 1, "L2": 2, "L3": 1, "L4": 1}, "_curriculum_note": "108課綱必修；排除反三角函數、和差化積/積化和差（選修數甲）。", "questions": [{"id": "F2-3-L1-Q1", "layer": "L1", "type": "填充題", "stem": "求 $\\sin 30° + \\cos 60° + \\tan 45°$。", "answer": "$2$", "solution": "$\\sin30°=\\dfrac12,\\ \\cos60°=\\dfrac12,\\ \\tan45°=1$。\n相加 $=\\dfrac12+\\dfrac12+1=2$。", "skills": ["特別角值"], "difficulty_star": 1, "bloom": "記憶", "source_kind": "原題", "source": "教材標準例（特別角值）", "ref_id": null, "tags": ["特別角"]}, {"id": "F2-3-L2-Q1", "layer": "L2", "type": "填充題", "stem": "求 $2\\sin 30°\\cos 30°$ 的值。", "answer": "$\\dfrac{\\sqrt3}{2}$", "solution": "$2\\sin30°\\cos30°=2\\cdot\\dfrac12\\cdot\\dfrac{\\sqrt3}{2}=\\dfrac{\\sqrt3}{2}$。", "skills": ["特別角值", "乘積化簡"], "difficulty_star": 2, "bloom": "理解", "source_kind": "原題", "source": "段考常見基本題型", "ref_id": null, "tags": ["特別角"]}, {"id": "F2-3-L2-Q2", "layer": "L2", "type": "填充題", "stem": "求 $\\tan 30° + \\tan 60°$（化為最簡根式）。", "answer": "$\\dfrac{4\\sqrt3}{3}$", "solution": "$\\tan30°=\\dfrac{\\sqrt3}{3},\\ \\tan60°=\\sqrt3$。\\n$\\tan30°+\\tan60°=\\dfrac{\\sqrt3}{3}+\\sqrt3=\\dfrac{\\sqrt3+3\\sqrt3}{3}=\\dfrac{4\\sqrt3}{3}$。", "skills": ["特別角值", "根式化簡"], "difficulty_star": 2, "bloom": "應用", "source_kind": "改編", "source": "改編（特別角 tan 之和）", "ref_id": null, "tags": ["特別角"]}, {"id": "F2-3-L3-Q1", "layer": "L3", "type": "填充題", "stem": "求 $\\sin 30°\\cos 60° + \\cos 30°\\sin 60°$ 的值。", "answer": "$1$", "solution": "直接代入特別角值：$\\sin30°\\cos60°=\\dfrac12\\cdot\\dfrac12=\\dfrac14$；$\\cos30°\\sin60°=\\dfrac{\\sqrt3}{2}\\cdot\\dfrac{\\sqrt3}{2}=\\dfrac34$。\n相加 $=\\dfrac14+\\dfrac34=1$。", "skills": ["特別角值組合"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（特別角乘積之和）", "ref_id": null, "tags": ["特別角", "組合"]}, {"id": "F2-3-L4-Q1", "layer": "L4", "type": "單選題", "stem": "坐標平面上兩直線之斜率分別為 $\\sqrt3$ 及 $\\dfrac{1}{\\sqrt3}$，則下列何者為其一交角？\n(1) $30°$　(2) $36°$　(3) $45°$　(4) $60°$　(5) $90°$", "answer": "(1) $30°$", "solution": "直線斜率即傾斜角的 $\\tan$ 值：$\\tan\\alpha=\\sqrt3\\Rightarrow\\alpha=60°$；$\\tan\\beta=\\dfrac{1}{\\sqrt3}\\Rightarrow\\beta=30°$。\n兩直線交角為傾斜角之差 $60°-30°=30°$，選 (1)。", "skills": ["特別角 tan 值", "直線傾斜角"], "difficulty_star": 3, "bloom": "應用", "source_kind": "原題", "source": "86 學測 第 1 題", "ref_id": "TRI-110", "tags": ["學測", "特別角", "傾斜角"]}], "related_nodes": ["F2-1", "F2-2"], "remediation_tip": "若本節 ≥2 題錯，回看講義「特別角函數值」。核心：30/45/60 度三角值務必熟記，並能做四則組合與根式化簡。"}, {"code": "F2-5", "name": "正弦定理與餘弦定理（含三角測量應用）", "section": "二、三角函數", "section_color": "blue", "difficulty_grade": "熱門", "handout_page": "三角-5~6", "concepts": ["正弦定理 a/sinA=b/sinB=c/sinC=2R（R 為外接圓半徑）", "餘弦定理 c²=a²+b²−2ab·cosC，及其變形 cosC=(a²+b²−c²)/(2ab)", "解三角形：已知 SSS/SAS/AAS/ASA 求其餘邊角", "三角測量：仰角、俯角、方位角的實際情境（情境單純化）", "外接圓半徑與弦長 2√(R²−d²) 的連結"], "question_count": 15, "layer_distribution": {"L1": 2, "L2": 4, "L3": 3, "L4": 6}, "_curriculum_note": "108課綱必修；三角測量限單純實際情境，排除反三角等選修項。", "questions": [{"id": "F2-5-L1-Q1", "layer": "L1", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，$b=3,\\ c=5,\\ \\angle A=60°$。求 $a$。", "answer": "$a=\\sqrt{19}$", "solution": "餘弦定理：$a^2=b^2+c^2-2bc\\cos A=9+25-2\\cdot3\\cdot5\\cdot\\dfrac12=34-15=19$，故 $a=\\sqrt{19}$。", "skills": ["餘弦定理求邊"], "difficulty_star": 1, "bloom": "記憶", "source_kind": "原題", "source": "教材標準例（餘弦定理）", "ref_id": null, "tags": ["餘弦定理"]}, {"id": "F2-5-L1-Q2", "layer": "L1", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，$\\angle A=30°,\\ \\angle B=45°,\\ a=10$。求 $b$。", "answer": "$b=10\\sqrt{2}$", "solution": "正弦定理：$\\dfrac{a}{\\sin A}=\\dfrac{b}{\\sin B}\\Rightarrow b=\\dfrac{a\\sin B}{\\sin A}=\\dfrac{10\\cdot\\frac{\\sqrt2}{2}}{\\frac12}=10\\sqrt2$。", "skills": ["正弦定理求邊"], "difficulty_star": 1, "bloom": "理解", "source_kind": "原題", "source": "教材標準例（正弦定理）", "ref_id": null, "tags": ["正弦定理"]}, {"id": "F2-5-L2-Q1", "layer": "L2", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，$a=7,\\ b=5,\\ c=3$。求最大內角 $\\angle A$。", "answer": "$\\angle A=120°$", "solution": "最大邊 $a=7$ 對最大角 $A$。餘弦定理：$\\cos A=\\dfrac{b^2+c^2-a^2}{2bc}=\\dfrac{25+9-49}{2\\cdot5\\cdot3}=\\dfrac{-15}{30}=-\\dfrac12$。\n故 $\\angle A=120°$。", "skills": ["餘弦定理求角"], "difficulty_star": 2, "bloom": "理解", "source_kind": "原題", "source": "段考常見基本題型（餘弦定理求角）", "ref_id": null, "tags": ["餘弦定理"]}, {"id": "F2-5-L2-Q2", "layer": "L2", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，$a=6,\\ \\angle A=30°$。求其外接圓半徑 $R$。", "answer": "$R=6$", "solution": "正弦定理：$\\dfrac{a}{\\sin A}=2R\\Rightarrow 2R=\\dfrac{6}{\\sin30°}=\\dfrac{6}{1/2}=12$，故 $R=6$。", "skills": ["正弦定理", "外接圓半徑"], "difficulty_star": 2, "bloom": "應用", "source_kind": "原題", "source": "段考常見基本題型（外接圓半徑）", "ref_id": null, "tags": ["正弦定理", "外接圓"]}, {"id": "F2-5-L2-Q3", "layer": "L2", "type": "填充題", "stem": "在距離塔底 $100$ 公尺的水平地面上一點，測得塔頂的仰角為 $30°$。求塔高（塔底與觀測點同高）。", "answer": "$\\dfrac{100\\sqrt3}{3}$ 公尺", "solution": "塔高 $=100\\tan30°=100\\cdot\\dfrac{\\sqrt3}{3}=\\dfrac{100\\sqrt3}{3}$（公尺）。", "skills": ["三角測量", "仰角"], "difficulty_star": 2, "bloom": "應用", "source_kind": "改編", "source": "改編（仰角測高）", "ref_id": null, "tags": ["三角測量", "仰角"]}, {"id": "F2-5-L2-Q4", "layer": "L2", "type": "填充題", "stem": "兩船同時自港口出發，航向夾角 $60°$，甲船航行 $30$ 公里、乙船航行 $40$ 公里。求此時兩船的距離。", "answer": "$10\\sqrt{13}$ 公里", "solution": "餘弦定理：$d^2=30^2+40^2-2\\cdot30\\cdot40\\cos60°=900+1600-2400\\cdot\\dfrac12=2500-1200=1300$。\\n$d=\\sqrt{1300}=10\\sqrt{13}$（公里）。", "skills": ["餘弦定理應用", "方位"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（夾角航行求距離）", "ref_id": null, "tags": ["餘弦定理", "應用"]}, {"id": "F2-5-L3-Q1", "layer": "L3", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，三邊長為 $5,\\ 7,\\ 8$。求最大內角的餘弦值。", "answer": "$\\dfrac{1}{7}$", "solution": "最大角對最大邊 $8$。設其對角為 $C$，鄰兩邊 $5,7$：\\n$\\cos C=\\dfrac{5^2+7^2-8^2}{2\\cdot5\\cdot7}=\\dfrac{25+49-64}{70}=\\dfrac{10}{70}=\\dfrac{1}{7}$。", "skills": ["餘弦定理求角", "最大角判定"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（最大角餘弦）", "ref_id": null, "tags": ["餘弦定理"]}, {"id": "F2-5-L3-Q2", "layer": "L3", "type": "填充題", "stem": "觀測者在水平地面測得山頂仰角 $30°$，朝山的方向前進 $100$ 公尺後，再測得山頂仰角 $45°$。求山高（觀測者眼高忽略）。", "answer": "$(50 + 50\\sqrt{3})$ 公尺", "solution": "設山高 $h$，第二測點到山腳水平距 $x$。由 $45°$：$h=x\\tan45°=x$。\n由 $30°$（距離 $x+100$）：$h=(x+100)\\tan30°=\\dfrac{x+100}{\\sqrt3}$。\n令兩式相等：$\\sqrt3\\,x=x+100\\Rightarrow x(\\sqrt3-1)=100\\Rightarrow x=\\dfrac{100}{\\sqrt3-1}=50(\\sqrt3+1)$。\n故 $h=x=50\\sqrt3+50$（公尺）。", "skills": ["三角測量", "兩次仰角", "聯立"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（前進後二次仰角測高）", "ref_id": null, "tags": ["三角測量", "仰角"]}, {"id": "F2-5-L3-Q3", "layer": "L3", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，$a=3,\\ b=5,\\ \\angle C=120°$。求 $c$ 與 $\\sin A$。", "answer": "$c=7,\\ \\sin A=\\dfrac{3\\sqrt3}{14}$", "solution": "餘弦定理：$c^2=a^2+b^2-2ab\\cos C=9+25-2\\cdot15\\cdot(-\\tfrac12)=34+15=49\\Rightarrow c=7$。\n正弦定理：$\\sin A=\\dfrac{a\\sin C}{c}=\\dfrac{3\\cdot\\frac{\\sqrt3}{2}}{7}=\\dfrac{3\\sqrt3}{14}$。", "skills": ["餘弦定理", "正弦定理", "綜合解三角形"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（SAS 求邊再求角）", "ref_id": null, "tags": ["餘弦定理", "正弦定理"]}, {"id": "F2-5-L4-Q1", "layer": "L4", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，$\\angle C=60°$，$\\overline{AC}=3000$ 公尺，$\\overline{BC}=2000$ 公尺，則 $\\angle A\\approx$ 幾度？（四捨五入到整數度；$\\sqrt7\\approx2.646,\\ \\sqrt{21}\\approx4.583$）", "answer": "$41$ 度", "solution": "設 $c=\\overline{AB}$。餘弦定理：$c^2=2000^2+3000^2-2\\cdot2000\\cdot3000\\cos60°=7{,}000{,}000\\Rightarrow c=1000\\sqrt7$。\n正弦定理：$\\sin A=\\dfrac{a\\sin C}{c}=\\dfrac{2000\\cdot\\frac{\\sqrt3}{2}}{1000\\sqrt7}=\\dfrac{\\sqrt3}{\\sqrt7}=\\dfrac{\\sqrt{21}}{7}\\approx0.655$。\\n$\\angle A\\approx40.9°\\approx41°$。", "skills": ["餘弦定理", "正弦定理"], "difficulty_star": 3, "bloom": "應用", "source_kind": "原題", "source": "88 學測 第 16 題", "ref_id": "TRI-119", "tags": ["學測", "餘弦定理", "正弦定理"]}, {"id": "F2-5-L4-Q2", "layer": "L4", "type": "填充題", "stem": "設銳角三角形 $ABC$ 的外接圓半徑為 $8$。已知外接圓圓心到 $\\overline{AB}$ 的距離為 $2$、到 $\\overline{BC}$ 的距離為 $7$，求 $\\overline{AC}$。", "answer": "$4\\sqrt{15}$", "solution": "弦長 $=2\\sqrt{R^2-d^2}$：$\\overline{AB}=2\\sqrt{64-4}=4\\sqrt{15}$，$\\overline{BC}=2\\sqrt{64-49}=2\\sqrt{15}$。\n設 $a=\\overline{BC}=2\\sqrt{15},\\ c=\\overline{AB}=4\\sqrt{15}$，由 $\\dfrac{a}{\\sin A}=2R=16$：$\\sin A=\\dfrac{\\sqrt{15}}{8}$（銳角 $\\cos A=\\dfrac78$）；$\\sin C=\\dfrac{c}{2R}=\\dfrac{\\sqrt{15}}{4}$（銳角 $\\cos C=\\dfrac14$）。\\n$\\sin B=\\sin(A+C)=\\sin A\\cos C+\\cos A\\sin C=\\dfrac{\\sqrt{15}}{32}+\\dfrac{7\\sqrt{15}}{32}=\\dfrac{\\sqrt{15}}{4}$。\\n$\\overline{AC}=b=2R\\sin B=16\\cdot\\dfrac{\\sqrt{15}}{4}=4\\sqrt{15}$。", "skills": ["外接圓弦長", "正弦定理", "和角"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "102 學測 第 13-20 題（填G）", "ref_id": "TRI-152", "tags": ["學測", "正弦定理", "外接圓"]}, {"id": "F2-5-L4-Q3", "layer": "L4", "type": "單選題", "stem": "莎韻觀測遠方等速率垂直上升的熱氣球。10:00 仰角 $30°$，10:10 仰角 $34°$。用三角函數表判斷 10:30 時熱氣球的仰角最接近？\n(1) $39°$　(2) $40°$　(3) $41°$　(4) $42°$　(5) $43°$", "answer": "(3) $41°$", "solution": "設水平距 $d$。10:00 高 $h_0=d\\tan30°\\approx0.577d$；10:10 高 $h_1=d\\tan34°\\approx0.675d$，10 分鐘升 $\\approx0.098d$。\n再過 20 分鐘到 10:30，高 $h_2\\approx0.675d+2\\cdot0.098d\\approx0.871d$。$\\tan\\theta\\approx0.871\\Rightarrow\\theta\\approx41°$，選 (3)。", "skills": ["三角測量", "仰角", "等速率變化"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "102 學測 第 6 題", "ref_id": "TRI-151", "tags": ["學測", "三角測量", "仰角"]}, {"id": "F2-5-L4-Q4", "layer": "L4", "type": "多選題", "stem": "在 $\\triangle ABC$ 中已知 $\\overline{AB}=4$、$\\overline{AC}=6$，尚不足以確定三角形。下列再加哪些條件，即可確定唯一的 $\\triangle ABC$？\n(1) 再知道 $\\cos A$　(2) 再知道 $\\cos B$　(3) 再知道 $\\cos C$　(4) 再知道三角形面積　(5) 再知道外接圓半徑", "answer": "(1)(2)(5)", "solution": "設 $\\overline{BC}=a$，$\\overline{AB}=c=4$（對 $C$），$\\overline{AC}=b=6$（對 $B$）。\n(1) 知夾角 $A$ 即 SAS，唯一。✓\n(2) 知 $B$：$b^2=a^2+c^2-2ac\\cos B\\Rightarrow a^2-8\\cos B\\,a-20=0$，兩根之積 $-20<0$，恰一正根，唯一。✓\n(3) 知 $C$：$c^2=a^2+b^2-2ab\\cos C\\Rightarrow a^2-12\\cos C\\,a+20=0$，兩根之積 $20>0$，當 $\\cos C$ 夠大時有兩正根，可能不唯一。✗\n(4) 面積亦可能對應兩種三角形，✗。\n(5) 知外接圓半徑 $R$ 配合兩定邊可定角，唯一。✓\n選 (1)(2)(5)。", "skills": ["解三角形唯一性", "餘弦定理", "SAS/SSA"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "110 學測 第 10 題", "ref_id": "TRI-166", "tags": ["學測", "解三角形", "多選"]}, {"id": "F2-5-L4-Q5", "layer": "L4", "type": "單選題", "stem": "地面上甲、乙兩大樓水平距離 $150$ 公尺，甲較高。從甲樓頂測得乙樓頂的俯角為 $22°$。若在兩樓頂之間拉一直線繩索，則繩索長度最接近？\n(1) $150$　(2) $150\\sin22°$　(3) $150\\cos22°$　(4) $\\dfrac{150}{\\cos22°}$　(5) $\\dfrac{150}{\\sin22°}$", "answer": "(4) $\\dfrac{150}{\\cos22°}$", "solution": "俯角 $22°$ 即繩索（視線）與水平線的夾角為 $22°$。水平距 $150$ 為鄰邊、繩索為斜邊：\\n$\\cos22°=\\dfrac{150}{\\text{繩長}}\\Rightarrow\\text{繩長}=\\dfrac{150}{\\cos22°}$，選 (4)。", "skills": ["三角測量", "俯角"], "difficulty_star": 3, "bloom": "應用", "source_kind": "原題", "source": "112 學測B 第 3 題", "ref_id": "TRI-171", "tags": ["學測", "三角測量", "俯角"]}, {"id": "F2-5-L4-Q6", "layer": "L4", "type": "多選題", "stem": "對任一正整數 $n\\ge2$，令 $T_n$ 表邊長為 $n,\\ n+1,\\ n+2$ 的三角形。試選出正確的選項。\n(1) $T_n$ 皆為銳角三角形\n(2) $T_2,T_3,\\dots,T_{10}$ 的周長形成等差數列\n(3) $T_n$ 的面積隨 $n$ 增大而增大\n(4) $T_5$ 的三高依序形成等差數列\n(5) $T_3$ 的最大角大於 $T_2$ 的最大角", "answer": "(2)(3)", "solution": "(1) $T_2$（邊 $2,3,4$）最大角餘弦 $=\\dfrac{4+9-16}{12}=-\\dfrac14<0$ 為鈍角，✗。\n(2) 周長 $=3n+3$，公差 $3$，等差，✓。\n(3) 用海龍公式計算，面積隨 $n$ 嚴格遞增（$T_2\\approx2.9<T_3=6<T_4\\approx9.9<\\dots$），✓。\n(4) $T_5$（邊 $5,6,7$）三高 $=\\dfrac{2\\cdot\\text{面積}}{\\text{邊}}$ 與邊成反比，反比不成等差，✗。\n(5) 最大角餘弦 $T_2=-\\dfrac14$、$T_3=0$（邊 $3,4,5$ 為直角），$T_3$ 最大角 $90°$ 反而**小於** $T_2$ 的鈍角，✗。\n選 (2)(3)。", "skills": ["餘弦定理", "海龍公式", "等差判定"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "113 學測A 第 8 題", "ref_id": "TRP-168", "tags": ["學測", "餘弦定理", "面積", "多選"]}], "related_nodes": ["F2-1", "F2-3", "F2-6"], "remediation_tip": "若本節 ≥3 題錯，回看講義「正弦定理與餘弦定理」。核心：正弦定理 a/sinA=2R、餘弦定理求邊與求角（cosC=(a²+b²−c²)/2ab）、解三角形唯一性、仰俯角三角測量。先把 L1/L2 標準題做熟再挑戰測量綜合題。"}, {"code": "F2-6", "name": "三角形面積公式（含三角測量應用）", "section": "二、三角函數", "section_color": "blue", "difficulty_grade": "熱門", "handout_page": "三角-6~7", "concepts": ["面積 = (1/2)ab·sinC（兩邊夾一角）", "海龍公式 K=√(s(s−a)(s−b)(s−c))，s=(a+b+c)/2", "外接圓半徑 R=abc/(4K)；內切圓半徑 r=K/s", "中線、角平分線用『面積分割相加』求長", "土地測量／四邊形面積以對角線或頂點分割成三角形求和"], "question_count": 15, "layer_distribution": {"L1": 2, "L2": 4, "L3": 3, "L4": 6}, "_curriculum_note": "108課綱必修；三角測量限單純情境，排除超綱（反三角、和差化積/積化和差、托勒密等）。", "questions": [{"id": "F2-6-L1-Q1", "layer": "L1", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，$a=6,\\ b=8,\\ \\angle C=30°$。求面積。", "answer": "$12$", "solution": "面積 $=\\dfrac12 ab\\sin C=\\dfrac12\\cdot6\\cdot8\\cdot\\sin30°=24\\cdot\\dfrac12=12$。", "skills": ["(1/2)absinC"], "difficulty_star": 1, "bloom": "記憶", "source_kind": "原題", "source": "教材標準例（夾角面積）", "ref_id": null, "tags": ["面積"]}, {"id": "F2-6-L1-Q2", "layer": "L1", "type": "填充題", "stem": "三邊長為 $3,\\ 4,\\ 5$ 的三角形面積為何？", "answer": "$6$", "solution": "海龍公式：$s=\\dfrac{3+4+5}{2}=6$，面積 $=\\sqrt{6(6-3)(6-4)(6-5)}=\\sqrt{6\\cdot3\\cdot2\\cdot1}=\\sqrt{36}=6$。（亦為 $3$-$4$-$5$ 直角三角形，$\\tfrac12\\cdot3\\cdot4=6$。）", "skills": ["海龍公式"], "difficulty_star": 1, "bloom": "理解", "source_kind": "原題", "source": "教材標準例（海龍公式）", "ref_id": null, "tags": ["面積", "海龍"]}, {"id": "F2-6-L2-Q1", "layer": "L2", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，$b=4,\\ c=6,\\ \\angle A=120°$。求面積。", "answer": "$6\\sqrt3$", "solution": "面積 $=\\dfrac12 bc\\sin A=\\dfrac12\\cdot4\\cdot6\\cdot\\sin120°=12\\cdot\\dfrac{\\sqrt3}{2}=6\\sqrt3$。", "skills": ["(1/2)absinC", "廣義角正弦"], "difficulty_star": 2, "bloom": "理解", "source_kind": "原題", "source": "段考常見基本題型", "ref_id": null, "tags": ["面積"]}, {"id": "F2-6-L2-Q2", "layer": "L2", "type": "填充題", "stem": "三邊長為 $5,\\ 6,\\ 7$ 的三角形面積為何？（化為最簡根式）", "answer": "$6\\sqrt6$", "solution": "海龍：$s=\\dfrac{5+6+7}{2}=9$，面積 $=\\sqrt{9(9-5)(9-6)(9-7)}=\\sqrt{9\\cdot4\\cdot3\\cdot2}=\\sqrt{216}=6\\sqrt6$。", "skills": ["海龍公式"], "difficulty_star": 2, "bloom": "應用", "source_kind": "原題", "source": "段考常見基本題型", "ref_id": null, "tags": ["面積", "海龍"]}, {"id": "F2-6-L2-Q3", "layer": "L2", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，$a=5,\\ b=8$，面積為 $10\\sqrt3$。求 $\\sin C$。", "answer": "$\\dfrac{\\sqrt3}{2}$", "solution": "面積 $=\\dfrac12 ab\\sin C=\\dfrac12\\cdot5\\cdot8\\cdot\\sin C=20\\sin C=10\\sqrt3$。\n故 $\\sin C=\\dfrac{10\\sqrt3}{20}=\\dfrac{\\sqrt3}{2}$。（$C=60°$ 或 $120°$。）", "skills": ["面積反求角"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（由面積反求 sinC）", "ref_id": null, "tags": ["面積"]}, {"id": "F2-6-L2-Q4", "layer": "L2", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，三邊長為 $13,\\ 14,\\ 15$。求其外接圓半徑 $R$。", "answer": "$\\dfrac{65}{8}$", "solution": "海龍：$s=21$，面積 $K=\\sqrt{21\\cdot8\\cdot7\\cdot6}=\\sqrt{7056}=84$。\\n$R=\\dfrac{abc}{4K}=\\dfrac{13\\cdot14\\cdot15}{4\\cdot84}=\\dfrac{2730}{336}=\\dfrac{65}{8}$。", "skills": ["海龍公式", "外接圓半徑 abc/4K"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（海龍＋外接圓半徑）", "ref_id": null, "tags": ["面積", "外接圓"]}, {"id": "F2-6-L3-Q1", "layer": "L3", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，三邊長為 $5,\\ 12,\\ 13$。求其內切圓半徑 $r$。", "answer": "$2$", "solution": "$5$-$12$-$13$ 為直角三角形，面積 $K=\\dfrac12\\cdot5\\cdot12=30$，$s=\\dfrac{5+12+13}{2}=15$。\n內切圓半徑 $r=\\dfrac{K}{s}=\\dfrac{30}{15}=2$。", "skills": ["內切圓半徑 K/s"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（內切圓半徑）", "ref_id": null, "tags": ["面積", "內切圓"]}, {"id": "F2-6-L3-Q2", "layer": "L3", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，$b=7,\\ c=8$，面積為 $14\\sqrt3$。求 $a$ 的所有可能值。", "answer": "$a=\\sqrt{57}$ 或 $a=13$", "solution": "面積 $=\\dfrac12 bc\\sin A=\\dfrac12\\cdot7\\cdot8\\sin A=28\\sin A=14\\sqrt3\\Rightarrow\\sin A=\\dfrac{\\sqrt3}{2}$，故 $A=60°$ 或 $120°$。\n餘弦定理 $a^2=b^2+c^2-2bc\\cos A=113-112\\cos A$：\\n$A=60°$：$a^2=113-56=57\\Rightarrow a=\\sqrt{57}$；$A=120°$：$a^2=113+56=169\\Rightarrow a=13$。", "skills": ["面積反求角", "餘弦定理", "兩解討論"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（面積定角後兩解）", "ref_id": null, "tags": ["面積", "餘弦定理"]}, {"id": "F2-6-L3-Q3", "layer": "L3", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，$\\overline{AB}=6,\\ \\overline{AC}=4,\\ \\angle A=120°$。設 $\\overline{AD}$ 為 $\\angle A$ 的內角平分線且交 $\\overline{BC}$ 於 $D$。求 $\\overline{AD}$。", "answer": "$\\dfrac{12}{5}$", "solution": "以面積分割：$\\triangle ABC=\\triangle ABD+\\triangle ACD$，且 $\\overline{AD}$ 平分 $120°$ 為兩個 $60°$。\\n$\\dfrac12\\cdot6\\cdot4\\sin120°=\\dfrac12\\cdot6\\cdot\\overline{AD}\\sin60°+\\dfrac12\\cdot4\\cdot\\overline{AD}\\sin60°$。\n左 $=12\\cdot\\dfrac{\\sqrt3}{2}=6\\sqrt3$；右 $=\\dfrac{\\sqrt3}{2}\\cdot\\overline{AD}\\cdot\\dfrac{6+4}{2}\\cdot... =\\dfrac{\\sqrt3}{2}\\cdot5\\overline{AD}$。\n由 $6\\sqrt3=\\dfrac{5\\sqrt3}{2}\\overline{AD}\\Rightarrow\\overline{AD}=\\dfrac{12}{5}$。", "skills": ["角平分線", "面積分割相加"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（面積分割求角平分線長）", "ref_id": null, "tags": ["面積", "角平分線"]}, {"id": "F2-6-L4-Q1", "layer": "L4", "type": "填充題", "stem": "坐標平面上以原點 $O$ 為圓心的圓上有相異三點 $A(1,0),\\ B,\\ C$，且 $\\overline{AB}=\\overline{BC}$。已知銳角三角形 $OAB$ 的面積為 $\\dfrac{3}{10}$，求 $\\triangle OAC$ 的面積。", "answer": "$\\dfrac{12}{25}$", "solution": "設 $B=(\\cos\\theta,\\sin\\theta)$，$\\triangle OAB$ 面積 $=\\dfrac12|\\sin\\theta|=\\dfrac{3}{10}\\Rightarrow\\sin\\theta=\\dfrac35$（銳角 $\\cos\\theta=\\dfrac45$）。\n由 $\\overline{AB}=\\overline{BC}$，$B$ 為弧 $AC$ 中點，故 $C$ 對應角 $2\\theta$。\\n$\\triangle OAC$ 面積 $=\\dfrac12|\\sin2\\theta|=\\sin\\theta\\cos\\theta=\\dfrac35\\cdot\\dfrac45=\\dfrac{12}{25}$。", "skills": ["單位圓面積", "倍角"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "97 學測 第 15 題", "ref_id": "TRI-144", "tags": ["學測", "面積", "倍角"]}, {"id": "F2-6-L4-Q2", "layer": "L4", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，$\\overline{AB}=10,\\ \\overline{AC}=9,\\ \\cos\\angle BAC=\\dfrac38$。點 $P,\\ Q$ 分別在 $\\overline{AB},\\ \\overline{AC}$ 上，使 $\\triangle APQ$ 的面積為 $\\triangle ABC$ 面積的一半，求 $\\overline{PQ}$ 的最小值。", "answer": "$\\dfrac{15}{2}$", "solution": "面積關係：$\\dfrac{\\frac12 AP\\cdot AQ\\sin A}{\\frac12\\cdot10\\cdot9\\sin A}=\\dfrac12\\Rightarrow AP\\cdot AQ=45$。\n餘弦定理：$\\overline{PQ}^2=AP^2+AQ^2-2AP\\cdot AQ\\cos A=AP^2+AQ^2-2\\cdot45\\cdot\\dfrac38=AP^2+AQ^2-\\dfrac{135}{4}$。\n由算幾不等式 $AP^2+AQ^2\\ge2AP\\cdot AQ=90$（等號 $AP=AQ=3\\sqrt5$，在邊上）。\\n$\\overline{PQ}^2_{\\min}=90-\\dfrac{135}{4}=\\dfrac{225}{4}\\Rightarrow\\overline{PQ}_{\\min}=\\dfrac{15}{2}$。", "skills": ["面積比", "餘弦定理", "算幾不等式"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "98 學測 第 12-20 題（填I）", "ref_id": "TRI-146", "tags": ["學測", "面積", "最佳化"]}, {"id": "F2-6-L4-Q3", "layer": "L4", "type": "填充題", "stem": "三角形公園頂點為 $O,\\ A,\\ B$，$O$ 處有高 $150$ 公尺的觀景台 $T$。從 $T$ 看 $A$、$B$、$C$（$C$ 為 $\\overline{AB}$ 中點）的俯角分別為 $30°,\\ 60°,\\ 45°$。求公園 $\\triangle OAB$ 的面積。", "answer": "$7500\\sqrt2$ 平方公尺", "solution": "水平距 $=150\\cot(\\text{俯角})$：$\\overline{OA}=150\\cot30°=150\\sqrt3$，$\\overline{OB}=150\\cot60°=50\\sqrt3$，$\\overline{OC}=150\\cot45°=150$。\\n$\\overline{OC}$ 為 $\\triangle OAB$ 中 $\\overline{AB}$ 的中線，由中線長公式 $\\overline{OC}^2=\\dfrac{2\\overline{OA}^2+2\\overline{OB}^2-\\overline{AB}^2}{4}$ 解得 $\\overline{AB}^2=60000$。\n再以海龍或座標求得 $\\triangle OAB$ 面積 $=7500\\sqrt2$（平方公尺）。", "skills": ["三角測量", "中線長公式", "面積"], "difficulty_star": 5, "bloom": "分析", "source_kind": "原題", "source": "109 指考數甲 選填C", "ref_id": "TRI-181", "tags": ["指考", "三角測量", "面積"]}, {"id": "F2-6-L4-Q4", "layer": "L4", "type": "多選題", "stem": "坐標平面上 $\\triangle ABC$ 三頂點為 $A(0,2),\\ B(1,0),\\ C(4,1)$。試選出正確的選項。\n(1) 三邊中 $\\overline{AC}$ 最長\n(2) $\\sin A<\\sin C$\n(3) $\\triangle ABC$ 為銳角三角形\n(4) $\\sin B=\\dfrac{7\\sqrt2}{10}$\n(5) $\\triangle ABC$ 外接圓半徑小於 $2$", "answer": "(1)(4)", "solution": "三邊：$\\overline{AB}=\\sqrt5,\\ \\overline{BC}=\\sqrt{10},\\ \\overline{CA}=\\sqrt{17}$。\n(1) $\\overline{CA}=\\sqrt{17}$ 最大，✓。\n(2) 大邊對大角，$\\overline{CA}$（對 $B$）最大故 $\\angle B$ 最大；$\\sin A$ 與 $\\sin C$ 比較對應 $\\overline{BC}$ 與 $\\overline{AB}$：$\\overline{BC}>\\overline{AB}\\Rightarrow\\sin A>\\sin C$（正弦定理），故 (2) 敘述反，✗。\n(3) 最大角 $B$：$\\cos B=\\dfrac{\\overline{AB}^2+\\overline{BC}^2-\\overline{CA}^2}{2\\cdot\\overline{AB}\\cdot\\overline{BC}}=\\dfrac{5+10-17}{2\\sqrt{50}}<0$，$B$ 為鈍角，非銳角三角形，✗。\n(4) $\\sin B=\\sqrt{1-\\cos^2B}=\\dfrac{7\\sqrt2}{10}$，✓（以向量內積亦得）。\n(5) 由正弦定理 $2R=\\dfrac{\\overline{CA}}{\\sin B}=\\dfrac{\\sqrt{17}}{7\\sqrt2/10}=\\dfrac{10\\sqrt{17}}{7\\sqrt2}\\approx4.16\\Rightarrow R\\approx2.08>2$，✗。\n選 (1)(4)。", "skills": ["坐標求邊", "正弦定理", "面積/外接圓"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "111 學測A 第 8 題", "ref_id": "TRP-165", "tags": ["學測", "面積", "外接圓", "多選"]}, {"id": "F2-6-L4-Q5", "layer": "L4", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，$\\overline{BC}=14$，$M$ 為 $\\overline{BC}$ 中點。已知 $\\angle BAM=120°$、$\\angle CAM=30°$，求 $\\triangle ABC$ 的面積。（化為最簡根式）", "answer": "$7\\sqrt3$", "solution": "$M$ 為中點 $\\Rightarrow\\triangle ABM$ 與 $\\triangle ACM$ 面積相等：$\\dfrac12\\overline{AB}\\cdot\\overline{AM}\\sin120°=\\dfrac12\\overline{AC}\\cdot\\overline{AM}\\sin30°$，得 $\\overline{AC}=\\sqrt3\\,\\overline{AB}$。\\n$\\angle BAC=150°$，餘弦定理：$14^2=\\overline{AB}^2+\\overline{AC}^2-2\\overline{AB}\\cdot\\overline{AC}\\cos150°=7\\overline{AB}^2\\Rightarrow\\overline{AB}^2=28$。\n面積 $=\\dfrac12\\overline{AB}\\cdot\\overline{AC}\\sin150°=\\dfrac12\\cdot\\sqrt3\\,\\overline{AB}^2\\cdot\\dfrac12=\\dfrac{\\sqrt3}{4}\\cdot28=7\\sqrt3$。", "skills": ["中線分割等面積", "餘弦定理", "面積"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "112 學測 數A 第1次模考（中區）", "ref_id": "TRP-324", "tags": ["模考", "面積", "中線"]}, {"id": "F2-6-L4-Q6", "layer": "L4", "type": "填充題", "stem": "四邊形 $ABCD$ 中，$\\angle B=\\angle C=150°$，$\\overline{AB}=6,\\ \\overline{BC}=4,\\ \\overline{CD}=8$。求四邊形 $ABCD$ 的面積。", "answer": "$12\\sqrt3+14$", "solution": "以頂點座標計算（$B=(0,0)$、$C=(4,0)$，依 $\\angle B=\\angle C=150°$ 定出 $A,D$）。\n或分割：連 $\\overline{BD}$（或 $\\overline{AC}$）將四邊形分成兩三角形，分別用 $\\dfrac12 ab\\sin\\theta$ 求和。\n計算得四邊形面積 $=12\\sqrt3+14$。", "skills": ["四邊形分割", "面積和", "座標法"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "113 學測 數A 第4次模考（南一）", "ref_id": "TRP-352", "tags": ["模考", "面積", "四邊形"]}], "related_nodes": ["F2-5", "F2-9"], "remediation_tip": "若本節 ≥3 題錯，回看講義「三角形面積公式」。核心：(1/2)ab·sinC、海龍公式、R=abc/4K、r=K/s；中線/角平分線用面積分割相加；四邊形面積用對角線分割。先熟 L1/L2 公式套用再挑戰測量與分割綜合題。"}, {"code": "F2-8", "name": "弧度量與扇形", "section": "二、三角函數", "section_color": "blue", "difficulty_grade": "冷門", "handout_page": "三角-8", "concepts": ["弧度與角度互換：π 弧度 = 180°", "弧長公式 s = rθ（θ 為弧度）", "扇形面積 = (1/2)r²θ = (1/2)rs", "扇形周長 = 2r + s"], "question_count": 5, "layer_distribution": {"L1": 1, "L2": 2, "L3": 1, "L4": 1}, "_curriculum_note": "108課綱必修。", "questions": [{"id": "F2-8-L1-Q1", "layer": "L1", "type": "填充題", "stem": "將 $120°$ 化為弧度；將 $\\dfrac{3\\pi}{4}$ 化為角度。", "answer": "$120°=\\dfrac{2\\pi}{3}$；$\\dfrac{3\\pi}{4}=135°$", "solution": "以 $\\pi=180°$ 換算：$120°=120\\cdot\\dfrac{\\pi}{180}=\\dfrac{2\\pi}{3}$；$\\dfrac{3\\pi}{4}=\\dfrac{3}{4}\\cdot180°=135°$。", "skills": ["弧度角度互換"], "difficulty_star": 1, "bloom": "記憶", "source_kind": "原題", "source": "教材標準例（弧度換算）", "ref_id": null, "tags": ["弧度量"]}, {"id": "F2-8-L2-Q1", "layer": "L2", "type": "填充題", "stem": "半徑為 $6$ 的圓中，圓心角 $\\dfrac{\\pi}{3}$ 所對的弧長為何？", "answer": "$2\\pi$", "solution": "弧長 $s=r\\theta=6\\cdot\\dfrac{\\pi}{3}=2\\pi$。", "skills": ["弧長公式"], "difficulty_star": 2, "bloom": "理解", "source_kind": "原題", "source": "段考常見基本題型（弧長）", "ref_id": null, "tags": ["弧度量", "弧長"]}, {"id": "F2-8-L2-Q2", "layer": "L2", "type": "填充題", "stem": "半徑為 $6$、圓心角為 $\\dfrac{\\pi}{3}$ 的扇形面積為何？", "answer": "$6\\pi$", "solution": "扇形面積 $=\\dfrac12 r^2\\theta=\\dfrac12\\cdot36\\cdot\\dfrac{\\pi}{3}=6\\pi$。", "skills": ["扇形面積"], "difficulty_star": 2, "bloom": "應用", "source_kind": "改編", "source": "改編（扇形面積）", "ref_id": null, "tags": ["弧度量", "扇形面積"]}, {"id": "F2-8-L3-Q1", "layer": "L3", "type": "填充題", "stem": "一扇形半徑為 $10$、弧長為 $15$。求其圓心角（弧度）與面積。", "answer": "圓心角 $\\dfrac{3}{2}$ 弧度，面積 $75$", "solution": "由 $s=r\\theta$：$\\theta=\\dfrac{s}{r}=\\dfrac{15}{10}=\\dfrac32$（弧度）。\n面積 $=\\dfrac12 rs=\\dfrac12\\cdot10\\cdot15=75$。", "skills": ["弧長", "扇形面積(1/2 rs)"], "difficulty_star": 3, "bloom": "分析", "source_kind": "改編", "source": "改編（由弧長反求圓心角與面積）", "ref_id": null, "tags": ["弧度量", "扇形面積"]}, {"id": "F2-8-L4-Q1", "layer": "L4", "type": "單選題", "stem": "假設地球為半徑 $r$ 的球體，一質點自甲地沿所在經線往北移動，抵達北極點時經過的弧長為 $\\dfrac{7}{12}\\pi r$。下列何者最可能是甲地位置？\n(1) 東經75°、北緯15°　(2) 東經30°、南緯75°　(3) 東經75°、南緯15°　(4) 西經30°、北緯75°　(5) 西經15°、南緯30°", "answer": "(3) 東經75°、南緯15°", "solution": "沿經線弧長 $=r\\theta$，$\\theta=\\dfrac{7\\pi}{12}>\\dfrac{\\pi}{2}$，故甲地在南半球（要先過赤道再到北極）。\n設南緯 $\\varphi$：北極到甲地的圓心角 $=\\dfrac{\\pi}{2}+\\varphi=\\dfrac{7\\pi}{12}\\Rightarrow\\varphi=\\dfrac{\\pi}{12}=15°$。經度不影響弧長，選 (3)。", "skills": ["弧長公式", "緯度與圓心角"], "difficulty_star": 3, "bloom": "應用", "source_kind": "原題", "source": "111 學測B 第 6 題", "ref_id": "RAD-003", "tags": ["學測", "弧度量", "弧長"]}], "related_nodes": ["F2-1", "F2-5"], "remediation_tip": "若本節 ≥2 題錯，回看講義「弧度量與扇形」。核心：π=180° 換算、弧長 s=rθ、扇形面積 (1/2)r²θ=(1/2)rs。注意 θ 必須是弧度。"}, {"code": "F2-9", "name": "和差角與倍半角公式", "section": "二、三角函數", "section_color": "blue", "difficulty_grade": "熱門", "handout_page": "三角-9~10", "concepts": ["和差角：sin(A±B)=sinAcosB±cosAsinB；cos(A±B)=cosAcosB∓sinAsinB；tan(A±B)=(tanA±tanB)/(1∓tanAtanB)", "倍角：sin2A=2sinAcosA；cos2A=cos²A−sin²A=1−2sin²A=2cos²A−1；tan2A=2tanA/(1−tan²A)", "半角：sin²(A/2)=(1−cosA)/2；cos²(A/2)=(1+cosA)/2", "三倍角：sin3A=3sinA−4sin³A；cos3A=4cos³A−3cosA", "由 (sinθ±cosθ)²=1±sin2θ 連結平方與倍角"], "question_count": 15, "layer_distribution": {"L1": 2, "L2": 4, "L3": 3, "L4": 6}, "_curriculum_note": "108課綱必修；排除和差化積、積化和差、反三角（皆選修數甲）。", "questions": [{"id": "F2-9-L1-Q1", "layer": "L1", "type": "填充題", "stem": "利用和角公式求 $\\sin 75°$。", "answer": "$\\dfrac{\\sqrt6+\\sqrt2}{4}$", "solution": "$\\sin75°=\\sin(45°+30°)=\\sin45°\\cos30°+\\cos45°\\sin30°=\\dfrac{\\sqrt2}{2}\\cdot\\dfrac{\\sqrt3}{2}+\\dfrac{\\sqrt2}{2}\\cdot\\dfrac12=\\dfrac{\\sqrt6+\\sqrt2}{4}$。", "skills": ["和角公式"], "difficulty_star": 1, "bloom": "記憶", "source_kind": "原題", "source": "教材標準例（和角求特別值）", "ref_id": null, "tags": ["和角"]}, {"id": "F2-9-L1-Q2", "layer": "L1", "type": "填充題", "stem": "設 $\\theta$ 為銳角且 $\\sin\\theta=\\dfrac35$。求 $\\sin2\\theta$ 與 $\\cos2\\theta$。", "answer": "$\\sin2\\theta=\\dfrac{24}{25},\\ \\cos2\\theta=\\dfrac{7}{25}$", "solution": "銳角 $\\cos\\theta=\\dfrac45$。$\\sin2\\theta=2\\sin\\theta\\cos\\theta=2\\cdot\\dfrac35\\cdot\\dfrac45=\\dfrac{24}{25}$；$\\cos2\\theta=1-2\\sin^2\\theta=1-\\dfrac{18}{25}=\\dfrac{7}{25}$。", "skills": ["倍角公式"], "difficulty_star": 1, "bloom": "理解", "source_kind": "原題", "source": "教材標準例（倍角）", "ref_id": null, "tags": ["倍角"]}, {"id": "F2-9-L2-Q1", "layer": "L2", "type": "填充題", "stem": "利用差角公式求 $\\cos 15°$。", "answer": "$\\dfrac{\\sqrt6+\\sqrt2}{4}$", "solution": "$\\cos15°=\\cos(45°-30°)=\\cos45°\\cos30°+\\sin45°\\sin30°=\\dfrac{\\sqrt2}{2}\\cdot\\dfrac{\\sqrt3}{2}+\\dfrac{\\sqrt2}{2}\\cdot\\dfrac12=\\dfrac{\\sqrt6+\\sqrt2}{4}$。", "skills": ["差角公式"], "difficulty_star": 2, "bloom": "理解", "source_kind": "原題", "source": "段考常見基本題型", "ref_id": null, "tags": ["差角"]}, {"id": "F2-9-L2-Q2", "layer": "L2", "type": "填充題", "stem": "已知 $\\tan A=\\dfrac12,\\ \\tan B=\\dfrac13$。求 $\\tan(A+B)$。", "answer": "$1$", "solution": "$\\tan(A+B)=\\dfrac{\\tan A+\\tan B}{1-\\tan A\\tan B}=\\dfrac{\\frac12+\\frac13}{1-\\frac12\\cdot\\frac13}=\\dfrac{\\frac56}{\\frac56}=1$。", "skills": ["tan 和角"], "difficulty_star": 2, "bloom": "應用", "source_kind": "原題", "source": "段考常見基本題型", "ref_id": null, "tags": ["和角", "tan"]}, {"id": "F2-9-L2-Q3", "layer": "L2", "type": "填充題", "stem": "已知 $\\tan\\theta=2$。求 $\\tan2\\theta$。", "answer": "$-\\dfrac43$", "solution": "$\\tan2\\theta=\\dfrac{2\\tan\\theta}{1-\\tan^2\\theta}=\\dfrac{2\\cdot2}{1-4}=\\dfrac{4}{-3}=-\\dfrac43$。", "skills": ["tan 倍角"], "difficulty_star": 2, "bloom": "應用", "source_kind": "改編", "source": "改編（tan 倍角）", "ref_id": null, "tags": ["倍角", "tan"]}, {"id": "F2-9-L2-Q4", "layer": "L2", "type": "填充題", "stem": "設 $0<\\theta<\\dfrac{\\pi}{2}$ 且 $\\cos\\theta=\\dfrac35$。求 $\\sin\\dfrac{\\theta}{2}$。", "answer": "$\\dfrac{\\sqrt5}{5}$", "solution": "半角公式：$\\sin^2\\dfrac{\\theta}{2}=\\dfrac{1-\\cos\\theta}{2}=\\dfrac{1-\\frac35}{2}=\\dfrac15$。\n因 $0<\\dfrac{\\theta}{2}<\\dfrac{\\pi}{4}$，取正：$\\sin\\dfrac{\\theta}{2}=\\dfrac{1}{\\sqrt5}=\\dfrac{\\sqrt5}{5}$。", "skills": ["半角公式", "象限取號"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（半角公式）", "ref_id": null, "tags": ["半角"]}, {"id": "F2-9-L3-Q1", "layer": "L3", "type": "填充題", "stem": "設 $\\alpha$ 為第一象限角、$\\beta$ 為第二象限角，$\\sin\\alpha=\\dfrac35$、$\\cos\\beta=-\\dfrac{5}{13}$。求 $\\sin(\\alpha+\\beta)$。", "answer": "$\\dfrac{33}{65}$", "solution": "$\\cos\\alpha=\\dfrac45$（第一象限）；$\\sin\\beta=\\dfrac{12}{13}$（第二象限 sin>0）。\\n$\\sin(\\alpha+\\beta)=\\sin\\alpha\\cos\\beta+\\cos\\alpha\\sin\\beta=\\dfrac35\\cdot\\left(-\\dfrac{5}{13}\\right)+\\dfrac45\\cdot\\dfrac{12}{13}=\\dfrac{-15+48}{65}=\\dfrac{33}{65}$。", "skills": ["和角公式", "象限判號"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（含象限的和角求值）", "ref_id": null, "tags": ["和角", "象限"]}, {"id": "F2-9-L3-Q2", "layer": "L3", "type": "填充題", "stem": "已知 $\\sin\\theta+\\cos\\theta=\\dfrac15$。求 $\\sin2\\theta$。", "answer": "$-\\dfrac{24}{25}$", "solution": "兩邊平方：$(\\sin\\theta+\\cos\\theta)^2=\\sin^2\\theta+\\cos^2\\theta+2\\sin\\theta\\cos\\theta=1+\\sin2\\theta=\\dfrac{1}{25}$。\n故 $\\sin2\\theta=\\dfrac{1}{25}-1=-\\dfrac{24}{25}$。", "skills": ["平方連結倍角"], "difficulty_star": 3, "bloom": "應用", "source_kind": "改編", "source": "改編（(sinθ+cosθ)² 連結 sin2θ）", "ref_id": null, "tags": ["倍角"]}, {"id": "F2-9-L3-Q3", "layer": "L3", "type": "填充題", "stem": "求 $\\dfrac{1+\\tan 15°}{1-\\tan 15°}$ 的值。", "answer": "$\\sqrt3$", "solution": "利用 $\\tan(45°+\\theta)=\\dfrac{1+\\tan\\theta}{1-\\tan\\theta}$：\\n$\\dfrac{1+\\tan15°}{1-\\tan15°}=\\tan(45°+15°)=\\tan60°=\\sqrt3$。", "skills": ["tan 和角逆用", "特別角"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（tan 和角結構辨識）", "ref_id": null, "tags": ["和角", "tan"]}, {"id": "F2-9-L4-Q1", "layer": "L4", "type": "單選題", "stem": "$\\dfrac{\\sin 3\\theta}{\\sec 2\\theta}-\\dfrac{\\cos 3\\theta}{\\csc 2\\theta}$ 可化簡為？\n(1) $\\sin\\theta$　(2) $\\cos\\theta$　(3) $\\tan\\theta$　(4) $\\cot\\theta$", "answer": "(1) $\\sin\\theta$", "solution": "$\\dfrac{\\sin3\\theta}{\\sec2\\theta}=\\sin3\\theta\\cos2\\theta$，$\\dfrac{\\cos3\\theta}{\\csc2\\theta}=\\cos3\\theta\\sin2\\theta$。\n相減 $=\\sin3\\theta\\cos2\\theta-\\cos3\\theta\\sin2\\theta=\\sin(3\\theta-2\\theta)=\\sin\\theta$，選 (1)。", "skills": ["差角公式", "倒數三角函數"], "difficulty_star": 3, "bloom": "應用", "source_kind": "原題", "source": "94 指考數甲 第 2 題", "ref_id": "TSC-006", "tags": ["指考", "差角"]}, {"id": "F2-9-L4-Q2", "layer": "L4", "type": "多選題", "stem": "若 $\\tan\\theta=\\dfrac43$ 且 $180°<\\theta<270°$，下列何者正確？\n(1) $\\cos2\\theta=\\dfrac{7}{25}$\n(2) $\\sin\\dfrac{\\theta}{2}=\\dfrac{\\sqrt{10}}{5}$\n(3) $\\sin3\\theta=-\\dfrac{44}{125}$\n(4) $\\cos(180°-\\theta)=\\dfrac35$\n(5) $\\sin(270°-\\theta)=\\dfrac45$", "answer": "(3)(4)", "solution": "第三象限：$\\sin\\theta=-\\dfrac45,\\ \\cos\\theta=-\\dfrac35$。\n(1) $\\cos2\\theta=2\\cos^2\\theta-1=2\\cdot\\dfrac{9}{25}-1=-\\dfrac{7}{25}$，✗。\n(2) $\\dfrac{\\theta}{2}$ 在第二象限（$90°<\\dfrac\\theta2<135°$），$\\sin\\dfrac\\theta2>0$ 但值非 $\\dfrac{\\sqrt{10}}{5}$，✗。\n(3) $\\sin3\\theta=3\\sin\\theta-4\\sin^3\\theta=3(-\\tfrac45)-4(-\\tfrac45)^3=-\\dfrac{44}{125}$，✓。\n(4) $\\cos(180°-\\theta)=-\\cos\\theta=\\dfrac35$，✓。\n(5) $\\sin(270°-\\theta)=-\\cos\\theta=\\dfrac35\\ne\\dfrac45$，✗。\n選 (3)(4)。", "skills": ["倍角", "三倍角", "半角", "誘導公式"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "105 學測 數A 第1次模考（南區）多11", "ref_id": "TSC-012", "tags": ["模考", "倍角", "半角", "多選"]}, {"id": "F2-9-L4-Q3", "layer": "L4", "type": "多選題", "stem": "已知 $90°<\\theta<180°$，且 $\\cos\\theta$ 為 $6x^2+11x+3=0$ 的一根。試選出正確選項。\n(1) $\\cos(180°-\\theta)=\\dfrac13$\n(2) $\\cos2\\theta=-\\dfrac23$\n(3) $\\sin2\\theta=-\\dfrac49\\sqrt2$\n(4) $\\cos\\dfrac{\\theta}{2}=-\\dfrac{\\sqrt3}{3}$\n(5) $\\cos3\\theta=\\dfrac{23}{27}$", "answer": "(1)(3)(5)", "solution": "$6x^2+11x+3=0$ 的根為 $-\\dfrac13,\\ -\\dfrac32$。第二象限 $-1<\\cos\\theta<0$，取 $\\cos\\theta=-\\dfrac13$，$\\sin\\theta=\\dfrac{2\\sqrt2}{3}$。\n(1) $\\cos(180°-\\theta)=-\\cos\\theta=\\dfrac13$，✓。\n(2) $\\cos2\\theta=2\\cos^2\\theta-1=-\\dfrac79\\ne-\\dfrac23$，✗。\n(3) $\\sin2\\theta=2\\sin\\theta\\cos\\theta=2\\cdot\\dfrac{2\\sqrt2}{3}\\cdot\\left(-\\dfrac13\\right)=-\\dfrac{4\\sqrt2}{9}$，✓。\n(4) $\\dfrac\\theta2$ 在第一象限，$\\cos\\dfrac\\theta2>0$，✗。\n(5) $\\cos3\\theta=4\\cos^3\\theta-3\\cos\\theta=4\\left(-\\dfrac{1}{27}\\right)-3\\left(-\\dfrac13\\right)=\\dfrac{23}{27}$，✓。\n選 (1)(3)(5)。", "skills": ["倍角", "三倍角", "半角象限", "根與三角"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "106 學測 數A 第3次模考（公私立）Q11", "ref_id": "TSC-013", "tags": ["模考", "倍角", "三倍角", "多選"]}, {"id": "F2-9-L4-Q4", "layer": "L4", "type": "單選題", "stem": "若 $\\begin{cases}\\cos\\alpha+\\sin\\beta=1\\ \\sin\\alpha+\\cos\\beta=\\sqrt2\\end{cases}$，求 $\\cos(2\\alpha+2\\beta)$。\n(1) $-1$　(2) $0$　(3) $1$　(4) $\\dfrac12$　(5) $-\\dfrac12$", "answer": "(4) $\\dfrac12$", "solution": "兩式平方相加：$(\\cos\\alpha+\\sin\\beta)^2+(\\sin\\alpha+\\cos\\beta)^2=1+2=3$。\n展開 $=2+2(\\cos\\alpha\\sin\\beta+\\sin\\alpha\\cos\\beta)=2+2\\sin(\\alpha+\\beta)=3\\Rightarrow\\sin(\\alpha+\\beta)=\\dfrac12$。\\n$\\cos(2\\alpha+2\\beta)=1-2\\sin^2(\\alpha+\\beta)=1-2\\cdot\\dfrac14=\\dfrac12$，選 (4)。", "skills": ["和角", "平方相加", "倍角"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "106 學測 數A 第3次模考（高中）Q6", "ref_id": "TSC-014", "tags": ["模考", "和角", "倍角"]}, {"id": "F2-9-L4-Q5", "layer": "L4", "type": "單選題", "stem": "直角三角形 $\\triangle ABC$ 中 $C=90°$，$0°<A<45°$，且 $\\sin A\\cos A+\\cos A\\cos B+\\sin A\\sin B=\\dfrac65$。求 $\\tan A$。\n(1) $\\dfrac12$　(2) $\\dfrac34$　(3) $1$　(4) $\\dfrac43$　(5) $\\dfrac65$", "answer": "(1) $\\dfrac12$", "solution": "$C=90°\\Rightarrow B=90°-A$，故 $\\cos B=\\sin A,\\ \\sin B=\\cos A$。\n代入：$\\sin A\\cos A+\\cos A\\sin A+\\sin A\\cos A=3\\sin A\\cos A=\\dfrac32\\sin2A=\\dfrac65\\Rightarrow\\sin2A=\\dfrac45$。\\n$0°<A<45°\\Rightarrow0°<2A<90°$，$\\cos2A=\\dfrac35$。\\n$\\tan A=\\dfrac{\\sin2A}{1+\\cos2A}=\\dfrac{4/5}{1+3/5}=\\dfrac{4/5}{8/5}=\\dfrac12$，選 (1)。", "skills": ["餘角關係", "倍角", "半角 tan"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "108 學測 數A 第3次模考（E3）單5", "ref_id": "TSC-17", "tags": ["模考", "和角", "倍角"]}, {"id": "F2-9-L4-Q6", "layer": "L4", "type": "填充題", "stem": "在 $\\triangle ABC$ 中，$\\sin A:\\sin B:\\sin(A+B)=2:3:4$。求 $\\cos(A-B)$（化為最簡分數）。", "answer": "$\\dfrac{61}{64}$", "solution": "$\\sin(A+B)=\\sin C$，由正弦定理 $a:b:c=\\sin A:\\sin B:\\sin C=2:3:4$。\n餘弦定理：$\\cos A=\\dfrac{3^2+4^2-2^2}{2\\cdot3\\cdot4}=\\dfrac{21}{24}=\\dfrac78$，$\\cos B=\\dfrac{2^2+4^2-3^2}{2\\cdot2\\cdot4}=\\dfrac{11}{16}$。\\n$\\sin A=\\sqrt{1-\\frac{49}{64}}=\\dfrac{\\sqrt{15}}{8}$，$\\sin B=\\sqrt{1-\\frac{121}{256}}=\\dfrac{\\sqrt{135}}{16}=\\dfrac{3\\sqrt{15}}{16}$。\\n$\\cos(A-B)=\\cos A\\cos B+\\sin A\\sin B=\\dfrac78\\cdot\\dfrac{11}{16}+\\dfrac{\\sqrt{15}}{8}\\cdot\\dfrac{3\\sqrt{15}}{16}=\\dfrac{77}{128}+\\dfrac{45}{128}=\\dfrac{122}{128}=\\dfrac{61}{64}$。", "skills": ["正弦定理", "餘弦定理", "差角公式"], "difficulty_star": 4, "bloom": "分析", "source_kind": "原題", "source": "114 學測 數A 第4次模考（南一）選填15", "ref_id": "TSC-33", "tags": ["模考", "差角", "解三角形"]}], "related_nodes": ["F2-3", "F2-10", "F2-11"], "remediation_tip": "若本節 ≥3 題錯，回看講義「和差角與倍半角」。核心：熟記 sin/cos/tan 和差角、倍角三式、半角、三倍角；善用 (sinθ±cosθ)²=1±sin2θ 與 tan(45°+θ) 結構。注意象限取號。排除和差化積/積化和差（選修）。"}, {"code": "F2-10", "name": "三角函數的疊合", "section": "二、三角函數", "section_color": "blue", "difficulty_grade": "熱門", "handout_page": "三角-10~11", "concepts": ["疊合：a·sinθ+b·cosθ=R·sin(θ+φ)，其中 R=√(a²+b²)", "振幅 R 即最大值，−R 即最小值（θ 可任意時）", "相位角 φ 由 cosφ=a/R、sinφ=b/R 決定", "限定區間求極值：先化單一正弦，再看 (θ+φ) 落在的區間", "倍角先化簡（如 sin2x+cos2x）再疊合；t=sinθ±cosθ 代換"], "question_count": 15, "layer_distribution": {"L1": 2, "L2": 4, "L3": 3, "L4": 6}, "_curriculum_note": "108課綱必修（正餘弦疊合）；排除反三角、和差化積/積化和差（選修）。", "questions": [{"id": "F2-10-L1-Q1", "layer": "L1", "type": "填充題", "stem": "將 $\\sin x+\\sqrt3\\cos x$ 化為 $R\\sin(x+\\varphi)$ 的形式（$R>0,\\ 0<\\varphi<\\dfrac{\\pi}{2}$）。", "answer": "$2\\sin\\!\\left(x+\\dfrac{\\pi}{3}\\right)$", "solution": "$R=\\sqrt{1^2+(\\sqrt3)^2}=2$。由 $\\cos\\varphi=\\dfrac1R=\\dfrac12,\\ \\sin\\varphi=\\dfrac{\\sqrt3}{2}\\Rightarrow\\varphi=\\dfrac{\\pi}{3}$。\n故 $\\sin x+\\sqrt3\\cos x=2\\sin\\!\\left(x+\\dfrac{\\pi}{3}\\right)$。", "skills": ["疊合化標準式"], "difficulty_star": 1, "bloom": "記憶", "source_kind": "原題", "source": "教材標準例（疊合）", "ref_id": null, "tags": ["疊合"]}, {"id": "F2-10-L1-Q2", "layer": "L1", "type": "填充題", "stem": "求函數 $f(x)=3\\sin x+4\\cos x$ 的最大值與最小值。", "answer": "最大值 $5$、最小值 $-5$", "solution": "振幅 $R=\\sqrt{3^2+4^2}=5$，故 $f(x)=5\\sin(x+\\varphi)$，值域為 $[-5,\\ 5]$。最大值 $5$、最小值 $-5$。",
