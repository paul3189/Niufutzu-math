應用", "source_kind": "改編", "source": "改編（解的個數判別）", "ref_id": "", "tags": ["唯一解"]}, {"id": "D3-4-L3-Q1", "layer": "L3", "type": "填充題", "stem": "依實數 $k$ 討論方程組 $\\begin{cases}kx+y+z=1\\\\x+ky+z=1\\\\x+y+kz=1\\end{cases}$ 解的個數。", "answer": "$k\\ne1$ 且 $k\\ne-2$：唯一解；$k=1$：無限多解；$k=-2$：無解", "solution": "係數行列式 $\\begin{vmatrix}k&1&1\\\\1&k&1\\\\1&1&k\\end{vmatrix}=(k-1)^2(k+2)$。\n$k\\ne1,\\,k\\ne-2$ 時 $\\ne0$ → 唯一解。\n$k=1$：三式皆為 $x+y+z=1$（同一平面）→ 無限多解。\n$k=-2$：係數秩 $2$、增廣秩 $3$ → 無解。", "skills": ["含參數討論", "對稱行列式", "解的個數"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（對稱系統含參數討論）", "ref_id": "", "tags": ["含參數", "解的個數"]}, {"id": "D3-4-L3-Q2", "layer": "L3", "type": "填充題", "stem": "依實數 $a,b$ 討論方程組 $\\begin{cases}x+y+z=1\\\\2x+3y+z=3\\\\x+2y+az=b\\end{cases}$ 解的個數。", "answer": "$a\\ne0$：唯一解；$a=0,b=2$：無限多解；$a=0,b\\ne2$：無解", "solution": "係數行列式 $\\begin{vmatrix}1&1&1\\\\2&3&1\\\\1&2&a\\end{vmatrix}=a$。\n$a\\ne0$ → 唯一解。\n$a=0$ 時做列運算：$R_2-2R_1,\\ R_3-R_1$ 得 $y-z=1$ 與 $y-z=b-1$。\n$b=2$（即 $b-1=1$）→ 兩式一致 → 無限多解；$b\\ne2$ → 矛盾 → 無解。", "skills": ["含參數討論", "列運算", "解的個數"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（雙參數解的討論）", "ref_id": "", "tags": ["含參數", "解的個數"]}, {"id": "D3-4-L3-Q3", "layer": "L3", "type": "填充題", "stem": "坐標空間中三平面 $E_1:x+y+z=1$、$E_2:x+2y+3z=2$、$E_3:x+3y+5z=k$。討論三平面的公共交集隨 $k$ 之變化（以係數行列式與秩說明）。", "answer": "係數行列式 $=0$；$k=3$：三平面交於一直線（無限多解）；$k\\ne3$：無公共交點（無解）", "solution": "係數行列式 $\\begin{vmatrix}1&1&1\\\\1&2&3\\\\1&3&5\\end{vmatrix}=0$，故三平面不交於唯一點。\n列運算：$R_2-R_1$ 得 $y+2z=1$；$R_3-R_1$ 得 $2y+4z=k-1$，即 $y+2z=\\dfrac{k-1}2$。\n$\\dfrac{k-1}2=1\\Rightarrow k=3$：兩條件一致 → 三平面交於一直線（無限多解）；$k\\ne3$：矛盾 → 無公共交點。", "skills": ["三平面關係", "矩陣與空間向量整合", "秩"], "difficulty_star": 4, "bloom": "分析", "source_kind": "改編", "source": "改編（矩陣×空間向量整合：三平面）", "ref_id": "", "tags": ["三平面", "整合", "解的個數"]}, {"id": "D3-4-L4-Q1", "layer": "L4", "type": "單選題", "stem": "設 $c$ 為實數使三元一次方程組 $\\begin{cases}x-y+z=0\\\\2x+cy+3z=1\\\\3x-3y+cz=0\\end{cases}$ 無解。求 $c$。\n(1) $- function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function disp(s){return esc(s).replace(/\n/g,'<br>');}
function build(){
 const root=document.getElementById('nodes'); let curSec=null;
 DATA.nodes.forEach(n=>{
   const col=SECCLS[n.section_color]||'green';
   if(n.section!==curSec){curSec=n.section;const hd=document.createElement('div');hd.className='sectionhead sec-'+col;hd.textContent=n.section;root.appendChild(hd);}
   const d=document.createElement('div');d.className='node n-'+col;
   let h=`<h2>${n.code}　${n.name}（${n.difficulty_grade}）</h2><div class="meta">講義 P.${n.handout_page}　·　${n.questions.length} 題</div>`;
   const by={};n.questions.forEach(q=>{(by[q.layer]=by[q.layer]||[]).push(q);});
   ['L1','L2','L3','L4'].forEach(L=>{if(!by[L])return;h+=`<div class="layer"><h3>${L}　${LAYER[L]}</h3>`;
     by[L].forEach((q,i)=>{const src=(L==='L4'&&q.source)?`<span class="src">〔${esc(q.source)}〕</span> `:'';
       h+=`<div class="q"><input type="checkbox" id="${q.id}" onchange="upd()"><label for="${q.id}"><span class="tag">${LAYER[L]}${i+1}</span>${src}${disp(q.stem)}</label></div>`;});
     h+=`</div>`;});
   d.innerHTML=h;root.appendChild(d);
 });
}

 const topSkills=Object.entries(skill).sort((a,b)=>b[1]-a[1]).slice(0,10);
 const lvl=p=>p>=50?'red':p>=30?'yel':'grn',lvlc={red:'var(--red)',yel:'var(--yel)',grn:'var(--grn)'},lvlt={red:'需加強',yel:'要留意',grn:'已掌握'};
 const donut=`background:conic-gradient(var(--g) 0 ${rate}%, #e0a3a3 ${rate}% 100%);`;
 let h=`<h2>弱點分析報告</h2>`;
 h+=`<div class="sec"><h3>① 整體統計</h3><div class="kpi"><div class="donut" style="${donut}"></div><div><div class="big">${rate}%</div>答對率</div><div>總題數 <b>${total}</b>　答對 <b style="color:var(--grn)">${correct}</b>　答錯 <b style="color:var(--red)">${wrong.size}</b></div></div></div>`;
 h+=`<div class="sec"><h3>② 觀念節點紅綠燈（11 節點）</h3>`;
 nodeStat.forEach(s=>{const L=lvl(s.pct);h+=`<div class="tl"><span class="name"><span class="dot" style="background:${lvlc[L]}"></span>${s.code} ${s.name}</span><span class="track"><span class="fill" style="width:${Math.max(s.pct,3)}%;background:${lvlc[L]}"></span></span><span class="pct">${s.w}/${s.tot}　${lvlt[L]}</span></div>`;});
 h+=`<div class="note">紅：錯 ≥50%　·　黃：30–49%　·　綠：&lt;30%</div></div>`;
 h+=`<div class="sec"><h3>③ 認知層次失分</h3><div class="lay">`;
 ['L1','L2','L3','L4'].forEach(L=>{const[w,t]=lay[L];const c=t?Math.round((t-w)/t*100):100;h+=`<div class="box" style="border-top:4px solid ${LCOLOR[L]}"><div>${L} ${LAYER[L]}</div><div class="n" style="color:${LCOLOR[L]}">${c}%</div><div class="note">答對 ${t-w}/${t}</div></div>`;});
 h+=`</div>`;
 const basics=lay.L1[0]+lay.L2[0],adv=lay.L3[0]+lay.L4[0];
 let diag=wrong.size===0?'全部答對，表現優異！':(basics>adv?'失分集中在 L1/L2 → <b>基礎觀念與標準解法仍不熟</b>，建議回頭把例題與練習做熟。':'L1/L2 大致穩、失分多在 L3/L4 → <b>綜合應用與考場應變較弱</b>，建議多練挑戰題與歷屆真題。');
 h+=`<div class="note" style="font-size:13px;color:#444;margin-top:8px">判讀：${diag}</div></div>`;
 h+=`<div class="sec"><h3>④ 補強路徑（依失分優先序）</h3>`;
 const need=nodeStat.filter(s=>s.w>0).sort((a,b)=>b.pct-a.pct);
 if(!need.length)h+=`<div class="empty">這次沒有勾選錯題，無補強項目。</div>`;
 else need.forEach(s=>{h+=`<div class="path"><b>${s.code} ${s.name}</b>（${s.sec}，錯 ${s.w}/${s.tot}）　→　講義 <b>P.${s.page}</b>。<br>${esc(s.tip)}`+(POOL[s.code]?`<br><button class="btn-sim" onclick="drawSimilar('${s.code}',3)">🔁 補強練習：抽 3 題生成器類似題（可重抽）</button><div class="simbox" id="sim-${s.code}"></div>`:``)+`</div>`;});
 if(topSkills.length)h+=`<div class="note" style="margin-top:8px">最常失分技巧：`+topSkills.map(([k,v])=>`${esc(k)}（${v}）`).join('、')+`</div>`;
 h+=`</div>`;
 h+=`<div class="sec"><h3>⑤ 挑戰建議</h3>`;
 const ready=DATA.nodes.filter(n=>{const base=n.questions.filter(x=>x.layer==='L1'||x.layer==='L2');const baseOK=base.every(x=>!wrong.has(x.id));const hi=n.questions.filter(x=>x.layer==='L3'||x.layer==='L4');return base.length&&baseOK&&hi.some(x=>wrong.has(x.id));});
 if(!ready.length)h+=`<div class="empty">目前無「基礎已穩、僅高階失分」的節點。</div>`;
 else{h+=`<div class="note">下列節點 L1/L2 全對、僅 L3/L4 失分，基礎穩、可專攻高階：</div>`;ready.forEach(n=>{const miss=n.questions.filter(q=>(q.layer==='L3'||q.layer==='L4')&&wrong.has(q.id)).map(q=>q.id);h+=`<div class="path"><b>${n.code} ${n.name}</b>　建議重做：${miss.join('、')}</div>`;});}
 h+=`</div><div class="sec" style="border-bottom:0"><button class="btn" onclick="window.print()">列印 / 另存 PDF</button> <button class="btn" onclick="exportReport()">📤 匯出弱點報告（傳老師）</button></div>`;
 const r=document.getElementById('report');r.innerHTML=h;r.classList.add('show');if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise([r]);r.scrollIntoView({behavior:'smooth'});
}
build();
if(window.MathJax){const go=()=>{if(MathJax.typesetPromise)MathJax.typesetPromise([document.getElementById('nodes')]);};if(MathJax.startup&&MathJax.startup.promise)MathJax.startup.promise.then(go);else setTimeout(go,800);}
</script></body></html>
